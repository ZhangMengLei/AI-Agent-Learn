        "content": "# MCP 练习\n\n这些练习覆盖 MCP 的端到端理解：从概念、协议、schema、配置，到调试、安全和课程知识库 Server 设计。\n\n## 练习 1：区分概念\n\n请解释下面概念的区别：\n\n- MCP Client\n- MCP Server\n- Tool\n- Resource\n- Prompt\n- Sampling\n\n要求：每个概念至少写 2 句话，并举 1 个课程项目中的例子。\n\n## 练习 2：画出生命周期\n\n请画出或写出一个 stdio MCP Server 的生命周期：\n\n1. Client 如何启动 Server？\n2. initialize 阶段交换什么信息？\n3. Client 如何发现 tools/resources/prompts？\n4. 调用 Tool 时 JSON-RPC 请求和响应大致是什么样？\n5. 会话结束时如何关闭？\n\n加分：说明如果 Server 在 stdout 打印普通日志，会发生什么问题。\n\n## 练习 3：判断适合做成什么\n\n判断下面能力适合做成 Tool、Resource 还是 Prompt，并说明原因：\n\n1. 读取项目 README\n2. 查询某个用户资料\n3. 代码审查提示词模板\n4. 修改工单状态\n5. 获取数据库表结构\n6. 生成 PR 描述模板\n7. 暴露 `lessons/06-mcp/01-basic.md` 的只读内容\n8. 根据学习笔记生成复盘提纲\n9. 搜索课程知识库中的 Markdown 文件\n\n## 练习 4：设计一个 Tool\n\n设计一个 `search_docs` MCP Tool。\n\n要求包含：\n\n- name\n- description\n- inputSchema\n- 返回结果示例\n- 参数错误示例\n- 风险等级\n- 权限策略\n\n必须包含的 schema 约束：\n\n- `query` 是必填字符串，不能为空。\n- `limit` 是可选整数，范围 1 到 10。\n- `section` 是可选枚举：`prompt`、`agent`、`mcp`。\n- 不允许额外字段。\n\n## 练习 5：设计一个 Resource\n\n设计一个文档资源：\n\n```text\ndocs://ai-agent/prompt-basic\n```\n\n说明它的名称、描述、mimeType、内容来源和访问边界。\n\n继续设计 2 个课程知识库资源：\n\n```text\ncourse://06-mcp/basic\ncourse://06-mcp/review\n```\n\n要求说明：\n\n- URI 为什么稳定？\n- 是否允许客户端传入任意本地路径？\n- 找不到资源时应该返回什么错误？\n\n## 练习 6：设计一个 Prompt\n\n设计一个 `study_review` MCP Prompt。\n\n要求：\n\n- 参数包含 `topic`、`notes`、`level`。\n- `topic` 和 `notes` 必填。\n- 输出格式包含：一句话总结、关键概念、常见误区、练习建议、自检清单。\n- Prompt 中不得包含真实密钥、内部地址、私人数据。\n\n## 练习 7：权限分析\n\n下面 MCP Tool 哪些需要用户确认？哪些应该默认禁用？\n\n- read_file\n- delete_file\n- query_database\n- update_database\n- send_message\n- create_pull_request\n- search_course_notes\n- export_private_notes\n\n说明原因，并为每个 Tool 标注风险等级：低、中、高。\n\n## 练习 8：JSON-RPC 理解\n\n阅读下面请求，回答问题：\n\n```json\n{\n  \"jsonrpc\": \"2.0\",\n  \"id\": 7,\n  \"method\": \"tools/call\",\n  \"params\": {\n    \"name\": \"get_note\",\n    \"arguments\": {\n      \"note_id\": \"mcp-basic\"\n    }\n  }\n}\n```\n\n问题：\n\n1. 这是请求、响应还是通知？\n2. 请求 ID 是什么？有什么作用？\n3. 调用的 Tool 名称是什么？\n4. 参数是什么？\n5. 如果 `note_id` 不存在，应该如何返回结构化错误？\n\n## 练习 9：配置理解\n\n阅读一个 MCP 配置，回答：\n\n```json\n{\n  \"mcpServers\": {\n    \"learning-notes\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"src.server\", \"--config\", \"config.example.json\"],\n      \"cwd\": \"/ABSOLUTE/PATH/learning_notes_mcp\",\n      \"env\": {\n        \"LOG_LEVEL\": \"info\",\n        \"COURSE_DATA_DIR\": \"/ABSOLUTE/PATH/lessons\"\n      }\n    }\n  }\n}\n```\n\n问题：\n\n1. Server 名称是什么？\n2. 启动命令是什么？\n3. 工作目录是什么？为什么建议使用绝对路径？\n4. 需要哪些环境变量？\n5. 这个 Server 可能暴露哪些能力？\n6. 配置里是否包含真实密钥？如果需要密钥应该如何处理？\n\n## 练习 10：stdio 与 SSE 对比\n\n请对比 stdio 和 SSE：\n\n| 维度 | stdio | SSE |\n| --- | --- | --- |\n| 连接方式 |  |  |\n| 适合场景 |  |  |\n| 安全重点 |  |  |\n| 调试重点 |  |  |\n| 常见错误 |  |  |\n\n要求至少写出 3 个 stdio 调试注意点和 3 个 SSE 安全注意点。\n\n## 练习 11：错误处理设计\n\n为课程知识库 MCP Server 设计错误处理表：\n\n| 场景 | 错误类型 | 用户可见信息 | 日志是否记录细节 |\n| --- | --- | --- | --- |\n| query 为空 |  |  |  |\n| note_id 不存在 |  |  |  |\n| 读取了未授权目录 |  |  |  |\n| JSON 数据文件损坏 |  |  |  |\n| 未预期异常 |  |  |  |\n\n要求：用户可见信息要清楚，但不能泄露本地敏感路径或密钥。\n\n## 练习 12：调试排障\n\n下面是几个现象，请写出可能原因和排查步骤：\n\n1. Claude Desktop 中看不到 `learning-notes` Server。\n2. Server 本地命令能启动，但客户端连接后一直卡住。\n3. Tool 列出来了，但模型总是传错参数。\n4. `search_notes` 本地测试正常，客户端调用时报找不到数据目录。\n5. 日志中出现了 Token 或 Cookie。\n\n每个现象至少写 3 个排查步骤。\n\n## 练习 13：课程知识库 MCP Server 设计\n\n设计一个“课程知识库 MCP Server”，用于暴露本仓库中的课程资料。\n\n最低能力：\n\n- Tool：`search_lessons(query, lesson_id?, limit?)`\n- Tool：`get_lesson_page(path)`\n- Resource：`course://06-mcp/basic`\n- Resource：`course://06-mcp/review`\n- Prompt：`lesson_review(topic, notes, level?)`\n\n约束：\n\n- 只能读取配置允许的课程目录。\n- 不允许读取 `.env`、`.git`、密钥文件、用户主目录其他文件。\n- 默认只读。\n- Tool 参数必须有 schema。\n- 错误要区分参数错误、未找到、权限不足、内部错误。\n\n输出：写出你的目录结构、配置示例、Tool schema、Resource URI 映射和安全策略。\n\n## 练习 14：安全边界\n\n如果 MCP Server 连接了内部系统，应该如何避免敏感信息泄露？\n\n至少写出 8 条策略，并覆盖：\n\n- 配置管理\n- 日志脱敏\n- 最小权限\n- 写操作确认\n- 输出过滤\n- 远端传输安全\n- 审计\n- Prompt injection 防护\n",

        "content": "# MCP 练习工程说明\n\n本目录用于完成 06-mcp 阶段的工程化练习。目标是理解一个自定义 MCP Server 应该如何设计，而不是一开始就接入复杂外部系统。请先用本地数据实现最小 Server，再逐步补充 tools、resources、prompts、config、错误处理和客户端配置。\n\n建议使用 stdio 作为第一个传输方式，因为它最适合本地学习和 Claude Desktop / Claude Code 本地集成。SSE 只需要先理解概念和安全要求，不要求在本练习中实现。\n\n## 练习目标\n\n完成后你应该能够：\n\n1. 说明 MCP Client 与 MCP Server 的关系。\n2. 说明一个 MCP 会话从启动、initialize、能力发现、调用到关闭的生命周期。\n3. 区分 Tools、Resources、Prompts 的职责。\n4. 设计一个最小 MCP Server 的目录结构。\n5. 为工具定义输入 schema 和清晰错误返回。\n6. 使用配置文件描述 Server 名称、数据目录、启用的工具和权限边界。\n7. 写出 Claude Desktop / Claude Code 的本地配置示例。\n8. 解释 stdio 调试要点和 SSE 安全要点。\n\n## 推荐目录\n\n建议在本目录下按下面结构组织练习代码：\n\n```text\n04-exercises-lab/\n  README.md\n  starter/\n    server.py 或 server.ts       # MCP Server 入口\n    config.example.json          # 示例配置，不写真实密钥\n    tools/\n      search_notes.py 或 searchNotes.ts\n      get_note.py 或 getNote.ts\n    resources/\n      notes.py 或 notes.ts\n    prompts/\n      review.py 或 review.ts\n    data/\n      notes.json\n    utils/\n      errors.py 或 errors.ts\n      logger.py 或 logger.ts\n  answers/\n    README.md                    # 参考答案说明\n```\n\n说明：\n\n- `tools/` 放可执行动作。\n- `resources/` 放可读取上下文。\n- `prompts/` 放可复用提示词模板。\n- `utils/errors` 统一参数错误、未找到、权限不足、内部错误。\n- `utils/logger` 的日志应写 stderr 或文件，不要污染 stdout。\n- `config.example.json` 放示例配置，不放真实 Token、Cookie 或 API Key。\n\n## 练习 1：设计 Server 信息\n\n先写出 MCP Server 的基本信息：\n\n```json\n{\n  \"name\": \"learning-notes-mcp\",\n  \"description\": \"为 AI 客户端提供学习笔记搜索、读取和复盘提示词\",\n  \"version\": \"0.1.0\"\n}\n```\n\n思考：这个 Server 是给谁用的？提供什么能力？不提供什么能力？\n\n建议明确写出边界：\n\n- 提供：本地学习笔记搜索、固定资源读取、学习复盘 Prompt。\n- 不提供：任意文件读取、删除文件、提交代码、调用真实内部 API。\n\n## 练习 2：写出生命周期\n\n请在 `starter/README.md` 或代码注释中写出你的 Server 生命周期：\n\n```text\nClient 读取配置\n  -> 通过 command/args/cwd 启动 Server\n  -> stdio 建立 JSON-RPC 通道\n  -> initialize\n  -> initialized\n  -> tools/list、resources/list、prompts/list\n  -> tools/call、resources/read、prompts/get\n  -> Client 关闭连接\n  -> Server 清理资源并退出\n```\n\n实现时要特别注意：\n\n- stdout 只能输出 MCP 协议消息。\n- 普通日志写 stderr。\n- 启动失败时错误信息要能帮助定位配置问题。\n\n## 练习 3：设计 Tools\n\n先设计两个只读工具：\n\n| Tool | 输入 | 输出 | 说明 |\n| --- | --- | --- | --- |\n| `search_notes` | `query`、`limit` | 匹配到的笔记列表 | 搜索本地学习笔记 |\n| `get_note` | `note_id` | 笔记正文 | 读取指定笔记 |\n\n`search_notes` 输入 schema 示例：\n\n```json\n{\n  \"name\": \"search_notes\",\n  \"description\": \"搜索本地学习笔记。只搜索配置允许的数据目录，不读取任意本地路径。\",\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"query\": {\n        \"type\": \"string\",\n        \"minLength\": 1,\n        \"description\": \"搜索关键词，不能为空\"\n      },\n      \"limit\": {\n        \"type\": \"integer\",\n        \"minimum\": 1,\n        \"maximum\": 10,\n        \"description\": \"最多返回条数，默认 5\"\n      }\n    },\n    \"required\": [\"query\"],\n    \"additionalProperties\": false\n  }\n}\n```\n\n`get_note` 输入 schema 示例：\n\n```json\n{\n  \"name\": \"get_note\",\n  \"description\": \"根据 note_id 读取学习笔记正文。不会读取任意文件路径。\",\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"note_id\": {\n        \"type\": \"string\",\n        \"minLength\": 1,\n        \"description\": \"笔记 ID，例如 mcp-basic\"\n      }\n    },\n    \"required\": [\"note_id\"],\n    \"additionalProperties\": false\n  }\n}\n```\n\n练习要求：\n\n- `query` 为空时返回清晰错误。\n- 搜索不到结果时返回空列表，而不是程序崩溃。\n- `note_id` 不存在时返回未找到错误。\n- 工具不读取配置允许范围之外的文件。\n- 默认只读，不提供删除、修改、上传能力。\n\n## 练习 4：设计 Resources\n\nResources 用来暴露可读取上下文。推荐先定义 3 个资源 URI：\n\n```text\nnotes://prompt/basic\nnotes://agent/basic\nnotes://mcp/basic\n```\n\n每个资源返回：\n\n```json\n{\n  \"contents\": [\n    {\n      \"uri\": \"notes://mcp/basic\",\n      \"mimeType\": \"text/markdown\",\n      \"text\": \"# MCP 基础\\n...\"\n    }\n  ]\n}\n```\n\n练习要求：\n\n- URI 命名清晰且稳定。\n- Resource 只读。\n- 找不到资源时返回明确错误。\n- 不允许客户端把 URI 当成本地路径拼接读取。\n\n## 练习 5：设计 Prompts\n\nPrompts 是给客户端复用的提示词模板。先设计一个学习复盘模板：\n\n```text\n请基于以下学习笔记，帮助 {level} 学习者完成复盘：\n\n主题：{topic}\n笔记内容：{notes}\n\n请输出：\n1. 一句话总结\n2. 3 个关键概念\n3. 2 个常见误区\n4. 下一步练习建议\n5. 自检清单\n```\n\n练习要求：\n\n- Prompt 模板要有名称和描述。\n- 参数要明确，例如 `topic`、`notes`、`level`。\n- `topic` 和 `notes` 缺失时返回参数错误。\n- 不要在 Prompt 中写真实密钥或内部敏感信息。\n\n## 练习 6：设计 Config\n\n使用 `config.example.json` 描述运行配置：\n\n```json\n{\n  \"serverName\": \"learning-notes-mcp\",\n  \"dataDir\": \"./data\",\n  \"enabledTools\": [\"search_notes\", \"get_note\"],\n  \"enabledResources\": [\"notes://prompt/basic\", \"notes://agent/basic\", \"notes://mcp/basic\"],\n  \"enabledPrompts\": [\"study_review\"],\n  \"permissions\": {\n    \"readOnly\": true,\n    \"allowWrite\": false\n  },\n  \"logLevel\": \"info\"\n}\n```\n\n练习要求：\n\n- 配置文件只提供示例值。\n- 不要提交真实 API Key。\n- 读写权限要明确。\n- Server 启动时校验必要配置。\n- 禁用的 Tool、Resource、Prompt 不应该暴露给 Client。\n\n## 练习 7：错误处理\n\n请实现或伪实现统一错误结构：\n\n```json\n{\n  \"error\": {\n    \"type\": \"INVALID_PARAMS\",\n    \"message\": \"query 不能为空\",\n    \"hint\": \"请传入至少 1 个字符的搜索关键词\"\n  }\n}\n```\n\n至少覆盖：\n\n| 场景 | 错误类型 |\n| --- | --- |\n| 参数缺失或为空 | `INVALID_PARAMS` |\n| 笔记不存在 | `NOT_FOUND` |\n| 读取配置外目录 | `PERMISSION_DENIED` |\n| 数据文件损坏 | `INTERNAL_ERROR` 或 `DATA_ERROR` |\n| 未启用工具 | `PERMISSION_DENIED` |\n\n## 练习 8：客户端配置\n\n连接到 AI 客户端时，建议使用本地开发配置，并确认命令、参数和工作目录都写清楚。\n\nClaude Desktop / Claude Code 的配置核心类似：\n\n```json\n{\n  \"mcpServers\": {\n    \"learning-notes\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"src.server\", \"--config\", \"config.example.json\"],\n      \"cwd\": \"/ABSOLUTE/PATH/lessons/06-mcp/04-exercises-lab/starter\",\n      \"env\": {\n        \"LOG_LEVEL\": \"info\"\n      }\n    }\n  }\n}\n```\n\n说明：\n\n- `/ABSOLUTE/PATH/...` 必须替换为本机绝对路径。\n- `env` 里不要写真实密钥。\n- 如果使用 TypeScript，替换为 `node dist/server.js` 或项目实际启动命令。\n\n## 运行方式\n\n不同语言和 SDK 的命令会不同。初学阶段可以先提供伪运行方式，等实现后再替换为真实命令。\n\nPython 示例：\n\n```bash\ncd lessons/06-mcp/04-exercises-lab/starter\npython server.py --config config.example.json\n```\n\nTypeScript 示例：\n\n```bash\ncd lessons/06-mcp/04-exercises-lab/starter\nnpm install\nnpm run dev -- --config config.example.json\n```\n\n## 调试清单\n\n- [ ] 直接运行启动命令，确认 Server 不会立刻崩溃。\n- [ ] 检查 `config.example.json` 路径是否正确。\n- [ ] 检查 `cwd` 是否为项目目录。\n- [ ] 检查 stdout 是否只输出协议消息。\n- [ ] 检查 stderr 或日志文件中是否有启动错误。\n- [ ] 用空 query 测试参数错误。\n- [ ] 用不存在 note_id 测试未找到错误。\n- [ ] 禁用某个 Tool 后确认它不再出现在列表里。\n\n## 参考答案说明\n\n参考答案建议放在 `answers/` 目录下。参考答案应展示：\n\n1. 一个可启动的最小 MCP Server。\n2. 至少 2 个 tools。\n3. 至少 1 个 resource。\n4. 至少 1 个 prompt。\n5. 一个 `config.example.json`。\n6. 清晰的错误处理。\n7. Claude Desktop / Claude Code 配置示例。\n\n参考答案不应包含：\n\n- 真实 API Key。\n- 真实内部系统地址。\n- 需要特殊权限才能运行的依赖。\n\n## 自检清单\n\n- [ ] 我能说清楚 MCP Client/Server 生命周期。\n- [ ] 我能说清楚 Tool、Resource、Prompt 的区别。\n- [ ] 每个 Tool 都有输入 schema。\n- [ ] Resource 是只读上下文，不负责执行动作。\n- [ ] Prompt 模板参数清晰。\n- [ ] Config 中没有真实密钥。\n- [ ] Server 的能力边界明确。\n- [ ] 错误处理区分参数错误、未找到、权限不足、内部错误。\n- [ ] 客户端配置使用绝对路径和占位环境变量。\n- [ ] 我能解释 stdio 与 SSE 的差异。\n",

        "content": "# MCP 实战项目：课程知识库 MCP Server\n\n## 项目目标\n\n做一个最小但完整的 MCP Server，让 AI 客户端可以通过标准协议访问本课程知识库。这个项目的重点不是接入复杂外部系统，而是把 MCP 的端到端链路跑通：生命周期、JSON-RPC、stdio 配置、tools/resources/prompts 设计、schema、错误处理、调试、权限与安全。\n\n完成后，你应该能把本仓库的课程资料封装为一个本地只读 MCP Server，并接入 Claude Desktop 或 Claude Code。\n\n## 项目场景\n\n构建一个 `course-knowledge-mcp`：\n\n- 面向：学习本课程的 AI 客户端和 Agent。\n- 数据源：本仓库 `lessons/` 下的 Markdown 课程资料。\n- 默认权限：只读。\n- 传输方式：优先 stdio。\n- 扩展方向：未来可托管为远端 SSE Server，但必须增加认证、授权、HTTPS、审计和限流。\n\n## 推荐功能\n\n### Tools\n\n```text\nsearch_lessons(query, lesson_id?, limit?)  搜索课程 Markdown 文档\nget_lesson_page(path)                      读取允许范围内的课程页面\nlist_lessons()                             列出课程章节\n```\n\n最低要求至少实现前两个 Tool。\n\n### Resources\n\n```text\ncourse://01-prompt/basic\ncourse://05-agent/review\ncourse://06-mcp/basic\ncourse://06-mcp/review\n```\n\nResource 用于暴露稳定、常用、只读的课程页面，不接收任意本地路径。\n\n### Prompts\n\n```text\nlesson_review(topic, notes, level?)        基于课程笔记生成学习复盘\nproject_checklist(project_name, goals)     生成项目验收清单\n```\n\n最低要求至少实现 `lesson_review`。\n\n## 推荐目录\n\nPython 版本：\n\n```text\ncourse-knowledge-mcp/\n  README.md\n  pyproject.toml\n  config.example.json\n  src/\n    server.py\n    config.py\n    types.py\n    tools/\n      __init__.py\n      search_lessons.py\n      get_lesson_page.py\n      list_lessons.py\n    resources/\n      __init__.py\n      course_resources.py\n    prompts/\n      __init__.py\n      lesson_review.py\n    utils/\n      errors.py\n      logger.py\n      paths.py\n  tests/\n    test_tools.py\n    test_resources.py\n  data/\n    resource_map.example.json\n```\n\nTypeScript 版本：\n\n```text\ncourse-knowledge-mcp/\n  README.md\n  package.json\n  tsconfig.json\n  config.example.json\n  src/\n    server.ts\n    config.ts\n    types.ts\n    tools/\n      index.ts\n      searchLessons.ts\n      getLessonPage.ts\n      listLessons.ts\n    resources/\n      index.ts\n      courseResources.ts\n    prompts/\n      index.ts\n      lessonReview.ts\n    utils/\n      errors.ts\n      logger.ts\n      paths.ts\n  tests/\n    tools.test.ts\n    resources.test.ts\n  data/\n    resource_map.example.json\n```\n\n## Client/Server 生命周期要求\n\n项目 README 中必须说明你的 Server 如何经历以下流程：\n\n```text\n1. Client 读取 mcpServers 配置。\n2. Client 使用 command/args/cwd 启动本地 Server。\n3. Client 与 Server 通过 stdio 交换 JSON-RPC 消息。\n4. Client 发送 initialize。\n5. Server 返回 serverInfo 和 capabilities。\n6. Client 发送 initialized。\n7. Client 发现 tools/resources/prompts。\n8. Client 根据模型需要调用 Tool、读取 Resource 或获取 Prompt。\n9. Server 校验 schema、权限和路径边界。\n10. Server 返回结构化结果或结构化错误。\n11. Client 关闭连接，Server 释放资源。\n```\n\n实现注意：普通日志不能写 stdout，避免破坏 stdio JSON-RPC 通道。\n\n## Tool 设计\n\n### Tool 1：search_lessons\n\n作用：搜索课程 Markdown 文档。\n\n输入 schema：\n\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"query\": {\n      \"type\": \"string\",\n      \"minLength\": 1,\n      \"description\": \"搜索关键词，不能为空\"\n    },\n    \"lesson_id\": {\n      \"type\": \"string\",\n      \"description\": \"可选课程 ID，例如 06-mcp\"\n    },\n    \"limit\": {\n      \"type\": \"integer\",\n      \"minimum\": 1,\n      \"maximum\": 10,\n      \"description\": \"最多返回条数，默认 5\"\n    }\n  },\n  \"required\": [\"query\"],\n  \"additionalProperties\": false\n}\n```\n\n输出建议：\n\n```json\n{\n  \"matches\": [\n    {\n      \"path\": \"lessons/06-mcp/01-basic.md\",\n      \"title\": \"MCP 基础\",\n      \"preview\": \"MCP 是 Model Context Protocol...\",\n      \"score\": 0.87\n    }\n  ]\n}\n```\n\n边界：\n\n- 只搜索配置允许的课程根目录。\n- 默认排除 `.git`、`.env`、`node_modules`、隐藏目录、密钥文件。\n- 搜索不到返回空数组，不崩溃。\n\n### Tool 2：get_lesson_page\n\n作用：读取课程页面 Markdown。\n\n输入 schema：\n\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"path\": {\n      \"type\": \"string\",\n      \"minLength\": 1,\n      \"description\": \"课程页面相对路径，例如 lessons/06-mcp/01-basic.md\"\n    }\n  },\n  \"required\": [\"path\"],\n  \"additionalProperties\": false\n}\n```\n\n输出建议：\n\n```json\n{\n  \"path\": \"lessons/06-mcp/01-basic.md\",\n  \"mimeType\": \"text/markdown\",\n  \"content\": \"# MCP 基础\\n...\"\n}\n```\n\n边界：\n\n- 只允许读取课程根目录内的 Markdown 文件。\n- 不能使用 `../` 逃逸目录。\n- 不允许读取 `.env`、密钥文件、二进制文件或用户主目录任意文件。\n\n### Tool 3：list_lessons\n\n作用：列出课程章节。\n\n输入 schema：\n\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {},\n  \"additionalProperties\": false\n}\n```\n\n输出建议：\n\n```json\n{\n  \"lessons\": [\n    {\n      \"lesson_id\": \"06-mcp\",\n      \"title\": \"MCP\",\n      \"pages\": [\"01-basic.md\", \"02-templates.md\"]\n    }\n  ]\n}\n```\n\n## Resources 设计\n\nResource URI 与本地文件使用显式映射，不允许客户端自由拼接路径。\n\n```json\n{\n  \"course://06-mcp/basic\": \"lessons/06-mcp/01-basic.md\",\n  \"course://06-mcp/templates\": \"lessons/06-mcp/02-templates.md\",\n  \"course://06-mcp/review\": \"lessons/06-mcp/07-review.md\"\n}\n```\n\nResource 返回：\n\n```json\n{\n  \"contents\": [\n    {\n      \"uri\": \"course://06-mcp/basic\",\n      \"mimeType\": \"text/markdown\",\n      \"text\": \"# MCP 基础\\n...\"\n    }\n  ]\n}\n```\n\n要求：\n\n- URI 稳定。\n- 找不到 URI 时返回 `NOT_FOUND`。\n- 映射目标仍要经过路径安全校验。\n\n## Prompts 设计\n\n### Prompt：lesson_review\n\n参数：\n\n| 参数 | 必填 | 说明 |\n| --- | --- | --- |\n| `topic` | 是 | 学习主题 |\n| `notes` | 是 | 课程笔记或 Resource 内容 |\n| `level` | 否 | 学习者水平，默认 beginner |\n\n模板：\n\n```text\n你是一名 AI 大模型课程助教。请基于以下课程笔记为 {level} 学习者生成复盘。\n\n主题：{topic}\n笔记：{notes}\n\n请输出：\n1. 一句话总结\n2. 5 个关键概念\n3. 3 个常见误区\n4. 3 个动手练习建议\n5. 自检清单\n```\n\n要求：\n\n- 参数缺失时返回 `INVALID_PARAMS`。\n- Prompt 不包含真实密钥、内部地址或私人数据。\n- 输出结构稳定，便于教学检查。\n\n## Config 设计\n\n`config.example.json` 建议包含：\n\n```json\n{\n  \"serverName\": \"course-knowledge-mcp\",\n  \"courseRoot\": \"/ABSOLUTE/PATH/AI-Agent-Learn\",\n  \"allowedDirs\": [\"lessons\"],\n  \"enabledTools\": [\"search_lessons\", \"get_lesson_page\", \"list_lessons\"],\n  \"enabledResources\": [\"course://06-mcp/basic\", \"course://06-mcp/templates\", \"course://06-mcp/review\"],\n  \"enabledPrompts\": [\"lesson_review\"],\n  \"permissions\": {\n    \"readOnly\": true,\n    \"allowWrite\": false\n  },\n  \"logLevel\": \"info\"\n}\n```\n\n原则：\n\n- 示例配置可以提交，真实密钥不可以提交。\n- `courseRoot` 在示例中用占位绝对路径。\n- 默认只读。\n- 启动时校验 `courseRoot`、`allowedDirs` 和权限配置。\n- 禁用的能力不应该出现在客户端列表里。\n\n## 客户端配置示例\n\n### Claude Desktop\n\n```json\n{\n  \"mcpServers\": {\n    \"course-knowledge\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"src.server\", \"--config\", \"config.example.json\"],\n      \"cwd\": \"/ABSOLUTE/PATH/course-knowledge-mcp\",\n      \"env\": {\n        \"LOG_LEVEL\": \"info\"\n      }\n    }\n  }\n}\n```\n\n### Claude Code\n\n```json\n{\n  \"mcpServers\": {\n    \"course-knowledge\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"src.server\", \"--config\", \"config.example.json\"],\n      \"cwd\": \"/ABSOLUTE/PATH/course-knowledge-mcp\",\n      \"env\": {\n        \"LOG_LEVEL\": \"info\"\n      }\n    }\n  }\n}\n```\n\n配置检查：\n\n- 使用绝对路径。\n- `command` 在客户端环境中可执行。\n- `cwd` 指向 MCP Server 项目目录。\n- 示例不包含真实 API Key。\n- 如果未来接入远端服务，密钥从环境变量读取。\n\n## 调试要求\n\n至少验证以下情况：\n\n1. Server 能直接用启动命令运行。\n2. 客户端能发现 tools/resources/prompts。\n3. `search_lessons({\"query\":\"MCP\"})` 返回结果。\n4. `search_lessons({\"query\":\"\"})` 返回参数错误。\n5. `get_lesson_page({\"path\":\"lessons/06-mcp/01-basic.md\"})` 返回 Markdown。\n6. `get_lesson_page({\"path\":\"../.env\"})` 返回权限错误。\n7. 读取 `course://06-mcp/basic` 返回 Markdown。\n8. 读取不存在 URI 返回未找到错误。\n9. `lesson_review` 参数缺失时返回参数错误。\n10. 日志不打印真实密钥，stdout 不出现普通日志。\n\n## 权限与安全要求\n\n最低安全基线：\n\n- 默认只读，不实现写操作。\n- 只读取 `allowedDirs` 中允许的课程目录。\n- 所有路径做 normalize/resolve 后再判断是否仍在允许目录内。\n- 拒绝 `../` 逃逸、绝对路径输入、隐藏目录、密钥文件和二进制文件。\n- 不提交真实 API Key、Token、Cookie。\n- 日志脱敏，不记录完整敏感参数。\n- Tool 返回内容视为不可信上下文，不把课程内容当系统指令执行。\n- 未来接入 SSE 时必须使用 HTTPS、认证、授权、限流和审计。\n\n## 验收标准\n\n- MCP Server 可以启动。\n- 至少提供 2 个 tools。\n- 至少提供 1 个 resource。\n- 至少提供 1 个 prompt。\n- 工具输入有 schema。\n- 错误信息清晰。\n- 不暴露真实密钥。\n- Claude Desktop / Claude Code 配置示例完整。\n- README 说明生命周期、stdio/SSE 概念、调试方式和安全边界。\n\n## 扩展方向\n\n- 接入 GitHub，但只读查询 issue/PR，写操作默认禁用。\n- 接入数据库，但只允许白名单查询。\n- 为课程搜索增加标签和章节过滤。\n- 为写操作增加用户确认和审计日志。\n- 将 MCP Server 接入前面章节实现的 Agent，让 Agent 不再直接读取课程文件。\n",

        "content": "# MCP 项目实现工程说明：课程知识库 MCP Server\n\n本项目实验用于把 06-mcp 阶段的概念落到一个端到端工程中：实现一个自定义课程知识库 MCP Server。它向 AI 客户端提供本仓库课程资料搜索、资源读取和复盘提示词模板。\n\n本项目重点是 Server 的工程边界：生命周期、JSON-RPC、stdio 传输、`tools / resources / prompts / config`、schema、错误处理、调试、权限与安全。请优先保证结构清楚、能力可解释、权限边界明确，再考虑接入更多外部系统。\n\n## 项目目标\n\n实现一个最小 MCP Server，支持：\n\n1. 通过 Tool 搜索课程 Markdown 文档。\n2. 通过 Tool 读取指定课程页面。\n3. 通过 Resource 暴露固定课程资料。\n4. 通过 Prompt 提供学习复盘模板。\n5. 通过 Config 控制课程根目录、启用能力和只读权限。\n6. 提供 Claude Desktop / Claude Code 本地配置示例。\n7. 提供可重复的本地调试和验收步骤。\n\n建议所有数据先来自本仓库 `lessons/` 目录，不接入真实数据库、内部 API 或需要网络的服务。\n\n## 端到端调用链\n\n请在实现和 README 中体现下面链路：\n\n```text\nClaude Desktop / Claude Code\n  -> 读取 mcpServers 配置\n  -> 按 command/args/cwd 启动 course-knowledge-mcp\n  -> 通过 stdio 建立 JSON-RPC 通道\n  -> initialize / initialized\n  -> tools/list、resources/list、prompts/list\n  -> tools/call: search_lessons 或 get_lesson_page\n  -> resources/read: course://06-mcp/basic\n  -> prompts/get: lesson_review\n  -> Server 返回结构化结果或结构化错误\n```\n\n关键要求：\n\n- stdout 只输出 MCP 协议消息。\n- 普通日志写 stderr 或日志文件。\n- 所有 Tool 参数先 schema 校验，再执行业务逻辑。\n- 所有路径先 normalize/resolve，再做 allowlist 校验。\n\n## 推荐文件结构\n\nPython 版本：\n\n```text\n06-project-lab/\n  README.md\n  course_knowledge_mcp/\n    pyproject.toml\n    config.example.json\n    src/\n      server.py\n      config.py\n      types.py\n      tools/\n        __init__.py\n        search_lessons.py\n        get_lesson_page.py\n        list_lessons.py\n      resources/\n        __init__.py\n        course_resources.py\n      prompts/\n        __init__.py\n        lesson_review.py\n      data/\n        resource_map.example.json\n      utils/\n        errors.py\n        logger.py\n        paths.py\n    tests/\n      test_tools.py\n      test_resources.py\n      test_paths.py\n```\n\nTypeScript 版本：\n\n```text\n06-project-lab/\n  README.md\n  course-knowledge-mcp/\n    package.json\n    tsconfig.json\n    config.example.json\n    src/\n      server.ts\n      config.ts\n      types.ts\n      tools/\n        index.ts\n        searchLessons.ts\n        getLessonPage.ts\n        listLessons.ts\n      resources/\n        index.ts\n        courseResources.ts\n      prompts/\n        index.ts\n        lessonReview.ts\n      data/\n        resource_map.example.json\n      utils/\n        errors.ts\n        logger.ts\n        paths.ts\n    tests/\n      tools.test.ts\n      resources.test.ts\n      paths.test.ts\n```\n\n## 模块职责\n\n| 模块 | 主要职责 |\n| --- | --- |\n| `server` | 创建 MCP Server，声明 serverInfo/capabilities，注册 tools/resources/prompts，选择 stdio 传输 |\n| `config` | 读取和校验配置，控制课程目录、启用能力、只读权限 |\n| `types` | 定义 LessonPage、ToolResult、Config、ResourceMapping 等结构 |\n| `tools` | 提供可执行工具，例如搜索和读取课程页面 |\n| `resources` | 提供只读资源，例如固定课程 URI |\n| `prompts` | 提供复用提示词模板 |\n| `utils/errors` | 统一错误类型和错误转换 |\n| `utils/logger` | 输出启动和调用日志，避免打印敏感信息，避免写 stdout |\n| `utils/paths` | 路径 normalize/resolve、安全边界检查、文件类型过滤 |\n\n## Config 设计\n\n`config.example.json` 建议包含：\n\n```json\n{\n  \"serverName\": \"course-knowledge-mcp\",\n  \"courseRoot\": \"/ABSOLUTE/PATH/AI-Agent-Learn\",\n  \"allowedDirs\": [\"lessons\"],\n  \"enabledTools\": [\"search_lessons\", \"get_lesson_page\", \"list_lessons\"],\n  \"enabledResources\": [\"course://06-mcp/basic\", \"course://06-mcp/templates\", \"course://06-mcp/review\"],\n  \"enabledPrompts\": [\"lesson_review\"],\n  \"permissions\": {\n    \"readOnly\": true,\n    \"allowWrite\": false\n  },\n  \"logLevel\": \"info\"\n}\n```\n\n设计原则：\n\n- 示例配置可以提交，真实密钥不可以提交。\n- 默认只读。\n- 工具、资源、提示词是否启用由配置控制。\n- 启动时校验 `courseRoot` 是否存在、`allowedDirs` 是否在根目录内、权限配置是否合理。\n- `allowWrite=false` 时不注册任何写操作。\n- 如果以后需要密钥，只从环境变量读取，并在示例中使用 `${ENV_NAME}` 占位。\n\n## Tools 设计\n\n### Tool 1：search_lessons\n\n作用：根据关键词搜索本仓库课程 Markdown。\n\n输入 schema：\n\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"query\": {\n      \"type\": \"string\",\n      \"minLength\": 1,\n      \"description\": \"搜索关键词，不能为空\"\n    },\n    \"lesson_id\": {\n      \"type\": \"string\",\n      \"description\": \"可选课程 ID，例如 06-mcp\"\n    },\n    \"limit\": {\n      \"type\": \"integer\",\n      \"minimum\": 1,\n      \"maximum\": 10,\n      \"description\": \"最多返回条数，默认 5\"\n    }\n  },\n  \"required\": [\"query\"],\n  \"additionalProperties\": false\n}\n```\n\n输出建议：\n\n```json\n{\n  \"matches\": [\n    {\n      \"path\": \"lessons/06-mcp/01-basic.md\",\n      \"title\": \"MCP 基础\",\n      \"preview\": \"MCP 是 Model Context Protocol，可以理解为...\",\n      \"score\": 0.87\n    }\n  ]\n}\n```\n\n错误处理要求：\n\n- `query` 为空：返回 `INVALID_PARAMS`。\n- `lesson_id` 不存在：返回空结果或 `NOT_FOUND`，二选一并在 README 中说明。\n- 数据目录不存在：返回 `INTERNAL_ERROR`，日志记录安全细节。\n- 搜索不到：返回空 `matches`，不崩溃。\n\n### Tool 2：get_lesson_page\n\n作用：读取指定课程页面全文。\n\n输入 schema：\n\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"path\": {\n      \"type\": \"string\",\n      \"minLength\": 1,\n      \"description\": \"课程页面相对路径，例如 lessons/06-mcp/01-basic.md\"\n    }\n  },\n  \"required\": [\"path\"],\n  \"additionalProperties\": false\n}\n```\n\n输出建议：\n\n```json\n{\n  \"path\": \"lessons/06-mcp/01-basic.md\",\n  \"mimeType\": \"text/markdown\",\n  \"content\": \"# MCP 基础\\n...\"\n}\n```\n\n错误处理要求：\n\n- 参数缺失：返回 `INVALID_PARAMS`。\n- 文件不存在：返回 `NOT_FOUND`。\n- 路径逃逸、绝对路径、隐藏目录、密钥文件：返回 `PERMISSION_DENIED`。\n- 非 Markdown 文件：返回 `PERMISSION_DENIED` 或 `INVALID_PARAMS`，并说明策略。\n\n### Tool 3：list_lessons\n\n作用：列出课程章节和页面，便于客户端发现课程结构。\n\n输入 schema：\n\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {},\n  \"additionalProperties\": false\n}\n```\n\n输出建议：\n\n```json\n{\n  \"lessons\": [\n    {\n      \"lesson_id\": \"06-mcp\",\n      \"title\": \"MCP\",\n      \"pages\": [\"01-basic.md\", \"02-templates.md\", \"07-review.md\"]\n    }\n  ]\n}\n```\n\n## Resources 设计\n\nResources 适合暴露稳定、只读、可引用的上下文。\n\n推荐 URI：\n\n```text\ncourse://01-prompt/basic\ncourse://05-agent/review\ncourse://06-mcp/basic\ncourse://06-mcp/templates\ncourse://06-mcp/review\n```\n\n资源映射示例：\n\n```json\n{\n  \"course://06-mcp/basic\": \"lessons/06-mcp/01-basic.md\",\n  \"course://06-mcp/templates\": \"lessons/06-mcp/02-templates.md\",\n  \"course://06-mcp/review\": \"lessons/06-mcp/07-review.md\"\n}\n```\n\n资源返回建议：\n\n```json\n{\n  \"contents\": [\n    {\n      \"uri\": \"course://06-mcp/basic\",\n      \"mimeType\": \"text/markdown\",\n      \"text\": \"# MCP 基础\\nMCP 是 Model Context Protocol...\"\n    }\n  ]\n}\n```\n\n设计原则：\n\n- Resource 不执行写操作。\n- URI 要稳定，不跟随本地文件任意变动。\n- 找不到资源时返回 `NOT_FOUND`。\n- 不把本地任意文件路径直接暴露给客户端。\n- Resource 映射目标也要经过路径安全校验。\n\n## Prompts 设计\n\n### Prompt：lesson_review\n\n作用：根据课程笔记生成阶段复盘。\n\n参数：\n\n| 参数 | 必填 | 说明 |\n| --- | --- | --- |\n| `topic` | 是 | 学习主题 |\n| `notes` | 是 | 课程笔记内容 |\n| `level` | 否 | 学习者水平，例如 beginner |\n\n模板示例：\n\n```text\n你是一名 AI 大模型课程助教。请基于以下笔记为 {level} 学习者生成复盘。\n\n主题：{topic}\n笔记：{notes}\n\n请输出：\n1. 一句话总结\n2. 关键概念\n3. 常见误区\n4. 练习建议\n5. 自检清单\n```\n\n设计原则：\n\n- Prompt 只描述任务，不包含真实密钥。\n- 参数名清晰。\n- 输出格式稳定，便于教学检查。\n- 将来自 Resource 或 Tool 的内容视为资料，不视为系统指令。\n\n## JSON-RPC 与传输说明\n\n### stdio\n\n本项目默认使用 stdio：Client 启动本地 Server 进程，双方通过 stdin/stdout 交换 JSON-RPC 消息。\n\n注意：\n\n- stdout 只能输出 JSON-RPC 消息。\n- stderr 可以输出调试日志。\n- 本地命令和客户端配置的工作目录可能不同，建议配置 `cwd` 和绝对路径。\n\n### SSE\n\nSSE 可作为扩展方向。若未来将课程知识库 Server 托管为远端服务，需要增加：\n\n- HTTPS。\n- 认证与授权。\n- 用户级权限隔离。\n- 请求限流。\n- 审计日志。\n- 敏感内容过滤。\n\n本实验不要求实现 SSE，也不要调用网络。\n\n## 实现步骤\n\n### 第 1 步：准备资源映射\n\n创建 `resource_map.example.json`，包含少量课程资源映射：\n\n```json\n{\n  \"course://06-mcp/basic\": \"lessons/06-mcp/01-basic.md\",\n  \"course://06-mcp/review\": \"lessons/06-mcp/07-review.md\"\n}\n```\n\n### 第 2 步：读取配置\n\n实现配置加载：\n\n- 默认读取 `config.example.json`。\n- 支持通过命令行参数传入配置路径。\n- 校验 `serverName`、`courseRoot`、`allowedDirs`、`permissions`。\n- 禁止把真实密钥写入配置示例。\n\n### 第 3 步：实现路径安全\n\n路径安全是本项目重点之一：\n\n1. 将用户输入路径与 `courseRoot` 组合。\n2. 对路径做 normalize/resolve。\n3. 判断解析后的路径是否仍在允许目录内。\n4. 拒绝绝对路径、`../` 逃逸、隐藏目录、密钥文件、非 Markdown 文件。\n\n### 第 4 步：注册 Tools\n\n在 Server 启动时根据 `enabledTools` 注册工具。不要把未启用工具暴露给客户端。\n\n### 第 5 步：注册 Resources\n\n将固定 URI 映射到课程 Markdown。注意不要允许客户端通过 URI 读取任意本地文件。\n\n### 第 6 步：注册 Prompts\n\n注册 `lesson_review`，并检查必填参数是否存在。\n\n### 第 7 步：本地联调\n\n联调时重点观察：\n\n- Server 是否能启动。\n- 客户端能否列出 tools。\n- `search_lessons` 参数为空时是否返回错误。\n- `get_lesson_page` 查询不存在路径时是否返回错误。\n- 路径逃逸是否被拒绝。\n- Resource URI 不存在时是否返回错误。\n- Prompt 参数缺失时是否返回错误。\n\n## 运行方式\n\nTypeScript 示例：\n\n```bash\ncd lessons/06-mcp/06-project-lab/course-knowledge-mcp\nnpm install\nnpm run dev -- --config config.example.json\n```\n\nPython 示例：\n\n```bash\ncd lessons/06-mcp/06-project-lab/course_knowledge_mcp\npython -m src.server --config config.example.json\n```\n\n## 客户端配置示例\n\n示例应使用占位命令和占位路径，不写真实密钥。\n\nClaude Desktop / Claude Code 示例：\n\n```json\n{\n  \"mcpServers\": {\n    \"course-knowledge\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"src.server\", \"--config\", \"config.example.json\"],\n      \"cwd\": \"/ABSOLUTE/PATH/lessons/06-mcp/06-project-lab/course_knowledge_mcp\",\n      \"env\": {\n        \"LOG_LEVEL\": \"info\"\n      }\n    }\n  }\n}\n```\n\n## 验收方式\n\n### 基础验收\n\n- [ ] Server 可以启动。\n- [ ] 至少注册 2 个 tools：`search_lessons`、`get_lesson_page`。\n- [ ] 每个 tool 都有输入 schema。\n- [ ] 至少注册 1 个 resource。\n- [ ] 至少注册 1 个 prompt。\n- [ ] `config.example.json` 中没有真实密钥。\n- [ ] 默认权限是只读。\n- [ ] stdout 不输出普通日志。\n\n### 功能验收\n\n- [ ] `search_lessons({\"query\":\"MCP\"})` 能返回匹配课程页面。\n- [ ] `get_lesson_page({\"path\":\"lessons/06-mcp/01-basic.md\"})` 能返回正文。\n- [ ] 读取 `course://06-mcp/basic` 能返回 Markdown 文本。\n- [ ] 调用 `lesson_review` 能生成带参数的提示词。\n\n### 异常验收\n\n- [ ] `search_lessons({\"query\":\"\"})` 返回参数错误。\n- [ ] `get_lesson_page({\"path\":\"not-exist.md\"})` 返回未找到。\n- [ ] `get_lesson_page({\"path\":\"../.env\"})` 返回权限错误。\n- [ ] 未启用工具不会出现在工具列表中。\n- [ ] 不存在的 Resource URI 返回明确错误。\n- [ ] 日志不打印真实密钥、Token 或 Cookie。\n\n## 进阶扩展\n\n基础版本完成后，可以继续尝试：\n\n- 增加写操作工具，但必须加入用户确认和权限开关。\n- 为搜索结果增加标签过滤。\n- 将资源映射到更多课程阶段。\n- 为 Prompt 增加不同学习水平参数。\n- 接入 Agent 阶段的研究助手，让研究助手通过 MCP 使用工具。\n- 将 stdio Server 改造成远端 SSE Server，并补齐认证、授权、审计和限流。\n",

        "content": "# 06 MCP 阶段复盘\n\n本阶段的核心是理解 MCP 如何把“工具、资源、提示词模板”从某个 Agent 内部抽离出来，变成可被多个 AI 客户端复用的标准服务。MCP Server 不是简单脚本集合，而是一个有协议边界、生命周期边界、权限边界和配置边界的上下文服务。\n\n## 本阶段你应该掌握什么\n\n完成 06-mcp 后，你应该能够说明：\n\n1. MCP Client 是能力使用方，MCP Server 是能力提供方。\n2. 一个 MCP 会话通常经历启动、initialize、能力发现、调用、关闭。\n3. MCP 消息采用 JSON-RPC 2.0 风格，请求、响应、错误都应该结构化。\n4. stdio 适合本地开发，SSE 适合远端服务但需要更强安全控制。\n5. Tools 是可执行动作，Resources 是只读上下文，Prompts 是可复用提示词模板。\n6. 一个 MCP Server 至少要考虑注册能力、输入 schema、错误处理、调试和配置管理。\n7. Config 应该控制 Server 名称、数据目录、启用能力和权限边界。\n8. MCP 可以让 Agent 更标准地接入外部系统，而不是在 Agent 代码里硬编码所有工具。\n\n## 推荐复盘问题\n\n### 1. 你的 Server 提供什么，不提供什么？\n\n一个好的 MCP Server 应该有清晰边界。例如课程知识库 Server 可以提供：\n\n- 搜索课程 Markdown。\n- 读取允许范围内的课程页面。\n- 暴露固定课程 Resource。\n- 返回学习复盘 Prompt。\n\n但它不应该默认提供：\n\n- 删除本地文件。\n- 读取任意路径。\n- 读取 `.env`、密钥文件或用户主目录其他文件。\n- 自动上传敏感资料。\n- 在没有确认的情况下执行写操作。\n\n### 2. Client/Server 生命周期是否讲得清楚？\n\n请用自己的话复述：\n\n```text\nClient 读取配置\n  -> 启动或连接 Server\n  -> 建立 stdio 或 SSE 传输\n  -> initialize / initialized\n  -> list tools/resources/prompts\n  -> callTool/readResource/getPrompt\n  -> 返回结果或错误\n  -> 关闭连接并清理资源\n```\n\n如果你只能解释 Tool 调用，却解释不清初始化和能力发现，说明对 MCP 还停留在“函数调用”层面。\n\n### 3. Tools、Resources、Prompts 是否混在一起？\n\n请检查：\n\n- 如果它会执行动作或查询系统，通常是 Tool。\n- 如果它是稳定、只读、可引用内容，通常是 Resource。\n- 如果它是可复用的任务模板，通常是 Prompt。\n\n不要把所有能力都做成 Tool。这样会让权限边界变得模糊。\n\n### 4. 输入 schema 是否足够明确？\n\n每个 Tool 都应该说明：\n\n- 需要哪些参数。\n- 参数类型是什么。\n- 哪些参数必填。\n- 参数为空或不合法时如何返回错误。\n- 是否允许额外字段。\n- 枚举值、长度、数量范围是什么。\n\n输入 schema 是客户端正确调用工具的基础。schema 越含糊，模型越容易传错参数。\n\n### 5. Config 是否只是摆设？\n\n配置文件应该真正影响 Server 行为，例如：\n\n- 禁用的 Tool 不注册。\n- 不存在的 `courseRoot` 或 `dataDir` 会启动失败或提示错误。\n- `readOnly=true` 时不允许写操作。\n- `allowedDirs` 控制能读取哪些目录。\n- 日志级别可以控制输出内容。\n\n如果修改配置对系统没有影响，说明配置设计还没有落地。\n\n### 6. 错误处理是否可诊断？\n\n至少要区分：\n\n| 类型 | 场景 | 用户可见信息 |\n| --- | --- | --- |\n| `INVALID_PARAMS` | query 为空 | 参数不合法，并说明哪个参数 |\n| `NOT_FOUND` | note_id 或 URI 不存在 | 资源不存在 |\n| `PERMISSION_DENIED` | 路径逃逸、只读模式写入 | 权限不足或不允许访问 |\n| `UPSTREAM_ERROR` | 外部服务不可用 | 依赖暂不可用 |\n| `INTERNAL_ERROR` | 未预期异常 | 内部错误，请看安全日志 |\n\n对外错误要清楚，但不要泄露本地敏感路径、Token、Cookie、完整隐私字段。\n\n### 7. stdio 和 SSE 的边界是否清楚？\n\nstdio：\n\n- 本地进程。\n- stdin/stdout 交换 JSON-RPC。\n- 适合本地课程知识库、文件系统、本地开发。\n- stdout 不能打印普通日志。\n\nSSE：\n\n- 通常是远端 HTTP 长连接。\n- 适合托管服务和多客户端共享。\n- 必须关注 HTTPS、认证、授权、限流、审计。\n- 不要把内部服务裸露到公网。\n\n## 常见错误\n\n### 错误 1：把 MCP Server 写成普通命令行脚本\n\n表现：脚本能跑，但没有 tools/resources/prompts 的清晰注册关系，也没有 initialize 和能力发现概念。\n\n改法：\n\n- 单独建立 `tools/`、`resources/`、`prompts/` 模块。\n- 在 `server` 入口统一注册能力。\n- 为每种能力写清楚名称、描述和参数。\n- 在 README 中说明 Client/Server 生命周期。\n\n### 错误 2：Tool 没有输入 schema\n\n表现：客户端不知道如何传参，调用失败后也不知道哪里错。\n\n改法：\n\n- 每个 Tool 都定义 JSON Schema 或等价结构。\n- 参数缺失时返回明确错误。\n- 在 README 中给出示例输入输出。\n- 使用 `additionalProperties: false` 收紧参数。\n\n### 错误 3：Resource 可以读取任意文件\n\n表现：客户端传入路径后，Server 直接读取本地文件。\n\n风险：可能泄露敏感文件。\n\n改法：\n\n- 使用固定 URI 或受控映射。\n- 只允许读取配置范围内的数据。\n- 不把用户输入直接拼接成本地文件路径。\n- 对路径做 normalize/resolve 并校验是否仍在允许目录内。\n\n### 错误 4：Config 中写入真实密钥\n\n表现：`config.json` 或 README 示例里出现真实 Token、Cookie、API Key。\n\n改法：\n\n- 只提交 `config.example.json`。\n- 使用占位符，例如 `${COURSE_API_TOKEN}`。\n- 真实密钥通过环境变量或本地未提交配置提供。\n- 日志中也要脱敏。\n\n### 错误 5：错误信息不清楚\n\n表现：工具失败后只返回“failed”。\n\n改法：\n\n- 区分参数错误、未找到、权限不足、内部错误。\n- 错误信息对初学者友好。\n- 日志记录必要上下文，但不要记录敏感信息。\n\n### 错误 6：stdout 被日志污染\n\n表现：本地命令看起来有输出，但客户端连接失败或卡住。\n\n原因：stdio 模式下 stdout 是协议通道，普通日志会破坏 JSON-RPC 消息。\n\n改法：\n\n- 普通日志写 stderr。\n- 调试信息写日志文件。\n- 保证 stdout 只写 MCP 协议消息。\n\n### 错误 7：客户端配置依赖当前 shell 环境\n\n表现：终端能运行，Claude Desktop / Claude Code 不能运行。\n\n原因：客户端启动时 PATH、工作目录、环境变量可能与终端不同。\n\n改法：\n\n- 配置 `cwd`。\n- 使用绝对路径。\n- 明确声明 env。\n- 不依赖交互式 shell 初始化脚本。\n\n## 检查清单\n\n### 概念检查\n\n- [ ] 我能解释 MCP Client 和 MCP Server 的关系。\n- [ ] 我能复述 MCP 会话生命周期。\n- [ ] 我能解释 JSON-RPC 请求、响应、错误的基本结构。\n- [ ] 我能区分 Tool、Resource、Prompt。\n- [ ] 我能说明 stdio 和 SSE 的适用场景。\n- [ ] 我能说明为什么 MCP 对 Agent 工程有帮助。\n- [ ] 我能解释为什么 Server 需要权限边界。\n\n### 工程检查\n\n- [ ] Server 入口负责统一注册能力。\n- [ ] `tools/`、`resources/`、`prompts/` 目录职责清晰。\n- [ ] 每个 Tool 都有输入 schema。\n- [ ] Resource 使用稳定 URI，不暴露任意本地路径。\n- [ ] Prompt 模板参数清晰。\n- [ ] Config 能控制启用能力和权限。\n- [ ] 默认不包含写操作，或写操作需要明确权限和确认。\n- [ ] 日志不泄露真实密钥。\n- [ ] stdout 不输出普通日志。\n- [ ] Claude Desktop / Claude Code 配置示例使用占位路径和占位环境变量。\n\n### 验收检查\n\n- [ ] Server 可以在本地启动。\n- [ ] 客户端可以列出 tools。\n- [ ] `search_lessons` 或 `search_notes` 能处理正常查询和空查询。\n- [ ] `get_lesson_page` 或 `get_note` 能处理存在和不存在的 ID/路径。\n- [ ] 路径逃逸或越权访问会被拒绝。\n- [ ] 至少一个 Resource 可以被读取。\n- [ ] 至少一个 Prompt 可以被使用。\n- [ ] 配置禁用某个工具后，该工具不会被暴露。\n- [ ] 日志不包含 Token、Cookie、API Key 或私人数据。\n\n## 阶段交付物建议\n\n完成本阶段后，建议保留以下交付物：\n\n1. MCP Server 项目 README。\n2. `config.example.json`，只包含占位值。\n3. 至少 2 个 Tool 的 schema 和示例输入输出。\n4. Resource URI 到课程页面的映射说明。\n5. 至少 1 个 Prompt 模板。\n6. Claude Desktop / Claude Code 配置示例。\n7. 调试记录：启动、正常调用、参数错误、未找到、权限拒绝。\n8. 安全说明：默认只读、路径 allowlist、日志脱敏、密钥管理。\n\n## 下一步\n\n学完 MCP 后，可以把 05-agent 和 06-mcp 连接起来：\n\n1. 让研究助手不再直接调用本地函数，而是通过 MCP Server 使用工具。\n2. 把学习笔记作为 MCP Resources 提供给 Agent。\n3. 把阶段复盘模板作为 MCP Prompt 提供给 Agent。\n4. 在 Agent 工具日志中记录每次 MCP 调用。\n\n继续学习时，可以关注：\n\n- Claude Code 如何配置 MCP Server。\n- Claude Desktop 如何加载本地 stdio Server。\n- MCP Server 如何接入真实数据源。\n- 写操作工具如何设计用户确认。\n- 远端 SSE Server 如何做认证、授权、限流和审计。\n- 多个 MCP Server 如何组合成 Agent 的工具生态。\n\n当你能把一个 Agent 的工具能力抽象为 MCP Server，并能解释生命周期、schema、错误处理、调试和安全边界，就完成了从“单体 Agent 脚本”到“可复用 AI 工程能力”的关键一步。\n",

        "content": "# 06 MCP\n\n## 学习目标\n\n理解 MCP（Model Context Protocol）如何让 AI 应用标准化连接外部工具和数据源。\n\n## 学习内容\n\n- [基础讲解](01-basic.md)\n- [常用模板](02-templates.md)\n- [练习任务](03-exercises.md)\n- [练习工程](04-exercises-lab/README.md)\n- [实战项目](05-project.md)\n- [项目工程](06-project-lab/README.md)\n- [阶段复盘](07-review.md)\n- [MCP Server Lab：课程知识库最小实现指南](mcp-server-lab/README.md)\n\n## 核心概念\n\n- MCP Client\n- MCP Server\n- Tools\n- Resources\n- Prompts\n- Sampling\n- JSON-RPC\n- stdio / SSE\n- Schema\n- 错误处理\n- 调试\n- 权限与边界\n\n## 学习任务\n\n1. 理解 MCP Client 和 MCP Server 的关系与生命周期。\n2. 区分 Tools、Resources、Prompts。\n3. 理解 JSON-RPC、stdio 和 SSE 的基本概念。\n4. 阅读 Claude Desktop / Claude Code 的 MCP Server 配置。\n5. 设计一个有 schema、错误处理和权限边界的自定义 MCP Tool。\n6. 实现一个课程知识库 MCP Server。\n\n## 实战项目\n\n做一个课程知识库 MCP Server。\n",

        "content": "# MCP Server Lab：课程知识库最小实现指南\n\n本目录用于补充 06 MCP 的端到端教学内容，目标是指导你实现一个“课程知识库 MCP Server”的最小版本。这里不放真实密钥，不调用网络，不要求连接真实内部系统。\n\n## 目标能力\n\n最小 Server 应该提供：\n\n- Tools\n  - `search_lessons`：搜索课程 Markdown。\n  - `get_lesson_page`：读取允许范围内的课程页面。\n- Resources\n  - `course://06-mcp/basic`\n  - `course://06-mcp/review`\n- Prompts\n  - `lesson_review`\n- Config\n  - 控制课程根目录、启用能力、只读权限、日志级别。\n\n## 推荐目录\n\n```text\nmcp-server-lab/\n  README.md\n  course_knowledge_mcp/\n    config.example.json\n    src/\n      server.py\n      config.py\n      tools/\n        search_lessons.py\n        get_lesson_page.py\n      resources/\n        course_resources.py\n      prompts/\n        lesson_review.py\n      utils/\n        errors.py\n        logger.py\n        paths.py\n    data/\n      resource_map.example.json\n```\n\n如果你选择 TypeScript，可以把 `.py` 替换为 `.ts`，结构保持一致。\n\n## Server 生命周期\n\n请在实现中对应下面步骤：\n\n```text\n1. 解析 --config 参数。\n2. 读取 config.example.json。\n3. 校验 courseRoot 和 allowedDirs。\n4. 创建 MCP Server，声明 name/version/capabilities。\n5. 注册启用的 tools/resources/prompts。\n6. 使用 stdio 传输启动。\n7. 等待 Client 发送 initialize。\n8. 响应 tools/list、resources/list、prompts/list。\n9. 处理 tools/call、resources/read、prompts/get。\n10. 连接关闭后释放资源。\n```\n\n## JSON-RPC 调用示例\n\n教学时可以用下面请求理解 Tool 调用结构：\n\n```json\n{\n  \"jsonrpc\": \"2.0\",\n  \"id\": 1,\n  \"method\": \"tools/call\",\n  \"params\": {\n    \"name\": \"search_lessons\",\n    \"arguments\": {\n      \"query\": \"MCP\",\n      \"lesson_id\": \"06-mcp\",\n      \"limit\": 5\n    }\n  }\n}\n```\n\n成功结果可以返回：\n\n```json\n{\n  \"matches\": [\n    {\n      \"path\": \"lessons/06-mcp/01-basic.md\",\n      \"title\": \"MCP 基础\",\n      \"preview\": \"MCP 是 Model Context Protocol...\"\n    }\n  ]\n}\n```\n\n参数错误可以返回：\n\n```json\n{\n  \"error\": {\n    \"type\": \"INVALID_PARAMS\",\n    \"message\": \"query 不能为空\"\n  }\n}\n```\n\n## Tool schema\n\n### search_lessons\n\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"query\": {\n      \"type\": \"string\",\n      \"minLength\": 1,\n      \"description\": \"搜索关键词\"\n    },\n    \"lesson_id\": {\n      \"type\": \"string\",\n      \"description\": \"可选课程 ID，例如 06-mcp\"\n    },\n    \"limit\": {\n      \"type\": \"integer\",\n      \"minimum\": 1,\n      \"maximum\": 10,\n      \"description\": \"最多返回条数\"\n    }\n  },\n  \"required\": [\"query\"],\n  \"additionalProperties\": false\n}\n```\n\n### get_lesson_page\n\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"path\": {\n      \"type\": \"string\",\n      \"minLength\": 1,\n      \"description\": \"课程页面相对路径，例如 lessons/06-mcp/01-basic.md\"\n    }\n  },\n  \"required\": [\"path\"],\n  \"additionalProperties\": false\n}\n```\n\n## Resource 映射\n\n使用固定 URI 映射课程文件：\n\n```json\n{\n  \"course://06-mcp/basic\": \"lessons/06-mcp/01-basic.md\",\n  \"course://06-mcp/review\": \"lessons/06-mcp/07-review.md\"\n}\n```\n\n要求：\n\n- URI 不等于本地路径。\n- 读取 URI 时仍要做路径安全校验。\n- 不存在的 URI 返回 `NOT_FOUND`。\n\n## Prompt 模板\n\n`lesson_review`：\n\n```text\n你是一名 AI 大模型课程助教。请基于以下课程笔记为 {level} 学习者生成复盘。\n\n主题：{topic}\n笔记：{notes}\n\n请输出：\n1. 一句话总结\n2. 关键概念\n3. 常见误区\n4. 练习建议\n5. 自检清单\n```\n\n参数：\n\n- `topic`：必填。\n- `notes`：必填。\n- `level`：可选，默认 `beginner`。\n\n## config.example.json\n\n```json\n{\n  \"serverName\": \"course-knowledge-mcp\",\n  \"courseRoot\": \"/ABSOLUTE/PATH/AI-Agent-Learn\",\n  \"allowedDirs\": [\"lessons\"],\n  \"enabledTools\": [\"search_lessons\", \"get_lesson_page\"],\n  \"enabledResources\": [\"course://06-mcp/basic\", \"course://06-mcp/review\"],\n  \"enabledPrompts\": [\"lesson_review\"],\n  \"permissions\": {\n    \"readOnly\": true,\n    \"allowWrite\": false\n  },\n  \"logLevel\": \"info\"\n}\n```\n\n## Claude Desktop / Claude Code 配置示例\n\n```json\n{\n  \"mcpServers\": {\n    \"course-knowledge\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"src.server\", \"--config\", \"config.example.json\"],\n      \"cwd\": \"/ABSOLUTE/PATH/lessons/06-mcp/mcp-server-lab/course_knowledge_mcp\",\n      \"env\": {\n        \"LOG_LEVEL\": \"info\"\n      }\n    }\n  }\n}\n```\n\n说明：\n\n- 使用本机绝对路径替换 `/ABSOLUTE/PATH/...`。\n- 不要在配置中写真实 Token、Cookie、API Key。\n- 如果未来需要密钥，使用环境变量，并确保本地私有配置不提交。\n\n## stdio 与 SSE\n\n本实验默认 stdio：\n\n- Client 启动本地进程。\n- 通过 stdin/stdout 交换 JSON-RPC。\n- stdout 只能输出协议消息。\n- 日志写 stderr。\n\nSSE 作为扩展方向：\n\n- 适合远端 Server。\n- 必须使用 HTTPS。\n- 必须有认证、授权、限流和审计。\n- 不要把内部服务直接暴露到公网。\n\n## 安全要求\n\n- 默认只读。\n- 不实现删除、修改、上传能力。\n- 只允许读取 `allowedDirs`。\n- 拒绝绝对路径、`../`、隐藏目录、密钥文件、非 Markdown 文件。\n- 日志脱敏，不记录 Token、Cookie、API Key。\n- Tool 返回内容作为不可信上下文，不作为系统指令执行。\n\n## 调试与验收\n\n至少完成以下检查：\n\n- [ ] Server 启动命令可运行。\n- [ ] Client 能发现 `search_lessons` 和 `get_lesson_page`。\n- [ ] `search_lessons({\"query\":\"MCP\"})` 返回结果。\n- [ ] `search_lessons({\"query\":\"\"})` 返回 `INVALID_PARAMS`。\n- [ ] `get_lesson_page({\"path\":\"lessons/06-mcp/01-basic.md\"})` 返回 Markdown。\n- [ ] `get_lesson_page({\"path\":\"../.env\"})` 返回 `PERMISSION_DENIED`。\n- [ ] `course://06-mcp/basic` 可读取。\n- [ ] 不存在 Resource 返回 `NOT_FOUND`。\n- [ ] `lesson_review` 缺少 `topic` 或 `notes` 时返回参数错误。\n- [ ] stdout 没有普通日志。\n",

        "content": "# Claude Code / CLI / Skill 基础\n\n本节把 Claude Code 看成一个“能在工程仓库里行动的 CLI Agent”。它不是单纯聊天机器人，而是能在用户授权范围内读文件、搜索代码、编辑文件、运行命令、调用工具，并把过程沉淀成可复用工作流的工程助手。\n\n## 1. CLI Agent 是什么\n\nCLI Agent 是运行在命令行里的 AI Agent。它通常具备三类能力：\n\n1. **理解上下文**：读取 `README.md`、`CLAUDE.md`、源码、测试、配置和 Git diff。\n2. **执行动作**：搜索、编辑、运行测试、查看日志、生成变更说明。\n3. **遵守边界**：通过 settings、permissions、hooks、人工确认来限制高风险操作。\n\n适合 Claude Code 的任务一般具有这些特征：\n\n- 需要理解多个文件，而不是只回答一个概念问题。\n- 可以通过测试、lint、diff 或人工 review 验收。\n- 能明确说明范围和禁止事项。\n- 允许 Agent 在隔离环境里尝试、修正、复盘。\n\n不适合直接交给 Agent 自动执行的任务：删除生产数据、发布线上版本、输出真实密钥、绕过权限、未经确认推送代码。\n\n## 2. Claude Code 是什么\n\nClaude Code 是面向软件工程任务的 CLI Agent。它适合做：\n\n- 解释陌生代码库。\n- 修复 bug。\n- 添加测试。\n- 小步重构。\n- 代码审查和安全审查。\n- 生成迁移计划。\n- 自动化重复流程。\n\n一个成熟的 Claude Code 工作方式通常是：\n\n```text\n读项目规则 -> 搜索相关代码 -> 阅读最小必要文件 -> 制定计划 -> 等待确认 -> 修改 -> 验证 -> 总结\n```\n\n## 3. `CLAUDE.md`：项目级说明书\n\n`CLAUDE.md` 是给 Claude Code 的项目说明。它相当于“新同事入组文档 + 自动化边界说明”。\n\n建议包含：\n\n- 项目介绍和技术栈。\n- 常用命令：测试、lint、格式化、启动开发服务。\n- 代码规范：命名、目录、测试要求。\n- 工作流程：是否需要先计划、是否允许直接修改。\n- 安全边界：不要输出密钥、不要自动提交、不要连接生产环境。\n- 最终回复格式：修改文件、验证结果、风险和后续建议。\n\n不要只写“请写高质量代码”。Agent 需要的是可执行规则，例如：\n\n```md\n- 修改代码前先搜索相关测试。\n- 只改与当前任务直接相关的文件。\n- 删除文件、git commit、git push、访问生产系统前必须询问用户。\n- 任务结束时报告修改文件、运行过的命令和未验证事项。\n```\n\n## 4. Slash Command：固定流程入口\n\nSlash Command 是一个可复用的工作流入口，适合把常见任务写成稳定步骤。\n\n示例：\n\n```text\n/review\n/security-review\n/implement-feature\n/summarize-work\n```\n\n它适合描述“如何做一件事”：输入是什么、步骤是什么、输出格式是什么、遇到风险何时停下来问用户。\n\n## 5. Skill 是什么\n\nSkill 是比单个 slash command 更完整的能力包。它通常封装某个领域或某类任务的知识、流程、工具使用方式和安全约束。\n\n可以把它理解为：\n\n```text\nSkill = 触发说明 + 专业知识 + 操作流程 + 工具规则 + 示例/脚手架\n```\n\n### Skill 解决什么问题\n\n当任务只靠一句 prompt 容易不稳定时，可以用 Skill 固化经验：\n\n- 同一类任务反复出现，例如 PR review、安全审查、迁移代码、生成发布说明。\n- 任务有固定术语、目录、约束和验收标准。\n- 需要先检查风险，再决定能否执行。\n- 需要调用特定工具或遵守特定顺序。\n\n### Skill 和 slash command 的区别\n\n| 项目 | Slash Command | Skill |\n| --- | --- | --- |\n| 关注点 | 一条可执行流程 | 一个领域能力包 |\n| 典型内容 | 步骤、输出格式 | 触发条件、背景知识、工具规则、流程、示例 |\n| 适用场景 | 固定任务入口 | 专业任务、复杂规范、跨项目复用 |\n| 例子 | `/review` | `security-review`、`claude-api`、内部文档处理 skill |\n\n### 什么时候应该用 Skill\n\n适合使用 Skill：\n\n- 用户请求命中某个专业领域，例如“做安全审查”“检查 Claude API prompt caching”。\n- 项目里有固定流程，需要 Agent 每次都遵守。\n- 操作前必须做风险判断，例如权限、密钥、生产环境、外部系统。\n- 学习内容较多，单个 prompt 放不下或容易遗漏。\n\n不一定需要 Skill：\n\n- 一次性小问题，例如“解释这个函数”。\n- 没有固定流程的开放讨论。\n- 只需要普通代码搜索和阅读。\n\n## 6. Skill 的常见目录结构\n\n教学中可以使用下面结构理解 Skill：\n\n```text\n.claude/\n  skills/\n    my-skill/\n      SKILL.md\n      examples/\n        good-request.md\n        bad-request.md\n      scripts/\n        check.sh\n      templates/\n        report.md\n```\n\n核心文件通常是 `SKILL.md`，里面至少要写：\n\n```md\n---\nname: my-skill\ndescription: 当用户要做某类任务时使用。这里要写清触发词、适用边界和不适用场景。\n---\n\n# My Skill\n\n## 何时使用\n\n## 工作流程\n\n## 工具使用规则\n\n## 安全边界\n\n## 输出格式\n```\n\n### 触发/描述怎么写\n\n`description` 决定 Agent 何时应该使用这个 Skill。它要具体、可判定、包含边界。\n\n不推荐：\n\n```md\ndescription: 帮助写代码。\n```\n\n推荐：\n\n```md\ndescription: 当用户要求为当前仓库做小型功能开发、补测试、运行本地验证并输出变更总结时使用。若涉及删除文件、git commit、git push、访问网络或生产环境，必须先询问用户。\n```\n\n好的 description 应包含：\n\n- 触发词：用户说什么时用。\n- 任务边界：能做什么、不能做什么。\n- 风险处理：哪些情况先停下询问。\n- 输出要求：最终报告什么。\n\n## 7. Settings 和 Permissions\n\nSettings 用于配置 Claude Code 行为。Permissions 用于控制工具和命令是否允许自动执行、需要确认或禁止。\n\n常见配置位置可以按教学方式理解为：\n\n```text\n.claude/settings.json        # 项目共享配置，适合提交教学占位规则\n.claude/settings.local.json  # 个人本地配置，不应提交真实密钥或个人敏感配置\n```\n\n权限策略建议按风险分层：\n\n| 分类 | 示例 | 原则 |\n| --- | --- | --- |\n| 可自动允许 | 读取文件、列目录、搜索代码、运行单元测试、查看 git diff | 低风险、可重复、只读或局部验证 |\n| 需要确认 | 安装依赖、修改配置、创建提交、访问网络、长时间构建 | 改变环境、耗时或影响历史 |\n| 禁止自动执行 | force push、删除目录、输出密钥、修改生产数据、绕过测试 | 可能造成数据丢失、泄密或线上事故 |\n\n权限不是“越宽越高效”。初学者常犯的错误是为了减少确认，把 `rm -rf`、`git push`、安装依赖和网络访问全部放开。工程实践中应优先保证可控、可复盘。\n\n## 8. Hooks：关键时机的自动检查\n\nHooks 是在特定事件前后自动执行的命令。它让团队把“每次都应该做的检查”变成自动化。\n\n常见用途：\n\n- 编辑后运行格式化或 lint。\n- 总结前运行相关测试。\n- 执行高风险命令前做拦截或提醒。\n- 任务结束时输出检查清单。\n\n教学版 hook 需要回答三个问题：\n\n1. **何时触发**：例如编辑后、运行命令前、任务结束前。\n2. **执行什么**：例如 `npm test`、`python -m compileall`、自定义检查脚本。\n3. **失败怎么办**：停止后续自动执行、报告错误、等待用户决定。\n\n不要用 hook 自动做高风险动作，例如删除文件、提交、推送、修改生产数据。Hook 应优先用于检查和提醒，而不是替人做不可逆操作。\n\n## 9. Subagents：把复杂任务拆开\n\nSubagents 可以把复杂任务拆给多个子 Agent 处理。它们适合并行阅读、独立审查、生成不同角度的发现。\n\n典型拆法：\n\n- 代码搜索子 Agent：找入口、调用链、测试。\n- 测试子 Agent：判断现有测试覆盖和缺口。\n- 安全子 Agent：检查密钥、权限、命令风险。\n- 文档子 Agent：整理变更说明和学习材料。\n\n注意：子 Agent 的结果需要主 Agent 汇总和判断，不能把多个发现直接拼接成最终结论。主 Agent 仍要负责范围控制、冲突解决和最终验收。\n\n## 10. Plan Mode：先计划，再执行\n\nPlan Mode 适合复杂改动或高风险任务。它的价值是把“想清楚”放在“动手改”之前。\n\n建议在这些情况下使用：\n\n- 涉及多个模块或多种技术栈。\n- 需求不明确，需要先澄清。\n- 可能影响测试、构建、权限或发布流程。\n- 用户要求“先给方案，不要直接改”。\n\n一个好的计划应包含：\n\n- 需求理解。\n- 需要阅读的文件。\n- 修改范围。\n- 验证方式。\n- 风险点和需要用户确认的问题。\n\n## 11. Worktree：隔离任务环境\n\nWorktree 用于在同一仓库中创建隔离工作区，避免影响当前分支和未完成修改。\n\n适合：\n\n- 多个任务并行开发。\n- 尝试不确定方案。\n- 让 Agent 在独立目录里改动和验证。\n- 保留主工作区的干净状态。\n\n使用 worktree 时仍要注意：\n\n- 不要把敏感文件复制进实验目录。\n- 不要自动提交或推送，除非用户明确要求。\n- 最终报告需要说明“需要主会话合并的路径”。\n- 如果检查失败，要报告失败原因，而不是假装通过。\n\n## 12. 常见坑\n\n1. **Skill description 太泛**：导致不该触发时触发，或该触发时没触发。\n2. **只写流程，不写边界**：Agent 知道要做什么，却不知道哪些不能做。\n3. **settings 权限过宽**：短期减少确认，长期增加误删、误推、泄密风险。\n4. **hook 没有失败策略**：检查失败后继续执行，最后输出“已完成”。\n5. **Plan Mode 变成空话**：计划没有文件、命令、风险和验收方式。\n6. **worktree 改完不报告路径**：主会话不知道从哪里合并。\n7. **真实密钥进入示例**：教学材料、settings、日志里都不能出现真实 token、cookie、API Key。\n\n## 13. 安全边界\n\nClaude Code 可以提高工程效率，但必须保留人工监督。建议默认遵守：\n\n- 不读取、不输出、不提交真实密钥。\n- 不自动执行 destructive command，例如 `rm -rf`、`git reset --hard`、`git push --force`。\n- 不自动访问生产环境或修改生产数据。\n- 不绕过测试、hook、review 或权限系统。\n- 不把个人本地配置当作项目公共配置提交。\n- 对不确定需求先提问，不靠猜测修改大范围代码。\n\n## 一句话总结\n\nClaude Code 把 Agent 能力放进真实工程流程里；Skill、settings、permissions、hooks、subagents、plan mode 和 worktree 则帮助你把这种能力变得可复用、可验证、可控。\n",

        "content": "# Claude Code 常用模板\n\n本节提供可直接复制改造的教学模板。模板不是越长越好，而是要让 Agent 明确：上下文是什么、可以做什么、不能做什么、如何验证、如何汇报。\n\n## 1. `CLAUDE.md` 模板\n\n```markdown\n# Project Guide\n\n## 项目简介\n\n本项目是一个示例 Web 应用，用于演示功能开发、测试和代码审查流程。\n\n## 技术栈\n\n- 语言：JavaScript / TypeScript / Python，按真实项目填写\n- 包管理：npm / pnpm / pip，按真实项目填写\n- 测试：Jest / Vitest / unittest，按真实项目填写\n\n## 常用命令\n\n- 安装依赖：`npm install`\n- 启动开发：`npm run dev`\n- 运行测试：`npm test`\n- 类型检查：`npm run typecheck`\n- 格式化检查：`npm run format -- --check`\n\n## 修改规则\n\n1. 修改代码前先搜索相关实现和测试。\n2. 优先阅读最小必要文件，不要无目的扫全仓库。\n3. 每次只改与当前任务直接相关的文件。\n4. 复杂改动先给计划，等待用户确认后再执行。\n5. 新增行为必须补充或更新测试。\n\n## 安全边界\n\n- 不要读取、输出、提交真实 API Key、密码、cookie、token。\n- 不要自动执行 `git commit`、`git push`、`git reset --hard`、`git push --force`。\n- 删除文件、安装依赖、修改 CI/CD、访问网络或生产系统前必须询问用户。\n- 不要绕过测试、hooks 或 review 要求。\n\n## 输出要求\n\n任务结束时请输出：\n\n1. 修改文件。\n2. 运行过的验证命令和结果。\n3. 未验证事项。\n4. 风险和后续建议。\n```\n\n## 2. Slash Command 模板\n\n适合放在类似 `.claude/commands/implement-feature.md` 的位置。\n\n```markdown\n# /implement-feature\n\n请在当前仓库中实现一个小型功能，并补充必要测试。\n\n## 输入\n\n- 用户需求：$ARGUMENTS\n- 限制：不要自动提交 git；不要修改无关文件；如需安装依赖先询问。\n\n## 步骤\n\n1. 阅读 `CLAUDE.md`，提取项目规则和测试命令。\n2. 复述需求，列出不明确点；如需求不清晰，先提问。\n3. 搜索相关代码和测试。\n4. 阅读最小必要文件。\n5. 输出修改计划、影响范围、验证方式和风险点。\n6. 等待用户确认后再修改。\n7. 修改代码和测试。\n8. 运行相关测试或轻量检查。\n9. 查看 diff，确认没有无关修改。\n10. 输出最终总结。\n\n## 输出格式\n\n## 需求理解\n## 修改计划\n## 执行结果\n## 验证结果\n## 风险与后续建议\n```\n\n## 3. Skill 模板\n\n适合放在类似 `.claude/skills/safe-feature/SKILL.md` 的位置。不同版本 Claude Code 的真实目录和加载方式可能有差异，教学重点是理解 Skill 的组成：触发描述、流程、工具规则和边界。\n\n```markdown\n---\nname: safe-feature\ndescription: 当用户要求在当前仓库实现小型功能、补充测试、运行本地验证并总结变更时使用。若任务涉及删除文件、安装依赖、访问网络、git commit、git push、生产环境或真实密钥，必须先询问用户。\n---\n\n# Safe Feature Skill\n\n## 何时使用\n\n- 用户要求修复 bug、实现小功能、补测试、做小范围重构。\n- 用户希望 Agent 在仓库中实际编辑文件并验证。\n\n## 不适用场景\n\n- 只需要概念解释。\n- 涉及生产数据、真实密钥、发布上线或不可逆操作。\n- 需求范围过大，无法在一次任务中安全完成。\n\n## 工作流程\n\n1. 读取项目规则：优先查看 `CLAUDE.md` 和 README。\n2. 确认需求：复述目标、范围和禁止事项。\n3. 搜索代码：定位实现、测试和配置。\n4. 制定计划：说明文件、步骤、验证命令和风险。\n5. 等待确认：复杂或高风险修改必须先确认。\n6. 执行修改：小步编辑，避免无关文件。\n7. 验证：运行测试、lint 或 compile 检查。\n8. 总结：报告修改文件、验证结果、未完成事项。\n\n## 工具和权限规则\n\n- 允许：读取文件、搜索代码、查看 git diff、运行本地测试。\n- 询问：安装依赖、修改配置、运行长耗时命令、创建提交。\n- 禁止自动执行：删除目录、force push、输出密钥、修改生产数据。\n\n## 输出格式\n\n- 修改文件：\n- 验证命令：\n- 验证结果：\n- 风险：\n- 需要用户确认或合并的事项：\n```\n\n### Skill description 写法对比\n\n不推荐：\n\n```markdown\ndescription: 写代码时使用。\n```\n\n推荐：\n\n```markdown\ndescription: 当用户要求扫描当前仓库、实现小型功能、补测试并运行本地验证时使用；遇到删除、提交、推送、联网、生产环境或密钥相关操作必须先询问。\n```\n\n原因：好的描述同时说明触发条件、任务范围和安全边界。\n\n## 4. Hook 配置思路\n\n教学版“编辑后检查”示例：\n\n```json\n{\n  \"hooks\": {\n    \"PostToolUse\": [\n      {\n        \"matcher\": \"Edit|Write\",\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"npm run format -- --check\"\n          }\n        ]\n      }\n    ]\n  }\n}\n```\n\n设计 hook 时要写清楚：\n\n- 触发事件：例如编辑文件后。\n- 匹配范围：例如只匹配 `src/**/*.ts`。\n- 执行动作：例如格式化检查、lint、单元测试。\n- 失败处理：停止后续自动执行，向用户报告错误。\n\n不要把 hook 设计成自动删除、自动提交、自动推送。Hook 的默认职责应是检查和提醒。\n\n## 5. Settings / Permissions 模板\n\n教学版示例，不要复制真实个人配置，不要写真实 token。\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\n      \"Read\",\n      \"Grep\",\n      \"Bash(git status:*)\",\n      \"Bash(git diff:*)\",\n      \"Bash(python -m compileall:*)\",\n      \"Bash(npm test:*)\"\n    ],\n    \"ask\": [\n      \"Bash(npm install:*)\",\n      \"Bash(pip install:*)\",\n      \"Bash(git commit:*)\",\n      \"Bash(git push:*)\"\n    ],\n    \"deny\": [\n      \"Bash(git push --force:*)\",\n      \"Bash(rm -rf:*)\",\n      \"Bash(git reset --hard:*)\"\n    ]\n  }\n}\n```\n\n初学者只需要掌握原则：\n\n- allow：低风险、只读、可重复验证。\n- ask：改变环境、历史或外部系统。\n- deny：不可逆、泄密、生产写入、绕过安全流程。\n\n## 6. Subagents 拆分模板\n\n```markdown\n# 子 Agent 拆分方案\n\n## 背景\n\n目标：为当前仓库完成一次功能修改和审查。\n\n## 子任务\n\n1. 代码定位 Agent\n   - 搜索入口、调用链和相关测试。\n   - 输出涉及文件和理由。\n\n2. 测试分析 Agent\n   - 阅读现有测试。\n   - 判断需要新增或更新哪些用例。\n\n3. 安全检查 Agent\n   - 检查是否涉及密钥、权限、删除、网络、生产环境。\n   - 输出 BLOCK / WARN / PASS。\n\n4. 总结 Agent\n   - 根据主 Agent 确认后的事实整理最终说明。\n\n## 汇总规则\n\n主 Agent 必须统一判断多个子 Agent 的结论；冲突点要说明，不能直接拼接结果。\n```\n\n## 7. Plan Mode 输出模板\n\n```markdown\n## 需求理解\n\n- 用户要完成什么：\n- 明确限制：\n- 需要澄清的问题：\n\n## 计划\n\n1. 阅读文件：\n2. 搜索关键词：\n3. 修改范围：\n4. 验证命令：\n5. 回滚或风险处理：\n\n## 风险\n\n- 可能影响的模块：\n- 可能失败的测试：\n- 需要用户确认的操作：\n\n请确认是否按此计划执行。\n```\n\n## 8. Worktree 操作提示模板\n\n当用户要求在独立 worktree 中工作时，最终总结建议包含：\n\n```markdown\n## Worktree 结果\n\n- 工作目录：/absolute/path/to/worktree\n- 修改文件：\n- 验证结果：\n- 未提交变更：是/否\n- 需要主会话合并的路径：/absolute/path/to/worktree\n```\n\n这样主会话可以明确知道从哪里检查 diff、运行验证和合并改动。\n\n## 9. Code Review 输出模板\n\n```markdown\n## Summary\n\n- 本次变更做了什么。\n\n## Findings\n\n### BLOCK\n\n- 必须修复的问题，例如安全漏洞、测试失败、数据丢失风险。\n\n### WARN\n\n- 建议修复的问题，例如边界条件、可维护性、缺少测试。\n\n### PASS\n\n- 已检查且未发现问题的范围。\n\n## Test Plan\n\n- 已执行或建议执行的测试。\n\n## Risk\n\n- 发布、兼容性、权限、数据和安全风险。\n```\n",

        "content": "# Claude Code 练习\n\n这些练习面向中文初学者，但要求你用工程方式思考：任务是否适合 Agent、边界是否清楚、验证是否可重复、安全风险是否被控制。\n\n## 练习 1：识别适合 CLI Agent 的任务\n\n判断下面任务是否适合 Claude Code，并说明哪些需要人工确认。\n\n1. 解释一个函数作用。\n2. 修改项目代码并运行测试。\n3. 删除远程数据库。\n4. 生成 PR 总结。\n5. 批量重构变量名。\n6. 给线上用户发通知。\n7. 检查当前分支是否意外提交了密钥。\n8. 在独立 worktree 中尝试一个重构方案。\n\n思考维度：\n\n- 是否需要访问真实外部系统？\n- 是否有不可逆后果？\n- 是否能用测试、diff、日志或人工 review 验证？\n- 是否需要先计划再执行？\n\n## 练习 2：编写 `CLAUDE.md`\n\n为一个项目写 `CLAUDE.md`，至少包含：\n\n- 项目简介。\n- 技术栈和目录结构。\n- 常用命令。\n- 测试方式。\n- 代码规范。\n- 安全注意事项。\n- 最终回复格式。\n\n必须写清楚：\n\n```md\n- 不要自动提交 git。\n- 不要读取或输出真实密钥。\n- 删除文件、安装依赖、git push、修改 CI 配置前必须询问用户。\n- 任务结束时报告修改文件、验证命令和未验证事项。\n```\n\n## 练习 3：设计 Slash Command\n\n设计一个 `/study-next` 命令，用于学习下一个 AI Agent 主题。\n\n说明：\n\n- 输入是什么：当前阶段、学习者自评、可用时间。\n- 执行步骤是什么：读取课程目录、总结已学内容、推荐下一步。\n- 输出格式是什么：今日目标、练习清单、自测问题。\n- 风险边界是什么：不要自动改课程文件，除非用户明确要求。\n\n加分：再设计一个 `/implement-small-change` 命令，用于小功能开发，要求包含“先计划、再修改、后验证”。\n\n## 练习 4：设计 Skill\n\n为“小型功能开发并补测试”设计一个 Skill。写出 `SKILL.md` 的核心内容：\n\n```md\n---\nname: safe-feature\ndescription: ...\n---\n\n# Safe Feature Skill\n\n## 何时使用\n## 不适用场景\n## 工作流程\n## 工具和权限规则\n## 安全边界\n## 输出格式\n```\n\n重点练习 `description`：它必须让 Agent 知道何时触发，也必须写出哪些情况要停止并询问。\n\n参考触发描述：\n\n```md\ndescription: 当用户要求在当前仓库实现小型功能、修复 bug、补充测试并运行本地验证时使用。若涉及删除文件、安装依赖、访问网络、git commit、git push、生产环境或真实密钥，必须先询问用户。\n```\n\n## 练习 5：设计 Hook\n\n设计一个 hook：当文件被修改后自动运行格式化检查。\n\n思考：\n\n1. 什么时候触发？\n2. 匹配哪些文件？\n3. 执行什么命令？\n4. 命令失败时怎么办？\n5. 为什么不应该在 hook 里自动 commit 或 push？\n\n教学版示例：\n\n```json\n{\n  \"name\": \"format-after-edit\",\n  \"event\": \"PostToolUse\",\n  \"match\": {\n    \"tool\": \"Edit\",\n    \"path\": \"src/**/*.js\"\n  },\n  \"command\": \"npm run format -- --check\",\n  \"on_failure\": \"show_error_and_stop\"\n}\n```\n\n## 练习 6：权限分类\n\n把下面操作分为“允许自动执行 / 需要确认 / 禁止自动执行”，并说明原因。\n\n- 读取 README。\n- 搜索代码。\n- 查看 git diff。\n- 运行单元测试。\n- 安装依赖。\n- 删除文件。\n- `git commit`。\n- `git push`。\n- `git push --force`。\n- 修改 CI 配置。\n- 输出 `.env` 中的真实 token。\n- 访问生产数据库。\n\n建议原则：\n\n- 低风险、只读、可重复：可以自动允许。\n- 改变环境、代码历史或外部系统：需要确认。\n- 可能数据丢失、泄密、破坏生产：禁止自动执行。\n\n## 练习 7：Subagents 任务拆分\n\n如果要生成一整套学习文档，可以如何拆给多个子 Agent？\n\n请按主题拆分，并说明每个子 Agent 的职责：\n\n- 课程结构 Agent：检查目录和章节顺序。\n- 初学者体验 Agent：检查概念是否易懂。\n- 工程深度 Agent：补充 settings、permissions、hooks、worktree 等实践内容。\n- 安全审查 Agent：检查是否出现真实密钥、危险命令、生产操作。\n- 验收 Agent：检查是否满足任务要求和可运行性。\n\n最后由主 Agent 汇总，解决冲突并输出最终版本。\n\n## 练习 8：Plan Mode 演练\n\n面对下面需求，先写计划，不要直接修改：\n\n```text\n请为登录表单增加邮箱格式校验，错误时展示提示文案，并补充测试。不要提交 git。\n```\n\n你的计划应包含：\n\n- 要搜索的关键词。\n- 要阅读的文件类型。\n- 预计修改范围。\n- 测试命令。\n- 风险点。\n- 需要用户确认的问题。\n\n## 练习 9：Worktree 场景判断\n\n判断哪些场景适合使用独立 worktree：\n\n1. 主工作区有未提交修改，但你想让 Agent 尝试另一个方案。\n2. 只想解释一段函数。\n3. 同时进行两个互不相关的实验性重构。\n4. 要在不污染当前分支的情况下生成教学材料。\n5. 要直接修复生产环境数据。\n\n写出最终报告应包含哪些路径信息，特别是“需要主会话合并的路径”。\n\n## 练习 10：常见坑修复\n\n下面是一个糟糕的 Skill 描述：\n\n```md\ndescription: 帮我处理项目任务。\n```\n\n请把它改成一个更好的描述，要求包含：\n\n- 触发条件。\n- 适用任务。\n- 不适用任务。\n- 高风险操作处理方式。\n- 输出要求。\n\n## 综合可执行练习\n\n在 `04-exercises-lab/README.md` 的指导下，创建一个教学版 `workspace/`，完成：\n\n1. `CLAUDE.md`。\n2. 一个 slash command。\n3. 一个 `SKILL.md` 草案。\n4. 一个 hook 示例。\n5. 一个 settings 权限策略示例。\n6. 一次模拟执行记录。\n\n验收标准：同学能根据你的文件解释“Agent 会做什么、不能做什么、失败时怎么办”。\n",
        "excerpt": "这些练习面向中文初学者，但要求你用工程方式思考：任务是否适合 Agent、边界是否清楚、验证是否可重复、安全风险是否被控制。",

        "content": "# 07 Claude Code 练习实验工程\n\n本目录用于把 `03-exercises.md` 中的概念练习落到一个可操作的小工程里。练习目标不是“让 Claude Code 自动完成一切”，而是让你学会为 CLI Agent 提供清晰上下文、可复用命令、安全边界和自动化检查。\n\n## 你将练习什么\n\n完成本实验后，你应该能够：\n\n- 为一个项目编写项目级 `CLAUDE.md`。\n- 设计 1 个 slash command 的任务说明。\n- 设计 1 个 Skill 的触发描述、流程和安全边界。\n- 设计 1 个 hook 的触发条件和失败处理方式。\n- 区分 settings 中的允许、确认和禁止操作。\n- 用 plan mode 先制定方案，再执行可控修改。\n- 判断何时应该使用独立 worktree。\n- 用复盘清单判断一个 Claude Code 工作流是否安全、可解释、可复用。\n\n## 建议目录\n\n请在本目录下按下面结构完成练习文件：\n\n```text\n04-exercises-lab/\n  README.md\n  starter/\n    sample-project/\n      README.md\n      src/\n        calculator.js\n      tests/\n        calculator.test.js\n  workspace/\n    CLAUDE.md\n    commands/\n      study-next.md\n      implement-small-change.md\n    skills/\n      safe-feature/\n        SKILL.md\n        examples/\n          request.md\n    hooks/\n      format-after-edit.json\n    settings.example.json\n    run-log.md\n  answers/\n    README.md\n```\n\n说明：\n\n- `starter/`：模拟一个很小的业务项目，用来练习让 Agent 读代码、改代码、跑测试。\n- `workspace/`：学习者自己的实验产物，包含 `CLAUDE.md`、命令、Skill、hooks 和 settings 示例。\n- `answers/`：参考答案说明。不要把它当作唯一标准答案，重点看设计理由。\n\n如果你只是阅读课程，可以不真正创建全部文件；如果你要完成实验，建议按结构创建并逐步补齐。\n\n## 练习任务\n\n### 练习 1：编写项目级 `CLAUDE.md`\n\n在 `workspace/CLAUDE.md` 中写入以下内容：\n\n1. 项目简介：这个 sample project 是什么。\n2. 常用命令：如何安装依赖、运行测试、格式化代码。\n3. 修改规则：改代码前需要先读哪些文件。\n4. 安全规则：哪些命令不能自动执行。\n5. 输出要求：任务完成后如何总结。\n\n建议包含这类规则：\n\n```md\n- 修改代码前先说明计划。\n- 不要自动提交 git。\n- 不要读取或输出真实密钥。\n- 删除文件、推送代码、修改 CI 配置前必须询问用户。\n- 任务结束时报告修改文件、验证命令、验证结果和未完成事项。\n```\n\n### 练习 2：设计 slash command\n\n在 `workspace/commands/study-next.md` 中设计 `/study-next`：\n\n- 输入：当前学习阶段、学习者自评、可用时间。\n- 步骤：读取当前阶段 README、总结已学内容、推荐下一步练习。\n- 输出：今日学习目标、练习清单、检查问题。\n- 边界：不要自动修改课程文件，除非用户明确要求。\n\n在 `workspace/commands/implement-small-change.md` 中设计 `/implement-small-change`：\n\n- 输入：一个小需求，例如“给 calculator 增加除法”。\n- 步骤：读取 `CLAUDE.md`、搜索代码、阅读测试、制定计划、等待确认、修改代码、运行测试、总结变更。\n- 边界：不要自动提交，不要改无关文件；安装依赖、删除文件、访问网络前必须询问。\n\n### 练习 3：设计 Skill\n\n在 `workspace/skills/safe-feature/SKILL.md` 中写一个教学版 Skill。它应该包含 frontmatter 和正文。\n\n示例骨架：\n\n```md\n---\nname: safe-feature\ndescription: 当用户要求在当前仓库实现小型功能、修复 bug、补充测试并运行本地验证时使用。若涉及删除文件、安装依赖、访问网络、git commit、git push、生产环境或真实密钥，必须先询问用户。\n---\n\n# Safe Feature Skill\n\n## 何时使用\n\n## 不适用场景\n\n## 工作流程\n\n## 工具和权限规则\n\n## 安全边界\n\n## 输出格式\n```\n\n要求：\n\n- `description` 不能只写“帮助写代码”。\n- 必须说明触发条件和不适用场景。\n- 必须说明哪些操作允许、哪些询问、哪些禁止。\n- 必须规定最终输出格式。\n\n在 `workspace/skills/safe-feature/examples/request.md` 中写一个好请求和一个坏请求，例如：\n\n```md\n好请求：请在当前 sample project 中为 calculator 增加 divide(a, b)，除数为 0 时抛出错误，并补充测试。不要提交 git。\n\n坏请求：直接帮我改项目，顺便推送到远端。\n```\n\n### 练习 4：设计 hook\n\n在 `workspace/hooks/format-after-edit.json` 中写一个教学版 hook 配置。你不需要保证它能在所有环境直接运行，但要说明：\n\n- 触发时机：例如编辑 JS 文件后。\n- 执行动作：运行格式化或 lint。\n- 失败处理：只报告错误，不自动删除、不回滚、不提交。\n\n示例思路：\n\n```json\n{\n  \"name\": \"format-after-edit\",\n  \"event\": \"PostToolUse\",\n  \"match\": {\n    \"tool\": \"Edit\",\n    \"path\": \"src/**/*.js\"\n  },\n  \"command\": \"npm run format -- --check\",\n  \"on_failure\": \"show_error_and_stop\"\n}\n```\n\n实际 Claude Code hook schema 可能随版本变化；教学重点是理解触发条件、命令和失败策略。\n\n### 练习 5：设计 settings 权限策略\n\n在 `workspace/settings.example.json` 中写一个“教学版 settings 示例”，把操作分成三类：\n\n| 类别 | 示例 | 原则 |\n| --- | --- | --- |\n| 可自动允许 | 读取文件、列目录、运行单元测试、查看 git diff | 低风险、只读或可重复执行 |\n| 需要确认 | 安装依赖、修改配置、创建提交、访问网络 | 可能改变环境、历史或外部系统 |\n| 禁止自动执行 | 删除目录、force push、输出密钥、修改生产数据 | 可能造成数据丢失或泄密 |\n\n教学版 JSON 可以写成：\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\n      \"Read\",\n      \"Grep\",\n      \"Bash(git status:*)\",\n      \"Bash(git diff:*)\",\n      \"Bash(npm test:*)\"\n    ],\n    \"ask\": [\n      \"Bash(npm install:*)\",\n      \"Bash(git commit:*)\",\n      \"Bash(git push:*)\"\n    ],\n    \"deny\": [\n      \"Bash(git push --force:*)\",\n      \"Bash(rm -rf:*)\",\n      \"Bash(git reset --hard:*)\"\n    ]\n  }\n}\n```\n\n注意：不要把真实 token、真实 API Key、内网地址写入 settings。\n\n### 练习 6：Plan Mode 演练\n\n先不要修改代码，只在 `workspace/run-log.md` 中写计划：\n\n```text\n请阅读 sample-project，为 calculator 增加 divide(a, b)，除数为 0 时抛出错误，并补充测试。不要提交 git。\n```\n\n计划必须包含：\n\n1. 需求理解。\n2. 要阅读的文件。\n3. 要搜索的关键词。\n4. 修改范围。\n5. 测试命令。\n6. 风险点。\n7. 需要用户确认的问题。\n\n### 练习 7：一次完整演练\n\n用自然语言模拟一次 Claude Code 任务，并把执行记录追加到 `workspace/run-log.md`：\n\n```text\n请阅读 sample-project，为 calculator 增加 divide(a, b)，除数为 0 时抛出错误，并补充测试。不要提交 git。\n```\n\n记录 Agent 应该如何执行：\n\n1. 先读 `CLAUDE.md`。\n2. 搜索 `calculator` 相关代码和测试。\n3. 给出实现计划。\n4. 等待确认后修改代码和测试。\n5. 运行测试。\n6. 查看 diff，确认没有无关修改。\n7. 总结变更和未完成事项。\n\n### 练习 8：Worktree 判断\n\n回答以下问题并写入 `workspace/run-log.md`：\n\n- 当前任务是否适合独立 worktree？为什么？\n- 如果在 worktree 中完成，最终报告应该包含哪些绝对路径？\n- 哪些文件或配置不应该复制到 worktree 或提交？\n\n建议最终报告格式：\n\n```md\n## Worktree 结果\n\n- 工作目录：/absolute/path/to/worktree\n- 修改文件：\n- 验证结果：\n- 需要主会话合并的路径：/absolute/path/to/worktree\n```\n\n## 运行/使用方式\n\n这是教学实验，不强制绑定某个语言栈。推荐使用以下方式：\n\n```bash\n# 进入你创建的 sample project\ncd lessons/07-claude-code/04-exercises-lab/starter/sample-project\n\n# 如果你选择 JavaScript 示例，可安装依赖并运行测试\nnpm install\nnpm test\n```\n\n如果你没有真实 sample project，也可以只完成 `workspace/` 下的文档设计，并用伪代码说明测试命令。\n\n## 参考答案说明\n\n参考答案建议放在 `answers/README.md`，包含：\n\n- 一份可读的 `CLAUDE.md` 示例。\n- 两个 slash command 的示例内容。\n- 一个 Skill 示例，包含触发描述和安全边界。\n- 一个 hook 配置示例。\n- 一份 settings 权限策略说明。\n- 一份 plan mode 和 worktree 演练记录。\n- 对“为什么这样设计”的解释。\n\n评分时不要只看格式是否相同，更要看：\n\n- Agent 是否知道项目边界。\n- Skill 是否能准确触发，且不会越权执行。\n- 高风险操作是否需要人工确认。\n- 命令是否可重复、可检查。\n- 输出是否便于人类复盘。\n\n## 自检清单\n\n- [ ] `CLAUDE.md` 包含项目规则、测试命令、安全注意事项。\n- [ ] slash command 有输入、步骤、输出格式。\n- [ ] Skill 有明确 description、适用场景、不适用场景和安全边界。\n- [ ] hook 说明了触发条件、执行命令和失败处理。\n- [ ] settings 示例不包含真实密钥。\n- [ ] 权限策略没有自动允许删除、提交、推送等高风险动作。\n- [ ] plan mode 记录包含文件、命令、风险和验收方式。\n- [ ] worktree 记录包含需要主会话合并的绝对路径。\n- [ ] 能用 5 分钟向同学解释这个工作流如何运行。\n",

        "content": "# Claude Code 实战项目：自动化工作流与 Skill\n\n## 项目目标\n\n设计一套 Claude Code 工作流，用来处理一个常见软件工程任务：阅读需求、理解项目规则、制定计划、修改代码、运行测试、审查风险、总结变更。\n\n本项目的重点不是“让 AI 自动做完所有事”，而是训练你把 Agent 能力放进可控工程流程中：\n\n- 用 `CLAUDE.md` 提供稳定上下文。\n- 用 slash command 固化常见流程。\n- 用 Skill 封装专业任务和安全边界。\n- 用 settings / permissions 控制工具权限。\n- 用 hooks 在关键时机自动检查。\n- 用 plan mode 避免盲目修改。\n- 用 worktree 隔离实验性改动。\n- 用 subagents 拆分复杂审查任务。\n\n## 工作流场景\n\n示例任务：\n\n```text\n为项目添加一个表单校验功能，并补充测试。不要自动提交 git。\n```\n\n推荐执行流程：\n\n```text\n接收需求\n  ↓\n读取 CLAUDE.md 和项目 README\n  ↓\n识别是否命中 Skill\n  ↓\n搜索相关代码和测试\n  ↓\n进入 plan mode 制定实现计划\n  ↓\n用户确认\n  ↓\n在当前工作区或独立 worktree 中修改\n  ↓\n运行测试、lint 或轻量检查\n  ↓\n必要时调用 review / security 子流程\n  ↓\n输出总结和合并路径\n```\n\n## 推荐项目文件\n\n```text\nclaude-workflow/\n  CLAUDE.md\n  commands/\n    implement-feature.md\n    review-change.md\n    summarize-work.md\n    create-test-plan.md\n  skills/\n    safe-feature/\n      SKILL.md\n      examples/\n        form-validation-request.md\n        unsafe-request.md\n    safe-review/\n      SKILL.md\n  hooks/\n    lint-after-edit.json\n    test-before-summary.json\n  settings.example.json\n  sample-tasks/\n    task-001-form-validation.md\n    task-002-refactor-naming.md\n  checklists/\n    pre-change.md\n    post-change.md\n    safety.md\n```\n\n## 必备内容\n\n### 1. `CLAUDE.md`\n\n说明项目规则、测试命令、注意事项。它至少应该回答：\n\n- 项目是什么，主要目录在哪里？\n- 常用测试、lint、格式化命令是什么？\n- 修改代码前必须阅读哪些文件？\n- 哪些操作可以自动执行？\n- 哪些操作必须询问用户？\n- 哪些操作禁止自动执行？\n- 任务结束时如何汇报？\n\n示例规则：\n\n```md\n## 工作原则\n\n1. 先理解，再修改。\n2. 先计划，再执行。\n3. 每次只改与任务直接相关的文件。\n4. 删除文件、安装依赖、提交、推送、访问网络前必须询问用户。\n5. 禁止输出真实 API Key、密码、cookie、token。\n6. 任务结束时说明修改文件、验证结果、风险和未完成事项。\n```\n\n### 2. Slash Command\n\n设计一个 `/implement-feature` 工作流。它应该包含：\n\n- 输入：用户需求和限制。\n- 步骤：读规则、搜代码、读测试、计划、确认、修改、验证、总结。\n- 输出：需求理解、修改计划、风险、执行结果、测试结果。\n- 边界：不要自动提交，不要改无关文件，不要访问生产环境。\n\n再设计 `/review-change` 和 `/summarize-work`，分别用于代码审查和最终汇报。\n\n### 3. Skill\n\n设计一个 `safe-feature` Skill，专门处理“小型功能开发 + 补测试 + 本地验证”。\n\n`SKILL.md` 至少包含：\n\n```md\n---\nname: safe-feature\ndescription: 当用户要求在当前仓库实现小型功能、修复 bug、补充测试并运行本地验证时使用。若涉及删除文件、安装依赖、访问网络、git commit、git push、生产环境或真实密钥，必须先询问用户。\n---\n\n# Safe Feature Skill\n\n## 何时使用\n## 不适用场景\n## 工作流程\n## 工具和权限规则\n## 安全边界\n## 输出格式\n```\n\n设计要点：\n\n- `description` 必须具体，不能只写“帮助写代码”。\n- 写清楚触发词，例如“实现功能”“修复 bug”“补测试”“运行验证”。\n- 写清楚不适用场景，例如生产操作、真实密钥、发布上线、不可逆删除。\n- 写清楚工具规则，例如允许读文件和跑测试，提交和推送必须确认。\n- 写清楚验收方式，例如测试命令、diff 检查、最终总结。\n\n### 4. Hook\n\n设计至少两个 hook：\n\n1. 编辑后检查：编辑源代码文件后运行 lint 或格式化检查。\n2. 总结前测试：准备最终总结前运行相关测试，失败时必须报告。\n\nHook 文件要说明：\n\n- 触发时机。\n- 匹配范围。\n- 执行命令。\n- 失败处理。\n- 安全意义。\n\n不要让 hook 自动执行删除、提交、推送或生产写入。\n\n### 5. 权限策略\n\n在 `settings.example.json` 中说明哪些操作允许自动执行、哪些需要确认、哪些禁止。\n\n建议策略：\n\n| 分类 | 操作 | 理由 |\n| --- | --- | --- |\n| 允许 | 读取文件、搜索代码、查看 git diff、运行单元测试 | 低风险、可复盘 |\n| 询问 | 安装依赖、修改配置、创建提交、访问网络 | 改变环境或外部状态 |\n| 禁止 | force push、删除目录、输出密钥、修改生产数据 | 不可逆或可能泄密 |\n\n### 6. Subagents 拆分\n\n为复杂任务设计 subagents 拆分方案：\n\n```text\n主 Agent\n  ├─ 代码定位 Agent：找入口、调用链、测试\n  ├─ 测试 Agent：判断覆盖缺口\n  ├─ 安全 Agent：检查密钥、权限、危险命令\n  └─ 文档 Agent：整理总结和使用说明\n```\n\n要求：主 Agent 必须汇总和判断子 Agent 的发现，不能直接把结果拼接给用户。\n\n### 7. Plan Mode\n\n在复杂任务中必须先计划。计划至少包含：\n\n- 需求理解。\n- 要阅读的文件。\n- 修改范围。\n- 验证命令。\n- 风险点。\n- 需要用户确认的问题。\n\n示例输出：\n\n```md\n## 计划\n\n1. 阅读 `CLAUDE.md` 和表单模块 README。\n2. 搜索 `login`、`email`、`validation`。\n3. 修改登录表单校验逻辑和相关测试。\n4. 运行 `npm test -- login`。\n5. 风险：可能影响现有错误提示文案。\n\n请确认是否按此计划执行。\n```\n\n### 8. Worktree\n\n当用户要求隔离环境，或主工作区已有未提交修改时，应考虑使用独立 worktree。\n\n最终报告必须包含：\n\n- worktree 绝对路径。\n- 修改文件。\n- 验证命令和结果。\n- 是否有未提交变更。\n- 需要主会话合并的路径。\n\n## 验收标准\n\n- 有清晰 `CLAUDE.md`。\n- 有至少 3 个 slash command 设计。\n- 有至少 1 个 Skill 设计。\n- 有至少 2 个 hook 设计。\n- 有 settings 权限策略说明。\n- 能说明 subagents 如何拆分复杂任务。\n- 能说明 plan mode 何时使用、计划里包含什么。\n- 能说明 worktree 何时使用、如何报告合并路径。\n- 没有真实密钥、真实 token、个人隐私配置。\n- 能说明完整工作流如何运行。\n\n## 扩展方向\n\n- 接入 MCP Server，但必须先说明权限和数据边界。\n- 增加代码审查工作流。\n- 增加安全审查工作流。\n- 增加 PR 自动总结工作流。\n- 增加课程专用 Skill，让学生一键检查自己的实验产物。\n",

        "content": "# 07 Claude Code 项目实验工程\n\n本项目实验要求你设计一个“Claude Code 自动化工程助手”工作流。它不追求复杂功能，而是训练你把 `CLAUDE.md`、slash command、Skill、hooks 和 settings 组合成一个清晰、安全、可复用的教学工程。\n\n## 项目目标\n\n构建一个面向小型代码仓库的 Claude Code 工作流，使 Agent 能够在人工监督下完成：\n\n1. 阅读需求。\n2. 理解项目规则。\n3. 判断是否命中某个 Skill。\n4. 搜索和阅读相关代码。\n5. 制定修改计划。\n6. 修改代码并运行测试。\n7. 进行基础代码审查和安全检查。\n8. 输出变更总结和后续建议。\n\n本项目不要求调用真实线上服务，不要求提交 git，不要求连接生产环境，不允许写入真实密钥。\n\n## 推荐文件结构\n\n请在 `06-project-lab/` 下实现以下结构：\n\n```text\n06-project-lab/\n  README.md\n  claude-workflow/\n    CLAUDE.md\n    commands/\n      implement-feature.md\n      review-change.md\n      summarize-work.md\n      create-test-plan.md\n    skills/\n      safe-feature/\n        SKILL.md\n        examples/\n          form-validation-request.md\n          unsafe-request.md\n      safe-review/\n        SKILL.md\n    hooks/\n      lint-after-edit.json\n      test-before-summary.json\n    settings.example.json\n    sample-tasks/\n      task-001-form-validation.md\n      task-002-refactor-naming.md\n    checklists/\n      pre-change.md\n      post-change.md\n      safety.md\n    runbooks/\n      plan-mode.md\n      worktree.md\n      subagents.md\n```\n\n目录说明：\n\n- `CLAUDE.md`：项目级上下文和行为规则，是 Agent 的“工程说明书”。\n- `commands/`：把常见工作流沉淀成 slash command 文档。\n- `skills/`：封装专业场景的触发描述、流程、工具规则和安全边界。\n- `hooks/`：说明自动化检查在何时触发、执行什么、失败怎么办。\n- `settings.example.json`：教学版权限配置示例，只写占位符和原则，不写真实密钥。\n- `sample-tasks/`：给学习者演练的需求样例。\n- `checklists/`：人工验收和复盘清单。\n- `runbooks/`：记录 plan mode、worktree、subagents 的使用规范。\n\n## 实现步骤\n\n### 第 1 步：定义工程边界\n\n在 `claude-workflow/CLAUDE.md` 中写清楚：\n\n- 这个仓库的技术栈假设。\n- 常用命令，例如测试、lint、格式化。\n- 允许 Agent 自动做什么。\n- 哪些操作必须询问用户。\n- 禁止输出或记录任何真实 API Key、密码、cookie、token。\n- 不要自动提交 git，除非用户明确要求。\n\n建议规则：\n\n```md\n## 工作原则\n\n1. 先理解，再修改。\n2. 先计划，再执行。\n3. 每次只改与任务直接相关的文件。\n4. 所有高风险操作都必须等待用户确认。\n5. 任务结束时说明修改文件、测试结果和风险。\n```\n\n### 第 2 步：设计 `/implement-feature`\n\n在 `commands/implement-feature.md` 中描述一个完整功能开发流程：\n\n1. 读取 `CLAUDE.md`。\n2. 复述用户需求和限制。\n3. 判断是否命中 `safe-feature` Skill。\n4. 搜索相关代码。\n5. 阅读最小必要文件。\n6. 输出实现计划。\n7. 等待用户确认。\n8. 修改代码和测试。\n9. 运行测试。\n10. 总结结果。\n\n输出格式建议：\n\n```md\n## 需求理解\n## 使用的 Skill\n## 修改计划\n## 风险点\n## 执行结果\n## 测试结果\n## 后续建议\n```\n\n### 第 3 步：设计 Skill\n\n在 `skills/safe-feature/SKILL.md` 中设计“小型功能开发 + 补测试 + 本地验证”能力包。\n\n必须包含 frontmatter：\n\n```md\n---\nname: safe-feature\ndescription: 当用户要求在当前仓库实现小型功能、修复 bug、补充测试并运行本地验证时使用。若涉及删除文件、安装依赖、访问网络、git commit、git push、生产环境或真实密钥，必须先询问用户。\n---\n```\n\n正文必须包含：\n\n- 何时使用。\n- 不适用场景。\n- 工作流程。\n- 工具和权限规则。\n- 安全边界。\n- 输出格式。\n\n再在 `skills/safe-review/SKILL.md` 中设计一个代码审查 Skill，重点检查：\n\n- 是否修改了无关文件。\n- 是否缺少测试。\n- 是否引入密钥泄露风险。\n- 是否有破坏性命令或危险配置。\n- 是否需要更新文档。\n\n### 第 4 步：设计 `/review-change`\n\n在 `commands/review-change.md` 中设计代码审查流程。要求输出分级结果：\n\n```md\n## BLOCK\n\n必须修复，否则不能继续。\n\n## WARN\n\n建议修复或需要用户确认。\n\n## PASS\n\n已检查且未发现问题的范围。\n```\n\n审查时至少检查：\n\n- 需求是否满足。\n- 测试是否覆盖关键路径。\n- diff 是否包含无关文件。\n- settings、hooks、Skill 中是否出现真实密钥或危险权限。\n- 是否存在删除、推送、生产写入等高风险操作。\n\n### 第 5 步：设计 hooks\n\n在 `hooks/lint-after-edit.json` 中描述“编辑后检查”：\n\n- 触发：编辑源代码文件后。\n- 动作：运行 lint 或格式化检查。\n- 失败：停止后续自动执行并提示错误。\n\n在 `hooks/test-before-summary.json` 中描述“总结前测试”：\n\n- 触发：准备输出最终总结前。\n- 动作：运行相关测试。\n- 失败：总结中必须明确说明测试失败，不允许假装通过。\n\n注意：本课程中的 hook 文件是教学方案，不要求和某个版本的真实 schema 完全一致。你需要能解释它的触发条件和安全意义。\n\n### 第 6 步：设计 settings 权限策略\n\n在 `settings.example.json` 中给出示例策略：\n\n- 允许：只读搜索、读取文件、运行测试、查看 git diff。\n- 询问：安装依赖、修改构建配置、创建提交、访问网络。\n- 禁止：force push、删除目录、输出密钥、修改生产数据。\n\n不要复制真实个人配置。settings 示例中只能出现占位符和教学命令。\n\n示例结构：\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\"Read\", \"Grep\", \"Bash(git diff:*)\", \"Bash(npm test:*)\"],\n    \"ask\": [\"Bash(npm install:*)\", \"Bash(git commit:*)\", \"Bash(git push:*)\"],\n    \"deny\": [\"Bash(git push --force:*)\", \"Bash(rm -rf:*)\", \"Bash(git reset --hard:*)\"]\n  }\n}\n```\n\n### 第 7 步：准备演练任务\n\n在 `sample-tasks/task-001-form-validation.md` 中写一个小需求：\n\n```text\n为登录表单增加邮箱格式校验，错误时展示提示文案，并补充测试。不要提交 git。\n```\n\n在 `sample-tasks/task-002-refactor-naming.md` 中写一个重构需求：\n\n```text\n把 userInfo 相关变量统一改为 userProfile，保持行为不变，并运行测试。不要改无关文件。\n```\n\n每个任务都要写：\n\n- 目标。\n- 限制。\n- 建议验证命令。\n- 风险点。\n- 预期最终总结。\n\n### 第 8 步：编写验收清单\n\n在 `checklists/` 下准备三类清单：\n\n- `pre-change.md`：动手前是否理解需求、范围和风险。\n- `post-change.md`：改完后是否跑测试、看 diff、总结结果。\n- `safety.md`：是否避免密钥、删除、推送、生产操作等风险。\n\n`pre-change.md` 建议包含：\n\n```md\n- [ ] 已阅读 CLAUDE.md。\n- [ ] 已判断是否需要 Skill。\n- [ ] 已列出修改范围。\n- [ ] 已列出验证命令。\n- [ ] 高风险操作已询问用户。\n```\n\n### 第 9 步：编写 runbooks\n\n在 `runbooks/plan-mode.md` 中说明：\n\n- 什么时候必须先计划。\n- 计划应该包含哪些内容。\n- 用户确认前不能做什么。\n\n在 `runbooks/worktree.md` 中说明：\n\n- 什么时候使用独立 worktree。\n- worktree 中不能放什么敏感信息。\n- 最终如何报告绝对路径和合并路径。\n\n在 `runbooks/subagents.md` 中说明：\n\n- 哪些任务适合拆给子 Agent。\n- 每个子 Agent 的职责和输出。\n- 主 Agent 如何汇总冲突和最终结论。\n\n## 验收方式\n\n项目完成后，用下面标准验收：\n\n### 必须通过\n\n- [ ] 有可读的 `CLAUDE.md`，包含命令、规则、安全边界。\n- [ ] 至少有 4 个 slash command 设计。\n- [ ] 至少有 2 个 Skill 设计，且 description 具体可判定。\n- [ ] 至少有 2 个 hook 设计。\n- [ ] 有 settings 权限策略示例，且不包含真实密钥。\n- [ ] 有至少 2 个 sample task 可用于课堂演练。\n- [ ] 有改前、改后、安全三类检查清单。\n- [ ] 有 plan mode、worktree、subagents 的 runbook。\n\n### 加分项\n\n- [ ] slash command 输出格式统一，适合复制到课堂使用。\n- [ ] Skill 能说明不适用场景和风险处理。\n- [ ] hooks 能说明失败时如何阻断风险。\n- [ ] settings 能区分“低风险自动化”和“高风险人工确认”。\n- [ ] 项目说明中明确“不提交 git、不删除文件、不连接生产”。\n- [ ] 能说明 worktree 中的改动如何由主会话合并。\n\n## 课堂演示建议\n\n1. 教师先展示一个没有 `CLAUDE.md` 的任务，让学生观察 Agent 容易遗漏什么。\n2. 再加入 `CLAUDE.md` 和 slash command，对比输出是否更稳定。\n3. 加入 Skill，让学生观察触发描述如何影响行为。\n4. 加入 hook 和 settings，讨论自动化与安全边界。\n5. 最后在独立 worktree 中演示一次小改动，并报告合并路径。\n\n## 常见误区\n\n- 把 slash command 写成一句简单提示，缺少步骤和输出格式。\n- Skill description 太泛，导致误触发或漏触发。\n- 在 settings 示例中写入真实路径、真实 token 或个人配置。\n- hook 只写“运行测试”，但不说明失败后怎么办。\n- 让 Agent 自动 commit 或 push，忽略人工确认。\n- CLAUDE.md 写得过长，但缺少真正可执行的命令和规则。\n- plan mode 只有空泛步骤，没有文件、命令、风险和验收方式。\n- worktree 改完后没有报告绝对路径，主会话无法合并。\n",

        "content": "# 07 Claude Code 阶段复盘\n\n本阶段学习重点是：如何把 Claude Code 从“聊天式助手”变成“有项目规则、有工作流、有安全边界的工程助手”。你不仅要知道命令怎么写，还要能解释为什么这样设计、失败时怎么办、哪些操作不能自动化。\n\n## 你应该掌握的能力\n\n完成本阶段后，请确认自己能够：\n\n- 解释 `CLAUDE.md` 的作用：为 Agent 提供项目上下文、命令、规则和边界。\n- 设计 slash command：把重复任务沉淀成稳定流程。\n- 解释 Skill 是什么：把领域知识、触发条件、工具规则和安全边界封装成能力包。\n- 写出可判定的 Skill `description`：说明何时触发、何时不触发、遇到风险如何处理。\n- 说明 hook 的价值：在关键时机自动检查、阻断风险或提醒用户。\n- 理解 settings/permissions：哪些操作可以自动化，哪些必须确认，哪些禁止。\n- 在复杂任务中使用 plan mode：先计划、再执行、最后复盘。\n- 判断何时使用独立 worktree，并在最终报告中给出合并路径。\n- 知道 subagents 适合并行搜索、审查和整理，但最终判断必须由主 Agent 汇总。\n- 知道为什么不能把真实 API Key、密码、cookie、token 写入仓库、settings、Skill 示例或日志。\n\n## 本阶段核心产物\n\n建议你最终拥有以下学习产物：\n\n```text\n07-claude-code/\n  04-exercises-lab/\n    README.md\n  skill-lab/\n    README.md\n  06-project-lab/\n    README.md\n  07-review.md\n```\n\n如果你完成了项目实验，还应该有一套教学化工作流：\n\n```text\nclaude-workflow/\n  CLAUDE.md\n  commands/\n  skills/\n  hooks/\n  settings.example.json\n  checklists/\n  runbooks/\n```\n\n## 核心概念对照\n\n| 概念 | 解决什么问题 | 初学者要记住什么 |\n| --- | --- | --- |\n| `CLAUDE.md` | 项目上下文和规则 | 写具体命令、边界和输出格式 |\n| Slash command | 固定任务入口 | 写输入、步骤、输出和确认点 |\n| Skill | 领域能力包 | 写清触发描述、流程、工具规则、安全边界 |\n| Settings | 配置 Agent 行为 | 不要提交真实个人配置和密钥 |\n| Permissions | 控制工具/命令权限 | 低风险允许，高风险确认，不可逆禁止 |\n| Hooks | 自动检查关键时机 | 失败处理必须明确，不要自动做危险操作 |\n| Subagents | 拆分复杂任务 | 子 Agent 给发现，主 Agent 做判断 |\n| Plan mode | 先想清楚再改 | 计划要包含文件、命令、风险、验收方式 |\n| Worktree | 隔离工作区 | 最终报告绝对路径和合并路径 |\n\n## 常见错误\n\n### 1. 没有先定义项目边界\n\n错误表现：直接让 Agent 改代码，但没有告诉它项目结构、测试命令、禁止事项。\n\n改进方式：先写 `CLAUDE.md`，至少包含项目简介、常用命令、代码规范、安全规则和最终总结格式。\n\n### 2. slash command 只有一句话\n\n错误示例：\n\n```text\n帮我实现功能并测试。\n```\n\n问题：缺少输入、步骤、输出格式和风险控制。\n\n改进方式：把命令写成流程：理解需求、搜索代码、制定计划、确认、修改、测试、总结。\n\n### 3. Skill description 太泛\n\n错误示例：\n\n```md\ndescription: 帮助处理项目。\n```\n\n问题：Agent 不知道什么任务该触发，也不知道哪些情况必须停下。\n\n改进方式：写成可判定描述：\n\n```md\ndescription: 当用户要求在当前仓库实现小型功能、修复 bug、补充测试并运行本地验证时使用。若涉及删除文件、安装依赖、访问网络、git commit、git push、生产环境或真实密钥，必须先询问用户。\n```\n\n### 4. hook 只关注自动化，不关注失败处理\n\n错误表现：hook 写了自动格式化，但没有说明命令失败、测试失败或耗时过长时怎么办。\n\n改进方式：每个 hook 都要回答三个问题：何时触发、执行什么、失败后如何处理。默认策略应是“报告错误并停止后续自动执行”。\n\n### 5. 权限设置过宽\n\n错误表现：为了减少确认，把删除、提交、推送、安装依赖、访问网络都设为自动允许。\n\n风险：可能造成数据丢失、泄密、污染环境或错误发布。\n\n改进方式：低风险只读操作可以自动化；会改变环境、代码历史或外部系统的操作必须确认；不可逆或生产写入应禁止自动执行。\n\n### 6. Plan mode 只有空泛列表\n\n错误表现：计划里只写“阅读代码、修改、测试”，没有具体文件、命令、风险和验收方式。\n\n改进方式：计划必须回答：读哪些文件、搜哪些关键词、改哪些范围、跑什么命令、失败怎么办、需要用户确认什么。\n\n### 7. Worktree 改完不报告路径\n\n错误表现：Agent 在独立 worktree 中完成修改，但最终只说“已完成”，主会话不知道从哪里检查和合并。\n\n改进方式：最终报告必须包含 worktree 绝对路径、修改文件、验证结果、需要主会话合并的路径。\n\n### 8. 任务结束没有验收\n\n错误表现：Agent 说“已完成”，但没有测试结果、修改文件、风险说明。\n\n改进方式：要求最终输出至少包含：改了什么、测试是否通过、未验证事项、下一步建议。\n\n## 检查清单\n\n### `CLAUDE.md` 检查\n\n- [ ] 是否说明项目目标和技术栈？\n- [ ] 是否列出常用命令？\n- [ ] 是否说明测试和格式化方式？\n- [ ] 是否写明不要自动提交 git？\n- [ ] 是否禁止输出真实密钥和敏感信息？\n- [ ] 是否包含任务完成后的总结格式？\n\n### Slash command 检查\n\n- [ ] 是否有清晰输入？\n- [ ] 是否有分步骤执行流程？\n- [ ] 是否要求先计划再修改？\n- [ ] 是否说明哪些情况要询问用户？\n- [ ] 是否规定输出格式？\n\n### Skill 检查\n\n- [ ] 是否有 `name` 和具体 `description`？\n- [ ] `description` 是否包含触发词和边界？\n- [ ] 是否说明何时使用和不适用场景？\n- [ ] 是否说明工具和权限规则？\n- [ ] 是否说明安全边界？\n- [ ] 是否规定输出格式？\n- [ ] 是否避免真实 token、API Key、cookie、个人路径？\n\n### Hooks 检查\n\n- [ ] 是否说明触发事件？\n- [ ] 是否说明匹配范围？\n- [ ] 是否说明执行命令？\n- [ ] 是否说明失败处理？\n- [ ] 是否避免执行删除、推送、生产写入等高风险动作？\n\n### Settings / Permissions 检查\n\n- [ ] 是否只使用教学占位符？\n- [ ] 是否没有真实 API Key？\n- [ ] 是否区分允许、询问、禁止？\n- [ ] 是否避免把 destructive command 加入自动 allowlist？\n- [ ] 是否把 `git push --force`、`rm -rf`、生产写入列为禁止或人工处理？\n\n### Plan Mode 检查\n\n- [ ] 是否复述需求和限制？\n- [ ] 是否列出要阅读的文件和搜索关键词？\n- [ ] 是否说明修改范围？\n- [ ] 是否说明验证命令？\n- [ ] 是否说明风险和需要用户确认的问题？\n\n### Worktree 检查\n\n- [ ] 是否说明为什么需要 worktree？\n- [ ] 是否没有复制或提交敏感文件？\n- [ ] 是否报告 worktree 绝对路径？\n- [ ] 是否报告需要主会话合并的路径？\n- [ ] 是否报告验证结果和未验证事项？\n\n## 自测问题\n\n1. 为什么 `CLAUDE.md` 不应该只写“请写高质量代码”？\n2. slash command 和普通 prompt 的区别是什么？\n3. Skill 和 slash command 的区别是什么？\n4. 一个好的 Skill `description` 应包含哪些信息？\n5. 一个 hook 如果命令失败，Agent 应该继续执行还是停下来？为什么？\n6. 为什么 `git push`、删除文件、修改生产数据不能默认自动执行？\n7. settings 里为什么不能写真实 token 或个人隐私配置？\n8. 什么时候应该使用 plan mode？\n9. 什么时候应该使用独立 worktree？\n10. subagents 的结果为什么需要主 Agent 统一判断？\n11. 任务完成总结中应该包含哪些信息？\n\n## 最终验收任务\n\n请用自己的话设计一个“安全的小功能开发 Skill”，并说明：\n\n- 它何时触发。\n- 它不适合处理哪些任务。\n- 它会按什么流程执行。\n- 它允许、询问、禁止哪些操作。\n- 它如何使用 plan mode。\n- 它何时建议使用 worktree。\n- 它最终如何汇报修改文件和验证结果。\n\n如果你能让同学根据你的设计复现同样流程，说明你已经掌握了本阶段核心能力。\n\n## 下一步\n\n进入 `08-eval-security` 阶段后，你将学习如何判断 AI 应用是否真的“好用且安全”：\n\n- 用 golden dataset 做回归评测。\n- 用评分规则衡量回答质量。\n- 记录日志、token、延迟和成本。\n- 识别 prompt injection、越权操作和敏感信息泄露。\n- 生成可复盘的评测报告。\n",

        "path": "lessons/07-claude-code/README.md",
        "content": "# 07 Claude Code / CLI / Skill\n\n## 学习目标\n\n掌握 CLI Agent 在真实软件工程中的用法，包括读代码、改代码、跑测试、配置工具、设计 Skill、隔离工作区和自动化流程。\n\n## 学习内容\n\n- [基础讲解](01-basic.md)\n- [常用模板](02-templates.md)\n- [练习任务](03-exercises.md)\n- [练习实验工程](04-exercises-lab/README.md)\n- [Skill 专项实验](skill-lab/README.md)\n- [实战项目](05-project.md)\n- [项目实验工程](06-project-lab/README.md)\n- [阶段复盘](07-review.md)\n\n## 核心概念\n\n- Claude Code CLI\n- `CLAUDE.md`\n- Slash Commands\n- Skills\n- Skill 触发描述和目录结构\n- Hooks\n- Settings\n- Permissions\n- MCP 集成\n- Subagents\n- Plan Mode\n- Worktree\n- 安全边界\n\n## 学习任务\n\n1. 理解 CLI Agent 能做什么、不能自动做什么。\n2. 编写项目级 `CLAUDE.md`。\n3. 理解 slash command 和 Skill 的区别。\n4. 设计一个包含触发描述、流程和安全边界的 Skill。\n5. 配置一个简单 hook，并说明失败处理。\n6. 设计 settings / permissions 权限分层。\n7. 了解 MCP 如何接入 Claude Code。\n8. 使用 plan mode 处理复杂任务。\n9. 判断何时使用 worktree 隔离改动。\n10. 用 subagents 拆分复杂搜索、审查和总结任务。\n\n## 实战项目\n\n做一个 Claude Code 自动化工作流：用 `CLAUDE.md`、slash command、Skill、hooks、settings、plan mode 和 worktree 组合出可复用、可验证、可控的工程助手。\n",

        "content": "# Claude Code Skill Lab\n\n本实验专门练习 Skill。目标是让你从“会写 prompt”进阶到“会设计可复用能力包”：知道 Skill 什么时候触发、如何约束工具、如何处理权限、如何输出可验收结果。\n\n## 实验目标\n\n完成后你应该能够：\n\n- 用一句准确的 `description` 说明 Skill 何时使用。\n- 设计 Skill 的目录结构和 `SKILL.md`。\n- 区分 slash command 和 Skill 的职责。\n- 在 Skill 中写清 settings、permissions、hooks 的配合方式。\n- 为 Skill 设计安全边界、plan mode 和 worktree 规则。\n- 用一个可执行练习验证 Skill 是否清楚、可控、可复盘。\n\n## Skill 是什么\n\nSkill 是一个领域能力包。它不是一条简单命令，而是把某类任务的经验固化下来：\n\n```text\nSkill = 触发条件 + 专业知识 + 工作流程 + 工具规则 + 安全边界 + 输出格式\n```\n\n例如“小型功能开发 Skill”可以规定：\n\n- 用户说“实现功能 / 修 bug / 补测试”时触发。\n- 先读 `CLAUDE.md`，再搜索代码。\n- 复杂任务先进入 plan mode。\n- 允许读文件和跑测试。\n- 提交、推送、删除、联网必须询问。\n- 最终报告修改文件、验证结果、风险和合并路径。\n\n## 推荐目录结构\n\n教学中可以使用下面结构：\n\n```text\nskill-lab/\n  README.md\n  workspace/\n    .claude/\n      skills/\n        safe-feature/\n          SKILL.md\n          examples/\n            good-request.md\n            unsafe-request.md\n          templates/\n            final-report.md\n      settings.example.json\n      hooks/\n        lint-after-edit.json\n    run-log.md\n```\n\n你可以只创建 `workspace/` 下的文件作为练习产物。不要写入真实密钥，不要复制个人配置。\n\n## 步骤 1：编写 `SKILL.md`\n\n在 `workspace/.claude/skills/safe-feature/SKILL.md` 中写入：\n\n```md\n---\nname: safe-feature\ndescription: 当用户要求在当前仓库实现小型功能、修复 bug、补充测试并运行本地验证时使用。若涉及删除文件、安装依赖、访问网络、git commit、git push、生产环境或真实密钥，必须先询问用户。\n---\n\n# Safe Feature Skill\n\n## 何时使用\n\n- 实现小功能。\n- 修复明确 bug。\n- 补充或更新测试。\n- 小范围重构并保持行为不变。\n\n## 不适用场景\n\n- 只解释概念，不需要操作仓库。\n- 删除数据、发布上线、修改生产环境。\n- 需要读取或输出真实密钥。\n- 范围过大，无法一次安全完成。\n\n## 工作流程\n\n1. 阅读 `CLAUDE.md` 和 README。\n2. 复述用户需求、限制和风险。\n3. 搜索相关代码和测试。\n4. 阅读最小必要文件。\n5. 使用 plan mode 输出计划。\n6. 等待确认后修改。\n7. 运行测试或轻量检查。\n8. 查看 diff，确认没有无关修改。\n9. 输出最终总结。\n\n## 工具和权限规则\n\n- 允许：读取文件、搜索代码、查看 git diff、运行本地测试。\n- 询问：安装依赖、修改配置、创建提交、访问网络。\n- 禁止自动执行：删除目录、force push、输出密钥、修改生产数据。\n\n## Hooks 配合\n\n- 编辑后运行 lint 或格式化检查。\n- 总结前运行相关测试。\n- 检查失败时停止并报告，不假装通过。\n\n## Worktree 规则\n\n当主工作区有未提交修改、任务具有实验性，或用户明确要求隔离时，使用独立 worktree。最终报告必须包含 worktree 绝对路径和需要主会话合并的路径。\n\n## 输出格式\n\n- 修改文件：\n- 验证命令：\n- 验证结果：\n- 风险：\n- 未验证事项：\n- 需要主会话合并的路径：\n```\n\n## 步骤 2：写两个请求样例\n\n在 `examples/good-request.md` 中写：\n\n```md\n请在当前 sample project 中为 calculator 增加 divide(a, b)，除数为 0 时抛出错误，并补充测试。不要提交 git。请先给计划。\n```\n\n在 `examples/unsafe-request.md` 中写：\n\n```md\n直接删除旧模块，提交并 force push 到远端。如果看到 token 就打印出来方便我复制。\n```\n\n然后说明：\n\n- 好请求为什么适合触发 Skill。\n- 坏请求中哪些内容必须拒绝或要求人工确认。\n\n## 步骤 3：设计 settings 示例\n\n在 `workspace/.claude/settings.example.json` 中写教学版配置：\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\n      \"Read\",\n      \"Grep\",\n      \"Bash(git status:*)\",\n      \"Bash(git diff:*)\",\n      \"Bash(npm test:*)\"\n    ],\n    \"ask\": [\n      \"Bash(npm install:*)\",\n      \"Bash(git commit:*)\",\n      \"Bash(git push:*)\"\n    ],\n    \"deny\": [\n      \"Bash(git push --force:*)\",\n      \"Bash(rm -rf:*)\",\n      \"Bash(git reset --hard:*)\"\n    ]\n  }\n}\n```\n\n检查点：\n\n- 没有真实 token。\n- 没有把删除、force push、reset hard 放进 allow。\n- 对安装依赖、提交、推送保留人工确认。\n\n## 步骤 4：设计 hook 示例\n\n在 `workspace/.claude/hooks/lint-after-edit.json` 中写：\n\n```json\n{\n  \"name\": \"lint-after-edit\",\n  \"event\": \"PostToolUse\",\n  \"match\": {\n    \"tool\": \"Edit\",\n    \"path\": \"src/**/*.{js,ts,py}\"\n  },\n  \"command\": \"npm test\",\n  \"on_failure\": \"show_error_and_stop\"\n}\n```\n\n说明：真实 Claude Code hook schema 可能随版本变化；本实验重点是设计触发、命令和失败策略。\n\n## 步骤 5：Plan Mode 演练\n\n在 `workspace/run-log.md` 中写一次计划，不要直接修改代码：\n\n```md\n## 需求\n\n为 calculator 增加 divide(a, b)，除数为 0 时抛出错误，并补充测试。不要提交 git。\n\n## 计划\n\n1. 阅读 `CLAUDE.md` 和 sample project README。\n2. 搜索 `calculator`、`add`、`subtract`、`test`。\n3. 阅读 calculator 实现和测试。\n4. 修改 calculator 导出，新增 divide。\n5. 补充正常除法和除数为 0 的测试。\n6. 运行测试命令。\n7. 查看 diff，确认没有无关修改。\n\n## 风险\n\n- 现有测试框架命令可能未知，需要先从 README 或 package.json 确认。\n- 除数为 0 的错误类型和文案需要用户确认。\n```\n\n## 步骤 6：Worktree 判断\n\n在 `workspace/run-log.md` 中回答：\n\n- 这个任务是否需要独立 worktree？\n- 如果用户要求 worktree，最终报告应包含哪些绝对路径？\n- 哪些文件不能复制或提交？\n\n参考答案：\n\n```md\n如果主工作区干净，这个小任务可以直接在当前分支完成；如果主工作区已有未提交修改，或用户要求隔离，应使用独立 worktree。最终报告要包含 worktree 绝对路径、修改文件、验证命令、验证结果、需要主会话合并的路径。不要复制或提交 `.env`、真实 token、个人 settings.local.json。\n```\n\n## 可执行练习：检查你的 Skill 是否合格\n\n完成 `workspace/` 后，用下面清单检查：\n\n1. 让同学只读 `SKILL.md`，能否判断什么时候触发？\n2. 同学能否说出哪些操作允许、询问、禁止？\n3. 同学能否按流程执行一次小功能开发？\n4. 如果测试失败，Skill 是否要求明确报告失败？\n5. 如果用户要求 force push，Skill 是否会阻止？\n6. 如果在 worktree 中完成，最终是否报告绝对路径？\n7. 所有文件是否不含真实密钥？\n\n## 评分标准\n\n- PASS：触发描述清楚，流程可执行，权限分层合理，无真实密钥。\n- WARN：流程可读但边界不清，或输出格式缺少验证结果。\n- BLOCK：允许自动删除、force push、输出密钥、修改生产数据，或包含真实敏感信息。\n",
