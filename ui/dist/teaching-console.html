<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI-Agent-Learn Teaching Console</title>
  <style>
    :root {
      --paper: #f7f4ec;
      --ink: #20201d;
      --muted: #6b695f;
      --line: #d8d1c1;
      --panel: #fffcf4;
      --field: #f1eadc;
      --green: #1f7a5a;
      --green-soft: #dff0e7;
      --blue: #2458a7;
      --blue-soft: #dce8f8;
      --red: #b43d32;
      --red-soft: #f5dfdc;
      --gold: #b7791f;
      --shadow: 0 16px 36px rgba(32, 32, 29, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(90deg, rgba(32, 32, 29, 0.035) 1px, transparent 1px),
        linear-gradient(0deg, rgba(32, 32, 29, 0.035) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
      color: var(--ink);
      font-family: "Avenir Next", "Trebuchet MS", "PingFang SC", sans-serif;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
    }

    .rail {
      border-right: 1px solid var(--line);
      background: rgba(255, 252, 244, 0.86);
      backdrop-filter: blur(10px);
      padding: 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: grid;
      gap: 8px;
      margin-bottom: 28px;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      background: var(--green-soft);
      box-shadow: 5px 5px 0 var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 25px;
      font-weight: 700;
    }

    h1, h2, h3 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      letter-spacing: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.08;
    }

    h2 {
      font-size: 30px;
      line-height: 1.1;
    }

    h3 {
      font-size: 18px;
    }

    p {
      margin: 0;
      line-height: 1.65;
      color: var(--muted);
    }

    .tabs {
      display: grid;
      gap: 8px;
    }

    .tab-button {
      min-height: 44px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      text-align: left;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 150ms ease, background 150ms ease, border-color 150ms ease;
    }

    .tab-button:hover {
      transform: translateX(2px);
      border-color: var(--ink);
    }

    .tab-button[aria-selected="true"] {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .tab-icon {
      width: 24px;
      text-align: center;
      font-weight: 700;
    }

    .main {
      padding: 28px;
      max-width: 1280px;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .stamp {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
      max-width: 460px;
    }

    .view {
      display: none;
      animation: rise 260ms ease both;
    }

    .view.active {
      display: block;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 22px 0;
    }

    .metric, .panel, .stage-card, .chunk-card, .trace-row, .eval-row {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: 0 1px 0 rgba(32, 32, 29, 0.04);
    }

    .metric {
      padding: 16px;
      min-height: 94px;
    }

    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1.1;
      margin-top: 8px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 16px;
      align-items: start;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .reader-layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .reader-tools {
      display: grid;
      gap: 12px;
      position: sticky;
      top: 24px;
    }

    .doc-list {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }

    .doc-button {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffdf8;
      color: var(--ink);
      border-radius: 6px;
      padding: 10px;
      text-align: left;
      cursor: pointer;
      display: grid;
      gap: 4px;
    }

    .doc-button:hover, .doc-button.active {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .doc-button.done {
      box-shadow: inset 4px 0 0 var(--green);
    }

    .article {
      display: grid;
      gap: 18px;
    }

    .solution-panel {
      border: 1px solid var(--line);
      background: var(--blue-soft);
      border-radius: 8px;
      padding: 14px;
      display: none;
      gap: 10px;
    }

    .solution-panel.visible {
      display: grid;
    }

    .route-pill {
      display: block;
      width: 100%;
      border: 1px dashed var(--blue);
      background: rgba(255, 255, 255, 0.55);
      color: var(--blue);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      word-break: break-all;
    }

    .article-body {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 28px;
      line-height: 1.78;
    }

    .article-body h1, .article-body h2, .article-body h3 {
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .article-body h1:first-child, .article-body h2:first-child, .article-body h3:first-child {
      margin-top: 0;
    }

    .article-body p, .article-body li {
      color: var(--ink);
    }

    .article-body code {
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 1px 5px;
    }

    .article-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 14px;
    }

    .article-body th, .article-body td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      vertical-align: top;
      text-align: left;
    }

    .article-body th {
      background: var(--field);
    }

    .article-body pre code {
      background: transparent;
      border: 0;
      padding: 0;
    }

    .note-area {
      min-height: 160px;
    }

    .panel {
      padding: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--field);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .stage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .stage-card {
      padding: 14px;
      min-height: 170px;
      display: grid;
      gap: 12px;
    }

    .stage-card.current {
      border-color: var(--green);
      box-shadow: inset 4px 0 0 var(--green);
    }

    .bar {
      height: 10px;
      background: var(--field);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      width: var(--value);
    }

    .action-list {
      display: grid;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .action-list li {
      padding: 10px 12px;
      border-left: 4px solid var(--green);
      background: var(--green-soft);
      border-radius: 6px;
    }

    .control-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    select, input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffdf8;
      color: var(--ink);
      border-radius: 6px;
      padding: 10px 12px;
      outline: none;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .button {
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--paper);
      border-radius: 6px;
      min-height: 40px;
      padding: 9px 12px;
      cursor: pointer;
    }

    .button.secondary {
      background: transparent;
      color: var(--ink);
    }

    .score-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--green) calc(var(--score) * 1%), var(--field) 0);
      border: 1px solid var(--line);
      margin: 0 auto 12px;
      position: relative;
    }

    .score-ring::after {
      content: "";
      position: absolute;
      inset: 10px;
      background: var(--panel);
      border-radius: 50%;
    }

    .score-ring strong {
      position: relative;
      z-index: 1;
      font-size: 22px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #24231f;
      color: #f9f1df;
      border-radius: 8px;
      padding: 16px;
      line-height: 1.58;
      overflow: auto;
      max-height: 460px;
    }

    .chunk-list, .trace-list, .eval-list {
      display: grid;
      gap: 10px;
    }

    .chunk-card {
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .chunk-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .trace-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 12px;
      padding: 14px;
      align-items: start;
    }

    .trace-index {
      font-weight: 700;
      color: var(--blue);
    }

    .eval-row {
      display: grid;
      grid-template-columns: 90px 110px 80px minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      align-items: start;
    }

    .pass {
      color: var(--green);
      font-weight: 700;
    }

    .fail {
      color: var(--red);
      font-weight: 700;
    }

    .mini-map {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 6px;
      margin-top: 14px;
    }

    .mini-map span {
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--field);
      position: relative;
    }

    .mini-map span::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: var(--value);
      background: var(--green);
      border-radius: 0 0 3px 3px;
    }

    @media (max-width: 920px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .rail {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar, .grid-2, .grid-3, .summary-grid, .reader-layout {
        grid-template-columns: 1fr;
        display: grid;
      }

      .reader-tools {
        position: static;
      }

      .eval-row, .trace-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

        "content": "# AI-Agent-Learn\n\n从零开始学习 AI、LLM 与 Agent 工程化实践的路线仓库。目标是把概念、模板、练习、项目、数据样例和自查清单放在同一个可运行的课程工程里，帮助学习者逐步完成从 Prompt 到 RAG、Agent、MCP、评测与安全的实践闭环。\n\n## 适合谁\n\n- 想系统学习 AI Agent 工程化，但不知道从哪里开始的开发者。\n- 已经会写基础 Python，希望补齐 LLM API、工具调用、RAG、Agent 工作流的工程实践者。\n- 需要把 AI 能力接入业务系统、知识库或自动化流程的后端、前端、测试、数据同学。\n- 想用 Claude Code、MCP、自动化评测等能力提升研发效率的工程师。\n- 准备设计内部 AI 课程、工作坊或团队学习路线的讲师与技术负责人。\n\n## 如何开始\n\n### 1. 准备环境\n\n建议使用 Python 3.10+。\n\n```bash\npython -m venv .venv\nsource .venv/bin/activate\nmake install\n```\n\n如果暂时不想使用 Makefile，也可以直接执行：\n\n```bash\npython -m pip install -r requirements.txt\n```\n\n### 2. 配置环境变量\n\n复制示例配置，不要把真实 API Key 提交到仓库。\n\n```bash\ncp .env.example .env\n```\n\n按需填写 `.env` 中的本地配置。课程中的示例默认以占位符展示，真实密钥只保存在本机环境变量或 `.env` 文件中。\n\n### 3. 从总览进入课程\n\n建议先阅读：\n\n1. [labs/environment.md](labs/environment.md)：环境准备。\n2. [labs/api-key-guide.md](labs/api-key-guide.md)：API Key 安全配置。\n3. [labs/roadmap.md](labs/roadmap.md)：学习进度表。\n4. [checkpoints/README.md](checkpoints/README.md)：阶段自查方式。\n5. [lessons/00-ai-foundation/README.md](lessons/00-ai-foundation/README.md)：AI 基础导学，先理解 AI、LLM、Agent、RAG、MCP 的关系。\n\n如果你是第一次接触 AI 开发、目标是先学会“常见开发中怎么用 AI”，可以直接从开发场景入口开始：\n\n1. [labs/README.md](labs/README.md)：查看推荐阅读顺序。\n2. [labs/roadmap.md#开发实战周日常开发使用-ai](labs/roadmap.md#开发实战周日常开发使用-ai)：按 1 周节奏练习日常开发使用 AI。\n3. [labs/developer-ai-workflows.md](labs/developer-ai-workflows.md)：学习需求澄清、代码理解、实现、测试、Review、排障等开发工作流。\n4. [labs/developer-prompt-recipes.md](labs/developer-prompt-recipes.md)：复制常用提示词模板，先在真实小任务中用起来。\n\n## 五条学习路径\n\n### 路径零：AI 基础导学\n\n适合第一次接触 AI、LLM、Agent、RAG、MCP 等概念的学习者。\n\n学习顺序：\n\n1. [lessons/00-ai-foundation/README.md](lessons/00-ai-foundation/README.md)：建立 AI、机器学习、深度学习、大模型和 LLM 的整体认知。\n2. [lessons/00-ai-foundation/01-basic.md](lessons/00-ai-foundation/01-basic.md)：理解 token、上下文窗口、幻觉、Chatbot、RAG、Agent、MCP 的直观含义。\n3. [checkpoints/checkpoint-00-ai-foundation.md](checkpoints/checkpoint-00-ai-foundation.md)：完成基础自查。\n\n建议目标：能用自己的话解释 AI / LLM / RAG / Agent / MCP 的区别，知道后续每个阶段解决什么问题。\n\n### 路径一：快速入门\n\n适合想在短时间内跑通最小 Demo、建立全局认知的学习者。\n\n学习顺序：\n\n1. [lessons/01-prompt/README.md](lessons/01-prompt/README.md)：理解 Prompt 的结构化表达。\n2. [lessons/02-llm-api/README.md](lessons/02-llm-api/README.md)：了解如何通过 API 调用模型。\n3. [lessons/03-tool-use/README.md](lessons/03-tool-use/README.md)：理解模型如何选择和调用工具。\n4. [checkpoints/checkpoint-01-prompt.md](checkpoints/checkpoint-01-prompt.md) 到 [checkpoints/checkpoint-03-tool-use.md](checkpoints/checkpoint-03-tool-use.md)：完成基础自查。\n\n建议目标：能写出清晰 Prompt，能解释一次 LLM API 调用包含哪些输入输出，能设计一个简单工具调用流程。\n\n### 路径二：知识库 / RAG\n\n适合想做企业文档问答、知识库检索、客服辅助、学习资料问答的学习者。\n\n学习顺序：\n\n1. 先完成快速入门路径中的 Prompt 与 LLM API 基础。\n2. [lessons/04-rag/README.md](lessons/04-rag/README.md)：学习切分、向量化、召回、重排、生成。\n3. [data/docs/](data/docs/)：使用样例文档作为本地知识库材料。\n4. [data/eval/golden.jsonl](data/eval/golden.jsonl)：用黄金集检查问答效果。\n5. [checkpoints/checkpoint-04-rag.md](checkpoints/checkpoint-04-rag.md)：完成 RAG 自查。\n\n建议目标：能从本地 Markdown 文档构建一个最小知识库问答 Demo，并能用固定问题集评估效果。\n\n### 路径三：工程 Agent\n\n适合想做自动化任务执行、研发助手、工具编排、多步骤工作流的学习者。\n\n学习顺序：\n\n1. 完成 Prompt、LLM API、Tool Use 基础。\n2. [lessons/05-agent/README.md](lessons/05-agent/README.md)：学习 Agent 的目标、计划、行动、观察循环。\n3. [lessons/06-mcp/README.md](lessons/06-mcp/README.md)：学习 MCP 如何标准化工具和上下文接入。\n4. [lessons/07-claude-code/README.md](lessons/07-claude-code/README.md)：学习 CLI Agent、Skill、Hook 等工程协作方式。\n5. [lessons/08-eval-security/README.md](lessons/08-eval-security/README.md)：补齐评测、安全、权限和上线前检查。\n6. [checkpoints/checkpoint-05-agent.md](checkpoints/checkpoint-05-agent.md) 到 [checkpoints/checkpoint-08-eval-security.md](checkpoints/checkpoint-08-eval-security.md)：完成工程化自查。\n\n建议目标：能设计一个有边界、有权限、有日志、有评测的自动化 Agent，而不是只依赖模型自由发挥。\n\n### 路径四：日常开发使用 AI\n\n适合想先把 AI 用到需求理解、读代码、写实现、补测试、Code Review 和排障中的初学者。\n\n学习顺序：\n\n1. [labs/README.md](labs/README.md)：先按 Labs 推荐阅读顺序完成环境、安全和排障准备。\n2. [labs/roadmap.md#开发实战周日常开发使用-ai](labs/roadmap.md#开发实战周日常开发使用-ai)：按“开发实战周”安排每天的小任务。\n3. [labs/developer-ai-workflows.md](labs/developer-ai-workflows.md)：学习常见开发工作流中如何拆任务、给上下文、验收输出。\n4. [labs/developer-prompt-recipes.md](labs/developer-prompt-recipes.md)：使用现成提示词模板完成第一个小需求或 Bug 修复。\n5. 回到 [lessons/01-prompt/README.md](lessons/01-prompt/README.md)、[lessons/03-tool-use/README.md](lessons/03-tool-use/README.md)、[lessons/07-claude-code/README.md](lessons/07-claude-code/README.md)，补齐提示词、工具调用和 CLI Agent 基础。\n\n建议目标：能在不提交真实密钥、不复制生产敏感数据的前提下，用 AI 辅助完成一个可解释、可检查、可回滚的小型开发任务。\n\n## 每阶段学习顺序说明\n\n每个阶段都采用同一套结构，建议按顺序学习：\n\n1. `README.md`：先看阶段目标、学习路径和产出物。\n2. `01-basic.md`：理解核心概念，明确这个阶段解决什么问题。\n3. `02-templates.md`：学习可复用模板，沉淀提示词、代码结构或配置结构。\n4. `03-exercises.md`：完成小练习，验证是否真正理解概念。\n5. `04-exercises-lab/`：进入练习工程，把单点能力变成可运行实验。\n6. `05-project.md`：阅读阶段项目说明，理解真实场景需求。\n7. `06-project-lab/`：完成项目工程，形成可展示成果。\n8. `07-review.md`：复盘常见错误、质量标准和下一步优化方向。\n9. `checkpoints/`：最后用自查问题确认是否可以进入下一阶段。\n\n## 如何运行 demos\n\n当前仓库不强制绑定某一家模型服务。可运行实现默认使用 Python 标准库和 mock 数据，适合先理解工程结构，再逐步替换为真实模型服务。\n\n先查看可用命令：\n\n```bash\nmake help\nmake install\nmake list\nmake learn-status\nmake ui\nmake check\n```\n\n### 当前可运行实现\n\n| 阶段 | 实现目录 | 运行命令 | 学习重点 |\n| --- | --- | --- | --- |\n| 01 Prompt | [implementations/01-prompt-lab](implementations/01-prompt-lab/) | `make demo-prompt` | Prompt 模板、结构化质量检查、mock 输出 |\n| 02 LLM API | [implementations/02-llm-chat](implementations/02-llm-chat/) | `make demo-llm` | messages、streaming、多轮上下文、调用日志 |\n| 03 Tool Use | [implementations/03-tool-assistant](implementations/03-tool-assistant/) | `make demo-tool` | 工具注册、参数校验、权限确认、tool log |\n| 04 RAG | [implementations/04-rag-assistant](implementations/04-rag-assistant/) | `make demo-rag QUERY=\"Agent 和 Chatbot 区别是什么\"` | Markdown 加载、chunk、检索、引用 |\n| 05 Agent | [implementations/05-research-agent](implementations/05-research-agent/) | `make demo-agent` | 计划、工具调用、观察、报告生成 |\n| 06 MCP | [implementations/06-mcp-server](implementations/06-mcp-server/) | `make demo-mcp` | JSON-RPC、tools、resources、prompts |\n| 07 Claude Code | [implementations/07-claude-code-workflow](implementations/07-claude-code-workflow/) | `make demo-claude-code` | CLI Agent 工作流、权限策略、hook 示例 |\n| 08 Eval / Security | [implementations/08-eval-lab](implementations/08-eval-lab/) | `make demo-eval` | golden dataset、规则评分、安全样例、报告 |\n\n说明：\n\n- `lessons/` 是主课程路径，包含讲解、模板、练习、项目和复盘。\n- `implementations/` 是可运行参考工程，帮助你把概念跑起来。\n- `solutions/` 是做完练习后的答案讲解，不建议一开始就看。\n- `make demo-agent` 和 `make demo-eval` 会生成或覆盖本地报告文件。\n- 新增 01/02/06/07 demo 默认只打印输出，不写入文件。\n- `make learn-status` 会扫描课程阶段并推荐下一步；也可以传入自己的进度文件：\n\n```bash\nmake learn-status PROGRESS=data/notes/learning-progress.example.json\n```\n\n- `make ui` 会生成本地教学 GUI，可直接在浏览器中阅读完整学习资料、点击内部学习链接、通过章节入口打开对应答案、标记已读、写学习笔记，并查看 Prompt / RAG / Agent / Eval 可视化实验：\n\n```bash\nmake ui\n```\n\n生成后打开 [ui/dist/teaching-console.html](ui/dist/teaching-console.html)。详细说明见 [ui/README.md](ui/README.md)。\n- 使用真实模型服务前，请先配置 `.env`，并确认 `.gitignore` 已忽略 `.env`。\n\n也可以使用 Makefile 中的通用 lesson 入口：\n\n```bash\nmake demo STAGE=01-prompt LAB=04-exercises-lab\nmake demo STAGE=04-rag LAB=06-project-lab\n```\n\n如果目标 lesson 目录还只是课程说明，请按对应 `README.md` 完成练习。对于 RAG 练习，可优先使用 [data/docs/](data/docs/) 和 [data/eval/golden.jsonl](data/eval/golden.jsonl) 作为样例输入。\n\n## 答案与讲解\n\n完成练习后可以查看 [solutions/README.md](solutions/README.md)。答案目录按课程阶段组织，覆盖：\n\n- `03-exercises.md`：每个练习的参考答案、原因和常见错误。\n- `04-exercises-lab.md`：练习工程参考流程和验收标准。\n- `05-project.md`：项目设计讲解和评分标准。\n- `06-project-lab.md`：项目实现路线、测试方式和扩展方向。\n\n## 目录结构\n\n```text\nlessons/\n  00-ai-foundation/          AI 基础导学\n  01-prompt/                 Prompt Engineering\n  02-llm-api/                LLM API 与 SDK\n  03-tool-use/               Tool Use / Function Calling\n  04-rag/                    RAG 知识库问答\n  05-agent/                  Agent 架构\n  06-mcp/                    MCP\n  07-claude-code/            Claude Code / CLI / Skill\n  08-eval-security/          Eval / Security\nlabs/\n  README.md                  全局实验说明与推荐阅读顺序\n  environment.md             环境准备\n  api-key-guide.md           API Key 安全配置\n  troubleshooting.md         常见问题排查\n  roadmap.md                 学习进度表\n  developer-ai-workflows.md  日常开发使用 AI 的工作流\n  developer-prompt-recipes.md 常见开发提示词模板\ndata/\n  docs/                      RAG 与知识库样例文档\n  notes/                     结构化学习笔记样例\n  eval/                      评测黄金集样例\nimplementations/             01-08 全阶段可运行参考实现\ntests/                       unittest 自动化测试\ncheckpoints/                 每阶段自查问题\nsolutions/                   参考答案、讲解和项目复盘\n```\n\n## 阶段学习入口\n\n0. [AI 基础导学](lessons/00-ai-foundation/README.md)\n1. [Prompt Engineering](lessons/01-prompt/README.md)\n2. [LLM API 与 SDK](lessons/02-llm-api/README.md)\n3. [Tool Use / Function Calling](lessons/03-tool-use/README.md)\n4. [RAG 知识库问答](lessons/04-rag/README.md)\n5. [Agent 架构](lessons/05-agent/README.md)\n6. [MCP](lessons/06-mcp/README.md)\n7. [Claude Code / CLI / Skill](lessons/07-claude-code/README.md)\n8. [Eval / Security](lessons/08-eval-security/README.md)\n\n## 开发场景学习入口\n\n如果你想先解决“常见开发中怎么使用 AI”，从这里进入：\n\n1. [开发实战周 / 日常开发使用 AI](labs/roadmap.md#开发实战周日常开发使用-ai)：把学习拆成 5 个可执行日任务。\n2. [日常开发 AI 工作流](labs/developer-ai-workflows.md)：覆盖需求澄清、代码阅读、实现、测试、Review、排障。\n3. [开发提示词模板](labs/developer-prompt-recipes.md)：沉淀可复制的 Prompt Recipes。\n\n## 建议实战项目\n\n按难度递增：\n\n1. Prompt 模板库。\n2. 命令行 AI 聊天助手。\n3. PDF / Markdown 文档知识库问答。\n4. 工具调用 Agent。\n5. 代码修复 Agent。\n6. MCP Server。\n7. Claude Code 自动化工作流。\n8. 带评测、安全检查和日志追踪的工程 Agent。\n\n## 学习原则\n\n- 先理解概念，再写最小 Demo。\n- 每学一个阶段，都做一个可运行的小项目。\n- 不只关注“模型回答”，更要关注工具、上下文、权限、评测和安全。\n- Agent 不是魔法，本质是：目标拆解、工具调用、观察结果、持续推进。\n- 不提交真实 API Key，不把敏感数据放进样例数据和评测集。\n",

        "content": "# Labs 学习支持文档\n\n`labs/` 用来承载本课程所有教学实验的通用说明。每个阶段的 `04-exercises-lab` 和 `06-project-lab` 会给出具体任务，本目录提供跨阶段都适用的环境、安全和排障指南。\n\n## 推荐阅读顺序\n\n### 通用入门顺序\n\n1. [environment.md](environment.md)：准备本地学习环境。\n2. [api-key-guide.md](api-key-guide.md)：理解 API Key 安全和环境变量使用方式。\n3. [../lessons/00-ai-foundation/README.md](../lessons/00-ai-foundation/README.md)：先建立 AI、LLM、Agent、RAG、MCP 的整体认知。\n4. [troubleshooting.md](troubleshooting.md)：遇到依赖、运行、权限、模型调用问题时排查。\n5. [roadmap.md](roadmap.md)：按阶段记录学习进度。\n\n### 常见开发中使用 AI 的顺序\n\n如果你是小白，想先把 AI 用到日常开发任务中，推荐按下面顺序阅读：\n\n1. [environment.md](environment.md)：确认本地命令、编辑器和 Python 环境可用。\n2. [api-key-guide.md](api-key-guide.md)：先建立密钥和敏感信息边界，避免把真实 Key 写进仓库。\n3. [roadmap.md#开发实战周日常开发使用-ai](roadmap.md#开发实战周日常开发使用-ai)：按 5 天节奏完成需求澄清、读代码、实现、测试、Review 和排障练习。\n4. [developer-ai-workflows.md](developer-ai-workflows.md)：学习常见开发场景下如何给 AI 上下文、拆任务、检查结果。\n5. [developer-prompt-recipes.md](developer-prompt-recipes.md)：复制常用 Prompt Recipes，完成自己的第一个小需求或 Bug 修复。\n6. [troubleshooting.md](troubleshooting.md)：当 AI 输出不可运行、依赖报错或权限不清晰时回到这里排查。\n\n## Labs 的学习方式\n\n建议每个阶段都按下面节奏完成：\n\n1. **先读理论**：阅读阶段 `01-basic.md` 和 `02-templates.md`。\n2. **完成练习**：阅读 `03-exercises.md`，再到 `04-exercises-lab/` 完成工程化练习。\n3. **完成项目**：阅读 `05-project.md`，再到 `06-project-lab/` 设计或实现小项目。\n4. **阶段复盘**：阅读 `07-review.md`，用检查清单自评。\n5. **记录问题**：把卡住的问题写在自己的学习笔记里，下一次优先解决。\n\n## 学习状态工具\n\n如果你想快速知道“现在该学哪一项”，可以运行：\n\n```bash\nmake learn-status\n```\n\n如果已经有自己的学习记录，可以复制 [../data/notes/learning-progress.example.json](../data/notes/learning-progress.example.json) 为个人文件，按完成情况更新 `completed` 列表，再运行：\n\n```bash\nmake learn-status PROGRESS=data/notes/learning-progress.example.json\n```\n\n## 通用目录约定\n\n每个阶段推荐包含：\n\n```text\nlessons/<stage>/\n  README.md\n  01-basic.md\n  02-templates.md\n  03-exercises.md\n  04-exercises-lab/\n    README.md\n  05-project.md\n  06-project-lab/\n    README.md\n  07-review.md\n```\n\n说明：\n\n- `04-exercises-lab/`：偏小练习，目标是理解一个技能点。\n- `06-project-lab/`：偏综合项目，目标是把多个技能组合起来。\n- `07-review.md`：阶段复盘、常见错误和检查清单。\n\n## 学习原则\n\n- 不要在仓库中写入真实 API Key、密码、cookie、token。\n- 不要把生产数据复制到学习实验中。\n- 不要在不理解命令含义时执行删除、推送、覆盖等高风险操作。\n- 先用 mock 数据跑通流程，再接入真实模型。\n- 先追求可解释、可复盘，再追求自动化。\n\n## 适合初学者的完成标准\n\n一个 lab 不需要一次做到完美，只要满足：\n\n- 能说明它解决什么问题。\n- 有清晰输入和输出。\n- 有最小可运行或可演示流程。\n- 有基本安全边界。\n- 有复盘记录和下一步改进方向。\n\n## 和 07、08 阶段的关系\n\n- [developer-ai-workflows.md](developer-ai-workflows.md)：把 07 阶段的 CLI Agent 能力落到需求澄清、读代码、实现、测试、Review、排障等日常开发流程中。\n- [developer-prompt-recipes.md](developer-prompt-recipes.md)：把 Prompt、Tool Use、Claude Code 的常见开发提示词模板整理成可复用清单。\n- `07-claude-code`：重点练习 `CLAUDE.md`、slash command、hooks、settings，把 Agent 工作流工程化。\n- `08-eval-security`：重点练习 golden dataset、评分、日志、报告和安全样例，把 AI 应用质量评测工程化。\n",

        "path": "labs/api-key-guide.md",
        "content": "# API Key 安全指南\n\nAI 工程实验经常需要调用模型 API。API Key 相当于账号密码，必须谨慎处理。本课程所有示例都不应该出现真实 API Key。\n\n## 基本原则\n\n请牢记：\n\n- 不要把真实 API Key 写进代码。\n- 不要把真实 API Key 写进 README、Markdown、Notebook 输出或截图。\n- 不要把真实 API Key 提交到 git。\n- 不要在日志中打印 API Key。\n- 不要把 API Key 发给不可信工具或网页。\n- 如果怀疑泄露，立即去服务商控制台撤销并重新生成。\n\n## 推荐方式：环境变量\n\n使用环境变量保存密钥：\n\n```bash\nexport ANTHROPIC_API_KEY=\"你的真实密钥只放在本机环境变量中\"\n```\n\n代码中只读取变量名：\n\n```python\nimport os\n\napi_key = os.environ.get(\"ANTHROPIC_API_KEY\")\nif not api_key:\n    raise RuntimeError(\"请先设置 ANTHROPIC_API_KEY 环境变量\")\n```\n\n不要写成：\n\n```python\napi_key = ...  # 不要把真实密钥硬编码在代码里\n```\n\n## Mock 到真实 API 的安全切换\n\n教学项目推荐默认使用 mock provider，只有在本机显式配置后才调用真实 API。\n\n推荐配置：\n\n```text\nAPP_ENV=dev\nLLM_PROVIDER=mock\nLLM_API_KEY_ENV=ANTHROPIC_API_KEY\nLLM_MODEL=model-name\nLLM_TIMEOUT_MS=30000\nLLM_MAX_RETRIES=2\n```\n\n切换规则：\n\n- `LLM_PROVIDER=mock`：不读取真实 Key，不访问网络，适合练习、测试和 CI。\n- `LLM_PROVIDER=real`：只从 `LLM_API_KEY_ENV` 指向的环境变量读取真实 Key。\n- `APP_ENV=test`：禁止真实网络调用，避免自动化测试消耗额度。\n- `APP_ENV=prod`：必须确认预算、限流、日志脱敏和错误告警。\n\n上线或演示前检查：\n\n1. 配置示例中只有变量名，没有真实值。\n2. 日志不包含请求头、Key、cookie 或完整隐私输入。\n3. 鉴权失败、限流、超时、服务端错误有清晰提示。\n4. 可以一键切回 mock，避免真实 API 异常影响教学流程。\n\n## .env 文件注意事项\n\n如果你使用 `.env`：\n\n- `.env` 只能保存在本机，不应提交到仓库。\n- 仓库中可以放 `.env.example`，只展示变量名。\n- `.env.example` 中不要写真实值。\n\n示例 `.env.example`：\n\n```text\nAPP_ENV=dev\nLLM_PROVIDER=mock\nLLM_API_KEY_ENV=ANTHROPIC_API_KEY\nANTHROPIC_API_KEY=replace_with_your_key_for_local_only\nMODEL_NAME=replace_with_model_name\nLLM_TIMEOUT_MS=30000\nLLM_MAX_RETRIES=2\n```\n\n注意：`.env.example` 中的 `replace_with_your_key_for_local_only` 是占位符，不是真实密钥。真实 `.env` 必须留在本机并加入 `.gitignore`。\n\n## 在教学材料中如何写\n\n推荐写法：\n\n```text\n请设置环境变量 ANTHROPIC_API_KEY。\n```\n\n或：\n\n```json\n{\n  \"provider\": \"mock\",\n  \"api_key_env\": \"ANTHROPIC_API_KEY\",\n  \"model\": \"model-name\",\n  \"timeout_ms\": 30000,\n  \"max_retries\": 2\n}\n```\n\n不推荐写法：\n\n```json\n{\n  \"api_key\": \"fake-secret-placeholder\"\n}\n```\n\n## 日志脱敏\n\n错误示例：\n\n```text\nrequest failed, credential_redacted=true, input=用户完整隐私数据\n```\n\n推荐示例：\n\n```json\n{\n  \"request_id\": \"req-001\",\n  \"success\": false,\n  \"error_type\": \"rate_limit\",\n  \"api_key_suffix\": \"****1234\",\n  \"input_preview\": \"已脱敏的前 20 个字符\"\n}\n```\n\n更好的方式是完全不记录 key，只记录错误类型和 request id。\n\n## 权限最小化\n\n如果服务商支持，请为学习实验创建单独的 key：\n\n- 设置预算上限。\n- 设置可访问模型范围。\n- 避免使用生产项目 key。\n- 定期轮换。\n- 课程结束后删除不用的 key。\n\n## 常见泄露场景\n\n- 把 `.env` 误提交到 git。\n- 在 Notebook 输出中打印环境变量。\n- 在报错截图中暴露请求头。\n- 在 debug 日志中打印完整 HTTP 请求。\n- 把包含 key 的配置发给 AI 工具分析。\n\n## 发现泄露怎么办\n\n1. 立即撤销泄露的 API Key。\n2. 重新生成新的 API Key。\n3. 检查账单和调用记录。\n4. 从 git 历史、日志、截图、文档中清理泄露内容。\n5. 复盘泄露原因，补充 `.gitignore` 和检查流程。\n\n## Lab 检查清单\n\n- [ ] 代码中没有真实 API Key。\n- [ ] Markdown 中没有真实 API Key。\n- [ ] 日志中没有真实 API Key。\n- [ ] 示例配置使用 `*_ENV` 或占位符。\n- [ ] 使用 mock 数据时没有混入生产数据。\n- [ ] 高风险操作需要人工确认。\n- [ ] 默认 provider 是 mock，真实调用需要显式开启。\n- [ ] CI / test 环境不会访问真实模型 API。\n- [ ] 错误日志只记录 error_type、request_id、latency，不记录完整请求头。\n",

        "content": "# 常见开发中如何使用 AI / LLM / Agent\n\n这份指南面向刚开始把 AI 用到开发流程的小白。目标不是让 AI 替你负责，而是让它成为“会提问、会解释、会辅助验证的开发搭档”。\n\n使用原则：\n\n- 先给背景，再给任务，不要只丢一句“帮我改”。\n- 让 AI 输出计划、风险和验证方式，再决定是否执行。\n- 不粘贴真实 API Key、token、cookie、生产连接串、用户隐私数据。\n- 对代码改动、数据库变更、权限变更、线上操作始终人工复核。\n- AI 的回答是候选方案，不是事实来源；关键结论要用代码、测试、日志或文档验证。\n\n## 场景 1：需求澄清\n\n### 适合用 AI 做什么\n\n- 把一句模糊需求拆成背景、目标、用户、输入、输出、边界和验收标准。\n- 找出缺失问题，例如权限、异常、性能、兼容性、数据来源。\n- 生成需求澄清清单，方便和产品、业务或同事确认。\n\n### 不适合做什么\n\n- 不要让 AI 直接替业务拍板。\n- 不要把敏感用户原始数据贴给 AI。\n- 不要把 AI 猜测的需求当作已确认事实。\n\n### 推荐 Prompt 模板\n\n```text\n你是资深需求分析师。请帮我澄清下面这个开发需求。\n\n背景：<项目背景>\n原始需求：<需求原文>\n当前系统：<已有能力或限制>\n\n请输出：\n1. 你理解的目标\n2. 需要确认的问题\n3. 输入、输出、边界条件\n4. 权限、安全、异常场景\n5. 可验收标准\n6. 最小可实现版本\n\n不要编造业务事实；不确定的地方请标记为“待确认”。\n```\n\n### 检查清单\n\n- [ ] 是否区分了“已知事实”和“待确认问题”？\n- [ ] 是否有清晰验收标准？\n- [ ] 是否覆盖失败场景和权限边界？\n- [ ] 是否能拆出最小版本？\n\n### 常见错误\n\n- 只让 AI “整理需求”，但没有给背景。\n- 没有让 AI 明确待确认问题。\n- 把 AI 补出来的业务规则直接当真。\n\n## 场景 2：技术方案设计\n\n### 适合用 AI 做什么\n\n- 对比多种实现方案。\n- 列出模块边界、数据流、错误处理和测试策略。\n- 识别安全、性能、兼容性风险。\n\n### 不适合做什么\n\n- 不要让 AI 在不了解现有架构时直接选型。\n- 不要跳过团队规范、成本、运维约束。\n\n### 推荐 Prompt 模板\n\n```text\n你是资深后端/全栈工程师。请基于下面信息设计技术方案。\n\n需求：<需求>\n现有系统：<模块、接口、数据库、限制>\n约束：<时间、性能、安全、兼容性>\n\n请输出：\n1. 推荐方案\n2. 备选方案和取舍\n3. 模块拆分\n4. 数据流和接口草案\n5. 错误处理\n6. 测试计划\n7. 风险和需要人工确认的问题\n```\n\n### 检查清单\n\n- [ ] 是否说明为什么推荐该方案？\n- [ ] 是否有不采用其他方案的理由？\n- [ ] 是否包含测试和回滚策略？\n- [ ] 是否符合项目现有技术栈？\n\n### 常见错误\n\n- 让 AI 设计过度复杂架构。\n- 没有告诉 AI 当前项目已有约定。\n- 没有让 AI 列出风险。\n\n## 场景 3：读陌生代码\n\n### 适合用 AI 做什么\n\n- 总结文件职责、核心函数、调用链。\n- 找入口、配置、数据模型和测试位置。\n- 把复杂代码解释成学习笔记。\n\n### 不适合做什么\n\n- 不要只贴一小段代码就要求解释整个系统。\n- 不要把 AI 对调用链的猜测当作事实；要用搜索和测试验证。\n\n### 推荐 Prompt 模板\n\n```text\n你是代码讲解老师。请帮我理解这段代码。\n\n我的背景：<例如 Python 初学者 / 会后端但不熟前端>\n目标：<我想理解它如何处理登录 / 如何调用工具>\n代码：\n```<语言>\n<代码片段>\n```\n\n请输出：\n1. 这段代码解决什么问题\n2. 关键函数/类的职责\n3. 数据从哪里来、到哪里去\n4. 可能依赖的其他文件\n5. 我下一步应该看哪些位置\n6. 用初学者能懂的话解释一次\n```\n\n### 检查清单\n\n- [ ] 是否知道入口函数在哪里？\n- [ ] 是否理解输入和输出？\n- [ ] 是否知道相关测试在哪里？\n- [ ] 是否能自己复述一遍？\n\n### 常见错误\n\n- 只问“这段代码什么意思”，没有说明学习目标。\n- 不验证 AI 说的文件路径或函数名。\n- 没有结合实际运行结果。\n\n## 场景 4：定位 Bug\n\n### 适合用 AI 做什么\n\n- 根据错误日志推测可能原因。\n- 给出最小复现步骤。\n- 建议排查顺序。\n- 帮你设计回归测试。\n\n### 不适合做什么\n\n- 不要让 AI 直接大范围重构。\n- 不要省略完整错误信息、触发条件和最近变更。\n\n### 推荐 Prompt 模板\n\n```text\n你是调试助手。请帮我分析下面的 bug。\n\n现象：<用户看到什么>\n期望：<应该发生什么>\n触发步骤：<如何复现>\n错误日志：<脱敏后的日志>\n最近变更：<相关提交或改动>\n相关代码：<代码片段>\n\n请输出：\n1. 最可能的 3 个原因，按概率排序\n2. 每个原因如何验证\n3. 最小修复建议\n4. 应补充的测试用例\n5. 哪些信息不足，需要我继续提供\n```\n\n### 检查清单\n\n- [ ] 是否能稳定复现？\n- [ ] 是否定位到具体边界条件？\n- [ ] 是否先写或补了测试？\n- [ ] 修复是否足够小？\n\n### 常见错误\n\n- 只贴报错最后一行。\n- 没有提供输入数据和环境。\n- 让 AI 顺手改太多无关代码。\n\n## 场景 5：写测试\n\n### 适合用 AI 做什么\n\n- 从需求生成测试用例清单。\n- 补充正常、边界、异常、安全用例。\n- 根据现有测试风格生成草稿。\n\n### 不适合做什么\n\n- 不要为了通过测试而修改测试期望。\n- 不要只测 happy path。\n\n### 推荐 Prompt 模板\n\n```text\n你是测试工程师。请帮我为下面功能设计测试。\n\n功能说明：<功能>\n输入输出：<输入输出>\n边界条件：<已知边界>\n现有测试风格：<贴一段已有测试>\n\n请输出：\n1. 测试用例表格：名称、输入、期望、覆盖点\n2. 最重要的 3 个回归测试\n3. 可能遗漏的异常场景\n4. 如果要写成 unittest/pytest，给出代码草稿\n```\n\n### 检查清单\n\n- [ ] 是否覆盖正常、边界、异常？\n- [ ] 是否测试行为而不是实现细节？\n- [ ] 是否能在本地稳定运行？\n- [ ] 是否避免真实网络和真实密钥？\n\n### 常见错误\n\n- 测试只覆盖 AI 生成的样例输入。\n- 断言过于宽松，失败也看不出来。\n- 在测试里调用真实外部服务。\n\n## 场景 6：重构\n\n### 适合用 AI 做什么\n\n- 识别重复逻辑和命名问题。\n- 给出小步重构计划。\n- 生成迁移前后的测试清单。\n\n### 不适合做什么\n\n- 不要让 AI 一次性大改全项目。\n- 不要在没有测试保护时重构核心路径。\n\n### 推荐 Prompt 模板\n\n```text\n你是重构教练。请帮我制定小步重构计划。\n\n目标：<例如降低重复、拆分函数、改善命名>\n代码范围：<文件/函数>\n约束：<不能改变外部行为、不改接口等>\n测试情况：<已有测试>\n\n请输出：\n1. 当前主要问题\n2. 最小安全重构步骤\n3. 每一步如何验证\n4. 不建议现在做的改动\n5. 重构后的风险点\n```\n\n### 检查清单\n\n- [ ] 是否明确“不改变外部行为”？\n- [ ] 是否每一步都能测试？\n- [ ] 是否避免顺手加功能？\n- [ ] 是否保留必要兼容？\n\n### 常见错误\n\n- 借重构之名改需求。\n- 变量命名换了一遍但行为没验证。\n- 删除看似无用但实际被动态调用的代码。\n\n## 场景 7：Code Review\n\n### 适合用 AI 做什么\n\n- 从 diff 中找潜在 bug、安全风险、遗漏测试。\n- 检查是否符合需求和项目风格。\n- 帮你写 review checklist。\n\n### 不适合做什么\n\n- 不要让 AI 只做“夸奖式 review”。\n- 不要把 AI 的 review 当作最终审批。\n\n### 推荐 Prompt 模板\n\n```text\n你是严格但建设性的代码审查者。请审查下面 diff。\n\n需求背景：<为什么改>\n重点关注：正确性、安全、边界、测试、可维护性\nDiff：\n```diff\n<diff>\n```\n\n请输出：\n1. 必须修复的问题\n2. 建议优化的问题\n3. 测试缺口\n4. 安全或权限风险\n5. 如果没有问题，请说明你检查了哪些方面\n```\n\n### 检查清单\n\n- [ ] 是否检查边界条件？\n- [ ] 是否检查安全风险？\n- [ ] 是否检查测试是否足够？\n- [ ] 是否避免主观风格争论？\n\n### 常见错误\n\n- 只让 AI 看代码，不给需求背景。\n- 没有区分 must fix 和 nice to have。\n- 不复核 AI 指出的“问题”是否真实存在。\n\n## 场景 8：写文档和注释\n\n### 适合用 AI 做什么\n\n- 把实现整理成 README、接口说明、使用示例。\n- 把复杂流程写成步骤和 FAQ。\n- 帮你生成变更说明。\n\n### 不适合做什么\n\n- 不要让 AI 编造不存在的参数、命令或功能。\n- 不要写解释“代码做了什么”的冗余注释。\n\n### 推荐 Prompt 模板\n\n```text\n你是技术文档作者。请基于下面事实写文档。\n\n目标读者：<初学者/开发者/运维>\n真实功能：<列出功能事实>\n运行方式：<命令>\n限制：<已知限制>\n\n请输出：\n1. 简短介绍\n2. 快速开始\n3. 参数说明\n4. 常见问题\n5. 安全注意事项\n\n只能基于我提供的事实写，不要编造功能。\n```\n\n### 检查清单\n\n- [ ] 文档中的命令真实可运行？\n- [ ] 链接是否存在？\n- [ ] 是否说明限制？\n- [ ] 是否没有暴露敏感信息？\n\n### 常见错误\n\n- AI 编造配置项。\n- 文档和代码不同步。\n- 示例里出现真实密钥或生产地址。\n\n## 场景 9：Git、Commit、PR\n\n### 适合用 AI 做什么\n\n- 总结 diff，生成 commit message 草稿。\n- 写 PR 描述、测试计划、风险说明。\n- 帮你检查是否混入无关文件。\n\n### 不适合做什么\n\n- 不要让 AI 自动 push、force push、改历史，除非你明确确认。\n- 不要提交 `.env`、密钥、临时文件。\n\n### 推荐 Prompt 模板\n\n```text\n请根据下面 git diff 帮我写提交说明和 PR 描述。\n\n变更目标：<为什么改>\nDiff 摘要：<diff 或文件列表>\n验证结果：<测试命令和结果>\n\n请输出：\n1. 一句话 commit message\n2. PR Summary bullet list\n3. Test plan\n4. 风险和回滚方式\n5. 是否有不应提交的文件迹象\n```\n\n### 检查清单\n\n- [ ] `git status` 是否只有预期文件？\n- [ ] 是否运行测试？\n- [ ] PR 描述是否说明 why？\n- [ ] 是否没有真实密钥和大文件？\n\n### 常见错误\n\n- commit message 只写“update”。\n- 把格式化、重构、功能混在一个巨大 PR。\n- 没有写测试计划。\n\n## 场景 10：CI 失败分析\n\n### 适合用 AI 做什么\n\n- 解释 CI 日志。\n- 判断失败是测试、依赖、环境还是格式问题。\n- 给出本地复现命令。\n\n### 不适合做什么\n\n- 不要直接跳过 CI 或禁用测试。\n- 不要用 `--no-verify` 逃避问题。\n\n### 推荐 Prompt 模板\n\n```text\n你是 CI 排障助手。请分析下面 CI 失败。\n\n失败步骤：<step name>\n日志：<脱敏日志>\n最近改动：<文件或 diff 摘要>\n本地环境：<Python/Node/OS 等>\n\n请输出：\n1. 失败类型\n2. 最可能根因\n3. 本地复现命令\n4. 修复步骤\n5. 如何确认修复成功\n```\n\n### 检查清单\n\n- [ ] 是否能本地复现？\n- [ ] 是否修复根因而不是绕过？\n- [ ] 是否更新必要测试或文档？\n- [ ] 是否确认 CI 相关配置没有误改？\n\n### 常见错误\n\n- 只看最后一行错误。\n- 误以为 CI 环境和本机完全一样。\n- 为了通过 CI 删除测试。\n\n## 场景 11：RAG 知识库开发\n\n### 适合用 AI 做什么\n\n- 设计文档切分策略。\n- 生成检索评测问题。\n- 分析回答是否有引用、是否幻觉。\n\n### 不适合做什么\n\n- 不要把未脱敏的内部文档发给外部模型。\n- 不要只看回答流畅度，不看引用来源。\n\n### 推荐 Prompt 模板\n\n```text\n你是 RAG 系统设计助手。请帮我设计知识库问答流程。\n\n文档类型：<Markdown/PDF/FAQ>\n用户问题类型：<常见问题>\n约束：<隐私、权限、延迟>\n\n请输出：\n1. chunk 策略\n2. metadata 字段\n3. 检索和重排流程\n4. 回答引用格式\n5. 评测问题集设计\n6. 失败时如何拒答\n```\n\n### 检查清单\n\n- [ ] 回答是否有来源引用？\n- [ ] 检索结果是否真的包含答案？\n- [ ] 是否能处理找不到答案？\n- [ ] 是否有权限和脱敏策略？\n\n### 常见错误\n\n- chunk 太大或太小。\n- 引用看起来存在但无法定位原文。\n- 模型在检索不到时仍然编答案。\n\n## 场景 12：MCP 工具接入\n\n### 适合用 AI 做什么\n\n- 设计 MCP tool/resource/prompt。\n- 检查 JSON-RPC 请求和响应形状。\n- 生成工具 schema 和错误码建议。\n\n### 不适合做什么\n\n- 不要把高风险操作直接暴露成无确认工具。\n- 不要让工具返回未脱敏敏感数据。\n\n### 推荐 Prompt 模板\n\n```text\n你是 MCP Server 设计助手。请帮我把下面能力设计成 MCP 工具。\n\n能力描述：<要暴露的能力>\n调用者：<Claude Desktop/Claude Code/内部 Agent>\n风险：<读/写/删除/外部请求>\n\n请输出：\n1. tool 名称和 description\n2. input schema\n3. 成功响应结构\n4. 错误响应结构\n5. 权限确认规则\n6. 调试用 JSON-RPC 示例\n```\n\n### 检查清单\n\n- [ ] tool description 是否清晰？\n- [ ] schema 是否稳定？\n- [ ] 高风险动作是否需要确认？\n- [ ] 日志是否脱敏？\n\n### 常见错误\n\n- 工具名太泛，例如 `run`、`do_task`。\n- schema 不约束输入。\n- 错误响应不结构化，Agent 难以恢复。\n\n## 场景 13：Claude Code / Skill 日常用法\n\n### 适合用 AI 做什么\n\n- 让 Claude Code 读项目、制定计划、改代码、跑测试。\n- 把重复流程沉淀成 Skill。\n- 用 hooks 做快速、低风险检查。\n- 用 subagents 并行做搜索、审查、文档补充。\n\n### 不适合做什么\n\n- 不要让 Agent 直接执行高风险命令。\n- 不要在没有计划时让它大范围改代码。\n- 不要把生产凭证放进 prompt 或文件。\n\n### 推荐 Prompt 模板\n\n```text\n请先只读分析，不要改文件。\n\n目标：<我要完成什么>\n范围：<相关目录/文件>\n约束：<不能改什么、必须保留什么>\n验证方式：<测试命令或验收方式>\n\n请输出：\n1. 你会先看哪些文件\n2. 可能的实现方案\n3. 风险点\n4. 最小修改计划\n5. 需要我确认的问题\n```\n\n### 检查清单\n\n- [ ] 是否先探索再实现？\n- [ ] 是否明确修改范围？\n- [ ] 是否运行测试？\n- [ ] 是否总结风险和后续工作？\n\n### 常见错误\n\n- 一开始就要求“直接改”。\n- 没有说明测试命令。\n- 没有区分当前任务和顺手优化。\n\n## 场景 14：什么时候不要用 AI\n\n下面情况不建议直接使用 AI，或必须先脱敏、隔离、确认：\n\n- 涉及真实密钥、生产数据库、用户隐私、合同、财务、医疗等敏感信息。\n- 需要精确法律、合规、安全结论。\n- 要执行删除、覆盖、force push、生产发布、数据库迁移等高风险操作。\n- 你无法验证 AI 输出是否正确。\n- 团队明确要求某类代码或数据不能进入外部工具。\n\n如果必须使用，先做：\n\n1. 脱敏。\n2. 缩小范围。\n3. 要求 AI 标记不确定点。\n4. 人工复核。\n5. 用测试、日志、文档验证。\n\n## 日常开发使用 AI 的推荐流程\n\n```text\n1. 说明目标和背景\n2. 要求 AI 先提问题或制定计划\n3. 人工确认范围\n4. 小步执行\n5. 运行测试或检查\n6. 让 AI 总结改动、风险、下一步\n7. 人工 review 后再提交\n```\n\n## 最小安全检查清单\n\n每次使用 AI 辅助开发前后，至少检查：\n\n- [ ] 没有粘贴真实 API Key、token、cookie、生产连接串。\n- [ ] 没有粘贴未脱敏用户隐私或生产数据。\n- [ ] AI 输出中的文件名、函数名、命令都经过验证。\n- [ ] 高风险操作需要人工确认。\n- [ ] 代码改动有测试或手动验证。\n- [ ] 文档和 PR 说明没有编造功能。\n- [ ] 不确定结论已标记为待确认。\n",

        "content": "# 常见开发场景 Prompt 模板库\n\n这份模板库面向刚开始使用 Claude Code 或其他 AI 编程助手的同学。每个场景都给出可直接复制的中文 Prompt，并补充输出要求和人工检查点。\n\n使用建议：\n\n- 复制模板后，把 `【】` 中的内容替换成你的真实上下文。\n- 不要粘贴真实 API Key、密码、cookie、token、生产数据库连接串或用户隐私数据。\n- 对高风险操作，例如删除文件、数据库变更、线上发布、权限修改，要先让 AI 给计划，再由人工确认。\n- AI 的输出要当作“建议草稿”，不要不看就执行。\n\n## 1. 需求澄清\n\n### 使用时机\n\n当需求描述比较模糊，只知道“大概要做什么”，但缺少边界、输入输出、验收标准时使用。\n\n### Prompt\n\n```text\n你是一个有经验的产品与研发协作助手。请帮我澄清下面这个开发需求。\n\n需求背景：\n【用 3-5 句话说明业务背景】\n\n当前已知目标：\n【写出目前理解的目标】\n\n已有约束：\n【技术栈、时间、不能改的模块、兼容要求等；没有就写“暂无”】\n\n请你：\n1. 先复述你对需求的理解。\n2. 列出需要向产品、设计、后端、测试或运维确认的问题。\n3. 区分“必须确认后才能开发”的问题和“可以边做边确认”的问题。\n4. 给出一个初版验收标准清单。\n5. 不要替我编造不存在的业务规则。\n```\n\n### 输出要求\n\n- 用分点列表输出。\n- 问题按角色或主题分组。\n- 明确标注阻塞项和非阻塞项。\n- 验收标准尽量写成可验证的句子。\n\n### 使用后人工检查点\n\n- 检查 AI 是否误解了业务目标。\n- 把阻塞问题发给对应负责人确认。\n- 确认验收标准是否能被测试或产品直接使用。\n- 删除或改写任何不适合项目实际情况的假设。\n\n## 2. 任务拆解\n\n### 使用时机\n\n当需求已经比较明确，但不知道从哪里开始、如何拆分开发步骤、如何安排优先级时使用。\n\n### Prompt\n\n```text\n你是一个资深研发项目拆解助手。请基于下面需求，帮我拆成适合逐步完成的开发任务。\n\n需求说明：\n【粘贴需求摘要，不要包含敏感数据】\n\n项目背景：\n【项目技术栈、主要目录、相关模块】\n\n我希望的交付物：\n【例如：一个接口、一个页面、一个脚本、一组测试】\n\n请你输出：\n1. 总体实现思路。\n2. 按优先级排列的任务清单。\n3. 每个任务的输入、输出、完成标准。\n4. 可能的风险和依赖。\n5. 建议先做的最小可验证版本。\n\n要求：不要直接写代码，先给计划。\n```\n\n### 输出要求\n\n- 使用表格或编号列表。\n- 每个任务要足够小，最好能在 30-90 分钟内完成。\n- 标出哪些任务可以并行，哪些必须串行。\n- 给出最小可验证版本，不追求一次做完。\n\n### 使用后人工检查点\n\n- 检查任务是否过细或过粗。\n- 确认任务顺序符合项目依赖关系。\n- 删除暂时不需要的“锦上添花”任务。\n- 与团队同步风险项和外部依赖。\n\n## 3. 代码解释\n\n### 使用时机\n\n当你接手一个陌生文件、函数、类或模块，想快速理解它做什么、怎么流转、有哪些风险时使用。\n\n### Prompt\n\n```text\n你是一个耐心的代码讲解老师。请用适合初学者的方式解释下面代码。\n\n代码位置：\n【文件路径或函数名】\n\n我想重点理解：\n【例如：主流程、数据结构、异常处理、某个函数为什么这样写】\n\n代码内容：\n【粘贴代码片段，或说明请读取哪些文件】\n\n请你：\n1. 用一句话概括这段代码的作用。\n2. 按执行顺序解释主要逻辑。\n3. 解释关键变量、函数和数据结构。\n4. 指出可能的边界情况和易错点。\n5. 给我 3 个自测问题，帮助确认我是否理解。\n```\n\n### 输出要求\n\n- 先讲整体，再讲细节。\n- 尽量使用通俗类比，但不要牺牲准确性。\n- 对复杂逻辑给出简短伪代码或流程描述。\n- 不要无依据地评价代码好坏。\n\n### 使用后人工检查点\n\n- 对照源码确认解释是否与实际逻辑一致。\n- 运行或阅读相关测试验证关键路径。\n- 重点检查 AI 是否漏掉异常分支。\n- 把不理解的术语继续追问。\n\n## 4. Bug 定位\n\n### 使用时机\n\n当程序报错、结果不符合预期、线上或本地复现了异常，但还不知道根因在哪里时使用。\n\n### Prompt\n\n```text\n你是一个谨慎的 bug 定位助手。请帮我分析下面问题的可能原因和排查步骤。\n\n现象：\n【描述报错、异常行为或错误结果】\n\n期望行为：\n【描述正确情况下应该发生什么】\n\n复现步骤：\n【1. ... 2. ... 3. ...】\n\n相关日志或报错：\n【粘贴脱敏后的日志，不要包含 token、cookie、用户隐私】\n\n相关代码位置：\n【文件路径、函数名、最近改动；不确定就写“不确定”】\n\n请你：\n1. 先列出最可能的 3-5 个原因，并说明依据。\n2. 给出从低风险到高风险的排查顺序。\n3. 标出需要补充的信息。\n4. 如果需要改代码，先给修改思路，不要直接大改。\n5. 区分“已确认事实”和“推测”。\n```\n\n### 输出要求\n\n- 根因假设要按可能性排序。\n- 每个排查步骤要说明如何验证。\n- 不要建议直接删除数据、重置环境或跳过校验。\n- 对不确定内容明确写“不确定”。\n\n### 使用后人工检查点\n\n- 先验证最小复现，不要一上来改大量代码。\n- 确认日志已经脱敏。\n- 检查 AI 是否把相关性误当因果。\n- 修改后补充回归测试或复现说明。\n\n## 5. 测试补齐\n\n### 使用时机\n\n当已有功能缺少测试、修复 bug 后需要回归测试、重构前想加保护网时使用。\n\n### Prompt\n\n```text\n你是一个测试设计助手。请帮我为下面功能补齐测试方案。\n\n功能说明：\n【描述功能做什么】\n\n相关代码：\n【文件路径、函数名或代码片段】\n\n当前已有测试：\n【列出已有测试文件；没有就写“暂无”】\n\n我使用的测试框架：\n【例如 pytest、Jest、JUnit；不确定就写“不确定”】\n\n请你输出：\n1. 需要覆盖的正常路径。\n2. 需要覆盖的边界情况。\n3. 需要覆盖的异常路径。\n4. 建议新增或修改的测试用例列表。\n5. 每个测试的输入、操作步骤、预期结果。\n\n要求：测试数据使用模拟数据，不要使用真实用户信息或真实密钥。\n```\n\n### 输出要求\n\n- 按“正常、边界、异常、回归”分类。\n- 每个测试用例名称要清晰表达意图。\n- 标出哪些测试最优先。\n- 如果需要 mock，要说明 mock 的对象和原因。\n\n### 使用后人工检查点\n\n- 检查测试是否真的覆盖核心风险。\n- 确认测试不会访问真实外部服务或生产数据。\n- 运行测试并确认失败时能提供有用信息。\n- 避免只测试实现细节而忽略用户可见行为。\n\n## 6. 重构\n\n### 使用时机\n\n当代码能跑但可读性差、重复多、函数过长、职责混乱，想在不改变行为的前提下改善结构时使用。\n\n### Prompt\n\n```text\n你是一个保守的代码重构助手。请帮我评估并规划下面代码的重构。\n\n重构目标：\n【例如：减少重复、拆分长函数、提升可读性、降低耦合】\n\n必须保持不变的行为：\n【列出接口、输出、兼容性、错误处理等】\n\n相关代码：\n【文件路径或代码片段】\n\n已有测试：\n【测试文件路径；没有就写“暂无”】\n\n请你：\n1. 先指出当前代码的主要可维护性问题。\n2. 给出低风险重构步骤，每一步都要可单独验证。\n3. 标出重构前应该补的测试。\n4. 说明哪些改动不建议现在做。\n5. 如果要给代码示例，只给小片段，不要一次性重写全部。\n```\n\n### 输出要求\n\n- 强调不改变外部行为。\n- 重构步骤要小而可回滚。\n- 区分“必要重构”和“可选优化”。\n- 不要为了使用新模式而过度设计。\n\n### 使用后人工检查点\n\n- 先确认测试保护足够，再动核心逻辑。\n- 每一步重构后运行相关测试。\n- 对外接口、配置、数据格式不能无意变化。\n- 检查重构是否真的降低复杂度。\n\n## 7. 安全审查\n\n### 使用时机\n\n当代码涉及认证鉴权、输入处理、文件上传、命令执行、数据库访问、第三方回调、日志输出或敏感配置时使用。\n\n### Prompt\n\n```text\n你是一个安全审查助手。请对下面变更进行安全风险检查。\n\n变更背景：\n【说明为什么改】\n\n涉及范围：\n【文件路径、接口、配置、数据流】\n\n代码或设计：\n【粘贴相关片段，不要包含真实密钥、真实 token 或隐私数据】\n\n请重点检查：\n1. 是否存在敏感信息泄露风险。\n2. 是否存在越权、认证绕过或权限校验不足。\n3. 是否存在注入风险，例如 SQL、命令、模板、路径等。\n4. 是否存在不安全的文件、网络或反序列化操作。\n5. 日志、错误信息是否暴露过多细节。\n6. 给出风险等级、原因和修复建议。\n\n要求：不要提供攻击利用步骤，只给防护建议和安全编码建议。\n```\n\n### 输出要求\n\n- 按高、中、低风险分组。\n- 每个风险包含位置、原因、影响、建议。\n- 对无法判断的内容列出需要补充的信息。\n- 不输出真实攻击载荷或可直接滥用的细节。\n\n### 使用后人工检查点\n\n- 人工复核高风险项，不要只依赖 AI 判断。\n- 确认没有把真实密钥或用户数据发给 AI。\n- 对安全修复补充测试或检查规则。\n- 必要时请团队安全同学复审。\n\n## 8. 性能分析\n\n### 使用时机\n\n当接口慢、页面卡、任务耗时长、资源占用高，或需要在上线前评估性能风险时使用。\n\n### Prompt\n\n```text\n你是一个性能分析助手。请帮我分析下面功能的性能瓶颈和优化方向。\n\n功能或接口：\n【名称、路径或入口函数】\n\n当前表现：\n【耗时、QPS、内存、CPU、页面加载时间等；没有数据就写“暂无量化数据”】\n\n相关代码或流程：\n【文件路径、关键函数、调用链】\n\n数据规模：\n【例如列表长度、表数据量、并发量；不确定就写“不确定”】\n\n请你：\n1. 先指出需要补充哪些性能指标。\n2. 基于现有信息推测可能瓶颈，并标明不确定性。\n3. 给出排查顺序和观测方法。\n4. 给出低风险优化建议。\n5. 标出哪些优化可能改变行为或增加复杂度。\n```\n\n### 输出要求\n\n- 先测量，再优化。\n- 区分前端、后端、数据库、网络、缓存等方向。\n- 每个优化建议说明预期收益和潜在代价。\n- 不建议盲目加缓存或并发。\n\n### 使用后人工检查点\n\n- 用真实但脱敏的指标验证瓶颈。\n- 确认优化不会破坏正确性和一致性。\n- 对缓存、批处理、并发改动做回归测试。\n- 记录优化前后的对比数据。\n\n## 9. 接口文档\n\n### 使用时机\n\n当需要给前后端、客户端、测试或第三方说明接口如何调用、参数含义、返回结构和错误码时使用。\n\n### Prompt\n\n```text\n你是一个接口文档编写助手。请基于下面信息生成清晰的接口文档草稿。\n\n接口名称：\n【接口名】\n\n接口用途：\n【说明解决什么问题】\n\n请求方式和路径：\n【例如 GET /api/example；不要写真实内网地址】\n\n请求参数：\n【参数名、类型、是否必填、说明】\n\n响应示例：\n【使用模拟数据，不要包含真实用户信息】\n\n错误情况：\n【已知错误码或异常场景】\n\n请输出：\n1. 接口简介。\n2. 请求方法和路径。\n3. 请求头说明，如无特殊要求请写“无特殊要求”。\n4. 请求参数表。\n5. 响应字段表。\n6. 成功响应示例和失败响应示例，均使用模拟数据。\n7. 调用注意事项。\n```\n\n### 输出要求\n\n- 文档语言简洁，适合协作方阅读。\n- 参数表包含名称、类型、必填、说明、示例。\n- 示例数据必须是模拟数据。\n- 对不确定字段标注“需确认”。\n\n### 使用后人工检查点\n\n- 与真实代码或接口定义核对字段。\n- 确认示例没有真实手机号、邮箱、身份证、token 等敏感信息。\n- 请接口提供方确认错误码和边界行为。\n- 文档发布前检查版本和兼容性说明。\n\n## 10. 数据库变更审查\n\n### 使用时机\n\n当需要新增表、改字段、加索引、写迁移脚本、改查询条件或执行数据修复时使用。\n\n### Prompt\n\n```text\n你是一个数据库变更审查助手。请帮我审查下面数据库变更方案。\n\n变更目标：\n【为什么要改数据库】\n\n数据库类型：\n【例如 MySQL、PostgreSQL、SQLite；不确定就写“不确定”】\n\n变更内容：\n【DDL、迁移思路或查询改动；不要包含生产连接串】\n\n数据规模和访问特点：\n【表大小、读写频率、是否在线业务；不确定就写“不确定”】\n\n回滚方案：\n【已有方案；没有就写“暂无”】\n\n请你检查：\n1. 字段类型、默认值、非空约束是否合理。\n2. 索引是否必要，是否可能造成写入成本或锁表风险。\n3. 是否兼容旧代码和灰度发布。\n4. 是否需要数据迁移、回填或校验。\n5. 是否有回滚方案和验证方案。\n6. 输出风险清单和修改建议。\n```\n\n### 输出要求\n\n- 按“结构变更、数据迁移、性能、兼容性、回滚”分组。\n- 标出高风险操作。\n- 对不确定数据规模不要假设，要提示补充。\n- 不生成连接生产库的命令。\n\n### 使用后人工检查点\n\n- 请 DBA 或熟悉数据库的同学复审高风险变更。\n- 在测试环境验证迁移和回滚。\n- 确认没有生产连接串或真实数据样例泄露。\n- 上线前确认备份、监控和告警。\n\n## 11. CI 失败排查\n\n### 使用时机\n\n当提交代码后 CI、单元测试、构建、lint、类型检查或部署前检查失败时使用。\n\n### Prompt\n\n```text\n你是一个 CI 失败排查助手。请帮我分析下面 CI 失败原因。\n\n失败阶段：\n【例如 install、lint、test、build、typecheck、deploy-check】\n\n最近改动：\n【简要说明本次改了哪些文件或功能】\n\n失败日志：\n【粘贴关键日志，先脱敏，不要包含 token 或内部凭证】\n\n本地是否能复现：\n【能/不能/尚未尝试】\n\n请你：\n1. 提取日志中的关键错误。\n2. 判断最可能的失败原因。\n3. 给出本地复现命令或检查步骤；不确定命令时请说明需要查看项目脚本。\n4. 给出修复建议。\n5. 区分代码问题、环境问题、依赖问题和偶发问题。\n```\n\n### 输出要求\n\n- 先定位第一个关键错误，不要被后续连锁错误带偏。\n- 给出最小排查步骤。\n- 不建议跳过 CI、关闭测试或绕过检查。\n- 对需要权限的操作先提示人工确认。\n\n### 使用后人工检查点\n\n- 确认日志已脱敏。\n- 在本地或临时环境复现失败。\n- 修复后重新运行对应检查，而不是只看代码。\n- 如果是偶发问题，记录证据并观察重跑结果。\n\n## 12. PR 描述\n\n### 使用时机\n\n当准备提交 Pull Request，需要清楚说明改了什么、为什么改、如何验证、有哪些风险时使用。\n\n### Prompt\n\n```text\n你是一个代码评审协作助手。请帮我根据下面信息生成 PR 描述草稿。\n\n变更背景：\n【为什么需要这个 PR】\n\n主要改动：\n【列出文件或功能改动摘要】\n\n验证方式：\n【运行了哪些测试、手工验证了什么；没有就写“尚未验证”】\n\n风险和影响范围：\n【影响模块、兼容性、回滚方式；不确定就写“不确定”】\n\n请输出一个 PR 描述，包含：\n1. Summary：1-3 条要点。\n2. Test Plan：列出已执行或待执行的验证项。\n3. Risk：说明风险、影响范围和回滚思路。\n4. Reviewer Notes：提醒评审重点关注什么。\n\n要求：不要夸大已完成的测试；没有做的测试要明确写“未执行”。\n```\n\n### 输出要求\n\n- 语言简洁，方便评审者快速理解。\n- 已验证和未验证分开写。\n- 风险不要写“无”除非确实评估过。\n- 不包含敏感链接、密钥或内部凭证。\n\n### 使用后人工检查点\n\n- 核对 PR 描述是否准确覆盖实际 diff。\n- 确认测试项都是真实执行过的。\n- 补充截图、日志或说明时先脱敏。\n- 标出需要重点评审的复杂逻辑。\n\n## 13. 学习某段代码\n\n### 使用时机\n\n当你不仅想知道代码“做什么”，还想通过它学习设计思路、编码习惯、可改进点和相关知识时使用。\n\n### Prompt\n\n```text\n你是一个代码学习教练。请带我学习下面这段代码。\n\n我的水平：\n【例如：刚学 Python、会写基础接口、第一次看这个框架】\n\n学习目标：\n【例如：理解异步、学习项目结构、掌握测试写法】\n\n代码位置或片段：\n【文件路径、函数名或代码片段】\n\n请你：\n1. 先用初学者能懂的话解释这段代码解决的问题。\n2. 拆解它使用的关键概念。\n3. 说明这段代码体现了哪些好的实践。\n4. 指出可以改进但不一定必须改的地方。\n5. 给我一个小练习，让我基于这段代码做轻微修改。\n6. 给出学习延伸方向。\n```\n\n### 输出要求\n\n- 按“理解、概念、实践、练习、延伸”组织。\n- 不要一次引入太多高级术语。\n- 小练习要安全、可回滚、适合当前水平。\n- 对不确定的项目背景不要编造。\n\n### 使用后人工检查点\n\n- 亲自运行或阅读代码验证理解。\n- 完成小练习前先保存当前改动。\n- 不要把学习建议直接当成项目改造计划。\n- 把仍然不懂的问题继续拆小追问。\n\n## 14. 让 Claude Code 制定计划\n\n### 使用时机\n\n当你希望 Claude Code 在动手改文件前，先理解仓库、列出计划、说明会改哪些文件和如何验证时使用。\n\n### Prompt\n\n```text\n请先不要修改文件。你是一个谨慎的 Claude Code 开发助手，请先为下面任务制定执行计划。\n\n任务目标：\n【描述要完成什么】\n\n限制条件：\n【例如：只改 docs 目录、不改业务代码、不调用网络、不新增依赖】\n\n验收标准：\n【完成后应该满足什么】\n\n请你：\n1. 先说明你需要查看哪些文件或目录，以及原因。\n2. 给出分步骤执行计划。\n3. 列出预计会修改或新增的文件。\n4. 列出轻量检查方式。\n5. 标出风险点和需要我确认的问题。\n\n在我确认计划之前，不要写入文件、不要运行破坏性命令。\n```\n\n### 输出要求\n\n- 明确哪些是读取操作，哪些是写入操作。\n- 写清楚计划中的检查命令或检查方法。\n- 对限制条件逐条回应。\n- 如果需求不清楚，先问问题。\n\n### 使用后人工检查点\n\n- 检查计划是否超出任务范围。\n- 确认不会改到不该改的文件。\n- 确认检查方式足够但不过度。\n- 对有风险的命令要求 AI 先解释再执行。\n\n## 15. 让 Agent 使用工具\n\n### 使用时机\n\n当你希望 Agent 有序使用读取、搜索、编辑、测试等工具，并且避免越权、误改或过度操作时使用。\n\n### Prompt\n\n```text\n你是一个受控的开发 Agent。请使用工具完成下面任务，但必须遵守工具使用边界。\n\n任务：\n【描述具体任务】\n\n允许的操作：\n【例如：读取项目文件、搜索关键词、只编辑 labs 目录下的 Markdown、运行轻量本地检查】\n\n禁止的操作：\n【例如：不调用网络、不提交代码、不修改配置、不删除文件、不写入真实密钥】\n\n工作要求：\n1. 开始前先检查相关目录和现有文件。\n2. 修改前先说明将要修改的路径。\n3. 只做完成任务必要的最小改动。\n4. 修改后运行轻量检查。\n5. 最后报告修改路径、检查结果和需要人工复核的点。\n\n如果发现任务需要超出允许范围，请暂停并向我确认。\n```\n\n### 输出要求\n\n- Agent 应该报告关键工具操作和结果。\n- 输出修改路径必须清晰。\n- 检查结果要说明通过或失败。\n- 需要人工复核的事项单独列出。\n\n### 使用后人工检查点\n\n- 查看实际 diff，确认只改了允许范围。\n- 确认没有新增敏感信息或无关文件。\n- 检查轻量测试或文档检查是否真的执行。\n- 对 Agent 未确认的高风险操作保持拒绝。\n\n## 通用人工复核清单\n\n每次使用上述模板后，建议额外做一次通用复核：\n\n- 是否包含真实密钥、密码、cookie、token、生产连接串或用户隐私数据。\n- 是否有 AI 编造的业务规则、接口字段、错误码或指标。\n- 是否有高风险命令，例如删除、覆盖、强推、直接改生产数据。\n- 是否明确了验收标准和验证方式。\n- 是否保留了足够上下文，方便其他同学复盘。\n",

        "content": "# 学习工程环境指南\n\n本文说明完成课程 labs 推荐准备的本地环境。你不需要一次安装所有工具，可以按阶段逐步补齐。\n\n## 基础环境\n\n建议准备：\n\n- 操作系统：macOS、Linux 或 Windows + WSL。\n- Git：用于查看 diff、管理代码版本。\n- Node.js：适合前端、CLI、MCP 示例。\n- Python：适合 RAG、Eval、脚本统计示例。\n- VS Code 或其他编辑器。\n- Claude Code 或你正在使用的 AI 编程助手。\n\n推荐版本：\n\n```text\nGit >= 2.40\nNode.js >= 20\nPython >= 3.10\n```\n\n版本不是绝对要求。初学阶段更重要的是能稳定运行命令、阅读报错并逐步排查。\n\n## 检查命令\n\n可以用下面命令确认环境：\n\n```bash\ngit --version\nnode --version\nnpm --version\npython --version\n```\n\n如果你的系统中 Python 命令是 `python3`，可以使用：\n\n```bash\npython3 --version\n```\n\n## 推荐工作流\n\n每次进入一个 lab，建议按下面步骤：\n\n1. 阅读该目录的 `README.md`。\n2. 查看推荐文件结构。\n3. 先创建最小文件，不要一开始追求完整。\n4. 用 mock 数据或示例输入跑通流程。\n5. 再逐步替换为真实实现。\n6. 最后用检查清单验收。\n\n## Python 项目建议\n\nEval、安全、RAG 类实验适合使用 Python。\n\n推荐做法：\n\n```bash\npython -m venv .venv\nsource .venv/bin/activate\npython -m pip install --upgrade pip\n```\n\nWindows PowerShell 可使用：\n\n```powershell\npython -m venv .venv\n.venv\\Scripts\\Activate.ps1\npython -m pip install --upgrade pip\n```\n\n如果课程没有提供 `requirements.txt`，不要盲目安装大量依赖。先用标准库实现最小版本。\n\n## Node.js 项目建议\n\nClaude Code、CLI、MCP 类实验可能使用 Node.js。\n\n推荐做法：\n\n```bash\nnpm install\nnpm test\nnpm run lint\n```\n\n如果某个命令不存在，先查看 `package.json` 中的 `scripts` 字段，不要猜测命令。\n\n## 文件和目录安全\n\n学习实验中请避免：\n\n- 在仓库中创建 `.env` 并写入真实密钥。\n- 把真实生产数据复制进 `datasets/`。\n- 把大体积日志、模型输出、缓存目录提交到仓库。\n- 执行不理解的删除、覆盖、推送命令。\n\n建议：\n\n- 使用 `.env.example` 展示变量名，不展示真实值。\n- 使用 mock 数据或脱敏数据。\n- 在运行脚本前先读脚本说明。\n- 改动后查看 diff。\n\n## Claude Code 学习环境建议\n\n在 07 阶段，重点不是记住所有配置细节，而是理解工程边界：\n\n- `CLAUDE.md`：告诉 Agent 项目规则。\n- slash command：把重复流程沉淀为命令。\n- hooks：在关键节点自动检查。\n- settings：配置权限和环境变量。\n\n建议先在小项目中试验，不要直接在重要仓库中开放高权限自动化。\n\n## Eval 学习环境建议\n\n在 08 阶段，建议先用本地 mock 流程：\n\n1. 手写 `golden.jsonl`。\n2. 用 mock answer 生成 `run-001.jsonl`。\n3. 人工评分。\n4. 生成报告。\n\n等数据结构和报告逻辑稳定后，再接入真实模型 API。\n",

        "content": "# 学习进度表\n\n本文用于帮助你按阶段推进 AI Agent 学习。你可以复制本表到自己的笔记中，记录完成情况、问题和下一步计划。\n\n## 总体路线\n\n| 阶段 | 主题 | 核心产物 | 状态 |\n| --- | --- | --- | --- |\n| 00 | AI 基础导学 | AI 学习导航卡片和术语地图 | 未开始 |\n| 01 | Prompt | 提示词模板和对比记录 | 未开始 |\n| 02 | LLM API | 最小 API 调用和错误处理 | 未开始 |\n| 03 | Tool Use | 工具调用 schema 和执行记录 | 未开始 |\n| 04 | RAG | 文档切分、检索、问答流程 | 未开始 |\n| 05 | Agent | 规划、工具调用、状态管理 | 未开始 |\n| 06 | MCP | MCP Server/Client 基础实验 | 未开始 |\n| 07 | Claude Code | CLAUDE.md、slash command、hooks、settings | 未开始 |\n| 08 | Eval / Security | golden dataset、评分、日志、报告 | 未开始 |\n| 开发实战周 | 日常开发使用 AI | 需求澄清记录、代码理解笔记、实现计划、测试清单、Review 记录 | 未开始 |\n\n## 每阶段完成标准\n\n建议每个阶段都完成：\n\n- [ ] 阅读 `README.md`。\n- [ ] 阅读 `01-basic.md`。\n- [ ] 阅读 `02-templates.md`。\n- [ ] 完成 `03-exercises.md`。\n- [ ] 完成 `04-exercises-lab/README.md` 中的核心练习。\n- [ ] 完成 `05-project.md`。\n- [ ] 完成 `06-project-lab/README.md` 中的项目方案或最小实现。\n- [ ] 阅读 `07-review.md` 并自评。\n\n## 开发实战周：日常开发使用 AI\n\n这条路径面向想先把 AI 用到真实开发场景的小白。建议先阅读 [labs/README.md](README.md) 中的推荐阅读顺序，再结合 [developer-ai-workflows.md](developer-ai-workflows.md) 和 [developer-prompt-recipes.md](developer-prompt-recipes.md) 完成下面 5 天练习。\n\n| 天数 | 主题 | 练习任务 | 产物 |\n| --- | --- | --- | --- |\n| Day 1 | 需求澄清与任务拆解 | 选择一个小需求，让 AI 帮你列出目标、非目标、输入输出、验收标准和风险点 | 需求澄清记录 |\n| Day 2 | 代码理解与上下文整理 | 选 1-3 个相关文件，让 AI 总结模块职责、调用链、待修改位置和不确定点 | 代码理解笔记 |\n| Day 3 | 实现计划与小步修改 | 让 AI 先给实现计划和回滚方案，再按最小改动完成一个小功能或 Bug 修复 | 实现计划与变更说明 |\n| Day 4 | 测试、排障与自查 | 让 AI 补充测试清单、解释失败原因、给出排障路径，但由你确认命令和结果 | 测试清单与排障记录 |\n| Day 5 | Code Review 与复盘 | 让 AI 从可读性、边界条件、安全、可维护性角度 Review 变更，并整理复盘 | Review 记录与下周改进项 |\n\n完成标准：\n\n- [ ] 能说清楚每次请求 AI 前提供了哪些上下文。\n- [ ] 能区分 AI 的建议、你自己确认的事实和最终采用的改动。\n- [ ] 每个改动都有最小验收方式，例如运行测试、检查链接、查看 diff。\n- [ ] 没有把真实 API Key、生产数据、cookie、token 或隐私信息发给 AI 或写进仓库。\n- [ ] 遇到不确定输出时，能回到 [troubleshooting.md](troubleshooting.md) 或源码自行验证。\n\n## 07 Claude Code 进度\n\n| 任务 | 完成情况 | 备注 |\n| --- | --- | --- |\n| 理解 CLAUDE.md 作用 | 未完成 |  |\n| 编写项目级 CLAUDE.md | 未完成 |  |\n| 设计 slash command | 未完成 |  |\n| 设计 hook | 未完成 |  |\n| 设计 settings 权限策略 | 未完成 |  |\n| 完成阶段复盘 | 未完成 |  |\n\n## 08 Eval / Security 进度\n\n| 任务 | 完成情况 | 备注 |\n| --- | --- | --- |\n| 设计 golden dataset | 未完成 |  |\n| 编写评分 rubric | 未完成 |  |\n| 记录 run result | 未完成 |  |\n| 设计脱敏日志 | 未完成 |  |\n| 生成 Markdown 报告 | 未完成 |  |\n| 完成安全检查清单 | 未完成 |  |\n| 完成阶段复盘 | 未完成 |  |\n\n## 每周复盘问题\n\n1. 本周我真正跑通了哪个最小流程？\n2. 哪个概念我还能讲给别人听？\n3. 哪个问题我只是照抄，还没有理解？\n4. 我的实验中有没有真实密钥或隐私风险？\n5. 下一周最小可完成目标是什么？\n\n## 学习建议\n\n- 不要跳过复盘。复盘能帮助你从“会操作”变成“会设计”。\n- 不要只追求 demo 成功。AI 工程更重要的是可评测、可排障、可控风险。\n- 不要把所有任务都交给 Agent。初学阶段要能解释每一步为什么这样做。\n",

        "content": "# Labs 常见问题排查\n\n本文整理学习 labs 时常见的问题和排查方法。排障时建议先读错误信息，再从最小命令开始验证。\n\n## 1. 找不到命令\n\n现象：\n\n```text\ncommand not found: node\ncommand not found: python\ncommand not found: git\n```\n\n排查：\n\n1. 确认工具是否安装。\n2. 确认终端是否重新打开。\n3. 确认 PATH 是否包含工具路径。\n\n可运行：\n\n```bash\nwhich node\nwhich python\nwhich python3\nwhich git\n```\n\n如果 `python` 不存在但 `python3` 存在，课程命令中的 `python` 可以替换为 `python3`。\n\n## 2. npm install 失败\n\n常见原因：\n\n- Node.js 版本过低。\n- 网络不稳定。\n- package-lock 与当前环境不兼容。\n- 项目本身没有 `package.json`。\n\n排查步骤：\n\n```bash\nnode --version\nnpm --version\nls\n```\n\n先确认当前目录是否真的有 `package.json`。如果没有，不要继续运行 `npm install`，先回到 lab README 查看推荐目录。\n\n## 3. Python 包导入失败\n\n现象：\n\n```text\nModuleNotFoundError: No module named 'xxx'\n```\n\n排查：\n\n1. 是否激活虚拟环境。\n2. 是否安装依赖。\n3. 是否使用了正确 Python 版本。\n\n常用命令：\n\n```bash\npython --version\npython -m pip --version\npython -m pip install <package-name>\n```\n\n如果课程没有要求某个包，优先用标准库完成练习，不要为了“看起来专业”安装大量依赖。\n\n## 4. API Key 未设置\n\n现象：\n\n```text\nMissing API key\nANTHROPIC_API_KEY is not set\n```\n\n排查：\n\n```bash\nprintenv ANTHROPIC_API_KEY\n```\n\n如果没有输出，说明当前终端没有设置环境变量。\n\n设置方式：\n\n```bash\nexport ANTHROPIC_API_KEY=\"你的真实密钥\"\n```\n\n注意：不要把真实密钥写进课程仓库。示例文件只写变量名或占位符。\n\n## 5. 模型调用超时或限流\n\n常见原因：\n\n- 网络不稳定。\n- 请求太大。\n- 并发过高。\n- 账号限额不足。\n- 服务商临时故障。\n\n解决建议：\n\n- 先用 mock 模式跑通流程。\n- 减少输入 token。\n- 降低并发。\n- 加入重试和超时设置。\n- 在日志中记录 `error_type`，不要记录真实 key。\n\n## 6. Eval 分数波动大\n\n常见原因：\n\n- 测试集太少。\n- 评分标准不清楚。\n- 模型输出随机性较高。\n- Judge prompt 不稳定。\n- 不同类别样例混在一起只看平均分。\n\n改进建议：\n\n- 增加 golden dataset 数量。\n- 固定评分 rubric。\n- 按 category 分开统计。\n- 高风险样例单独看。\n- 关键版本做人工抽检。\n\n## 7. 评测报告只有数字，不知道怎么改\n\n改进报告结构：\n\n- 增加失败用例表格。\n- 增加失败原因分类。\n- 增加安全问题列表。\n- 增加 prompt 或数据集修改建议。\n- 增加下一次回归测试范围。\n\n报告的目标不是展示漂亮指标，而是指导下一轮工程改进。\n\n## 8. Claude Code 改了不该改的文件\n\n常见原因：\n\n- `CLAUDE.md` 没有写清项目边界。\n- 用户任务描述范围太大。\n- slash command 没有要求先计划再执行。\n- 没有在修改后检查 diff。\n\n改进建议：\n\n- 在 `CLAUDE.md` 中写明“只修改与任务相关文件”。\n- 要求 Agent 先输出计划并等待确认。\n- 任务完成后查看修改文件列表。\n- 高风险操作必须人工确认。\n\n## 9. Hook 运行后卡住或失败\n\n排查方向：\n\n- hook 命令是否存在。\n- 当前目录是否正确。\n- 命令是否需要交互输入。\n- 命令是否耗时过长。\n- 失败后是否有清晰提示。\n\n教学阶段建议 hook 只做轻量检查，例如格式化检查、lint、单元测试子集。不要在 hook 中执行部署、删除、推送等高风险操作。\n\n## 10. 日志文件太大\n\n常见原因：\n\n- 保存了完整输入和完整输出。\n- 保存了过多 debug 信息。\n- 批量评测没有分 run 管理。\n\n改进建议：\n\n- 日志只保存必要元数据。\n- 大文本输出放到 runs，日志只记录路径或摘要。\n- 每次评测使用独立 run id。\n- 定期清理本地临时文件。\n\n## 通用排障流程\n\n遇到问题时按下面顺序处理：\n\n1. 复制完整错误信息，但注意去掉密钥和隐私。\n2. 确认当前目录是否正确。\n3. 确认依赖是否安装。\n4. 用最小输入复现问题。\n5. 查看 README 或检查清单。\n6. 如果仍无法解决，记录：环境、命令、错误、已尝试方法。\n\n## 提问模板\n\n当你向老师、同学或 AI 工具求助时，可以使用：\n\n```text\n我在完成哪个 lab：\n我执行的命令：\n期望结果：\n实际错误：\n我已经尝试：\n是否包含真实密钥或隐私：否\n```\n\n不要在提问中粘贴真实 API Key、cookie、token 或生产数据。\n",

        "content": "# AI 基础讲解\n\n## 1. AI、机器学习、深度学习、大模型是什么关系\n\n可以把它们理解成一层一层包含的关系：\n\n```text\nAI 人工智能\n└── 机器学习 Machine Learning\n    └── 深度学习 Deep Learning\n        └── 大模型 Foundation Model / LLM\n```\n\n- **AI**：让机器表现出类似智能的能力，例如识别图片、理解语言、规划任务。\n- **机器学习**：不把规则全部手写死，而是让模型从数据中学习规律。\n- **深度学习**：使用多层神经网络学习复杂模式。\n- **大模型**：在大量数据上训练出来的通用模型，可以迁移到很多任务。\n- **LLM**：Large Language Model，大语言模型，主要处理文本，也可以扩展到图片、音频、代码等多模态输入。\n\n小白可以先不用理解训练细节，只要记住：\n\n> LLM 不是一个“知识库表格”，而是一个根据上下文预测和生成内容的模型。\n\n## 2. LLM 为什么能聊天、总结、写代码\n\nLLM 的核心能力是根据前面的文本预测后面可能出现的文本。因为训练数据里包含大量文章、问答、代码、文档和对话，所以它学会了很多语言模式和代码模式。\n\n当你输入：\n\n```text\n请总结下面这段话：...\n```\n\n模型会根据“总结任务”的模式生成摘要。当你输入：\n\n```text\n请解释这个 Python 函数：...\n```\n\n模型会根据代码解释的模式输出说明。\n\n但它不是每次都在查事实数据库，所以可能出现：\n\n- 说得很流畅但不正确。\n- 编造不存在的 API、文件、参数。\n- 忽略你没有明确说明的边界。\n\n这就是为什么后续要学习 Prompt、RAG、Tool Use、Eval 和 Security。\n\n## 3. Prompt 是什么\n\nPrompt 是你给模型的任务说明书。好的 Prompt 通常包含：\n\n1. 角色：你希望模型以什么身份回答。\n2. 任务：要完成什么。\n3. 背景：必要上下文。\n4. 约束：不能做什么、必须遵守什么。\n5. 输出格式：Markdown、JSON、表格等。\n6. 验收标准：怎样算好答案。\n\n差 Prompt：\n\n```text\n帮我写一下。\n```\n\n好 Prompt：\n\n```text\n你是资深 Python 老师。请解释下面函数的作用，面向刚学 Python 的学生。\n输出包括：功能、输入、输出、关键步骤、可能的 bug。\n如果信息不足，请明确说明不要猜测。\n```\n\n## 4. Token 和上下文窗口\n\n模型不是直接按“字”理解内容，而是把文本切成 token。\n\n可以简单理解为：\n\n- 英文 token 常接近单词或词片段。\n- 中文 token 可能是字、词或片段。\n- 代码、标点、空格也可能占 token。\n\n**上下文窗口**就是一次对话里模型能看到的最大 token 数。超过窗口的内容，模型可能看不到或需要压缩。\n\n这会影响：\n\n- 不能无限贴代码。\n- 长文档需要切分、检索或总结。\n- 多轮对话太长时，早期信息可能丢失。\n- Agent 做复杂任务时要记录状态和中间结果。\n\n## 5. Temperature 是什么\n\nTemperature 可以粗略理解为“随机程度”：\n\n- 低 temperature：更稳定、保守、适合代码、格式化、事实问答。\n- 高 temperature：更多变化、适合创意写作、头脑风暴。\n\n小白建议：\n\n- 写代码、生成 JSON、做评测：低一些。\n- 想标题、创意方案：可以高一些。\n\n## 6. 幻觉是什么\n\n幻觉是模型生成了看似合理但不真实的内容，例如：\n\n- 编造不存在的函数。\n- 引用不存在的文章。\n- 说错配置项。\n- 对不确定问题给出肯定答案。\n\n降低幻觉的方法：\n\n1. 给清楚上下文。\n2. 要求“不确定就说不知道”。\n3. 使用 RAG 提供可引用资料。\n4. 使用工具查询真实数据。\n5. 用测试和评测验证输出。\n\n## 7. Chatbot、RAG、Agent、MCP 的区别\n\n| 名称 | 解决什么问题 | 典型输入 | 典型输出 |\n| --- | --- | --- | --- |\n| Chatbot | 对话、解释、总结 | 用户问题 | 文本回答 |\n| RAG | 基于资料回答 | 问题 + 检索文档 | 带引用的回答 |\n| Tool Use | 调用外部能力 | 工具 schema + 参数 | 工具结果 |\n| Agent | 多步骤完成任务 | 目标 + 工具 + 状态 | 行动、观察、最终结果 |\n| MCP | 标准化接入工具和上下文 | tools/resources/prompts | 统一协议能力 |\n| Claude Code | 在开发环境中协助工程任务 | 代码仓库 + 指令 | 计划、修改、测试、总结 |\n\n一句话理解：\n\n- Chatbot 偏回答。\n- RAG 偏查资料后回答。\n- Tool Use 偏调用具体能力。\n- Agent 偏围绕目标多步执行。\n- MCP 偏让工具接入更标准。\n- Claude Code 偏把 Agent 用到真实开发流程中。\n\n## 8. AI 开发和普通开发有什么不同\n\n传统软件更像：\n\n```text\n输入固定 -> 规则固定 -> 输出可预测\n```\n\nAI 应用更像：\n\n```text\n输入变化大 -> 模型输出有不确定性 -> 需要评测、边界和兜底\n```\n\n所以 AI 工程更关注：\n\n- Prompt 是否稳定。\n- 上下文是否足够。\n- 输出是否可验证。\n- 工具调用是否有权限。\n- 回答是否有引用。\n- 是否能拒答。\n- 是否有评测集和安全样例。\n\n## 9. 小白常见误区\n\n### 误区一：AI 什么都知道\n\n更准确的说法：AI 能根据上下文生成答案，但不保证事实正确。\n\n### 误区二：Prompt 是魔法咒语\n\nPrompt 是任务说明，不是咒语。真正稳定的 AI 应用还需要数据、工具、测试和评测。\n\n### 误区三：Agent 越自动越好\n\nAgent 必须有边界。删除文件、发请求、改数据库、发邮件、push 代码都需要权限控制。\n\n### 误区四：RAG 就是把文档塞给模型\n\nRAG 需要切分、检索、重排、引用、拒答和评测。否则模型仍然可能乱答。\n\n### 误区五：能跑通 demo 就能上线\n\n上线还需要日志、监控、权限、成本控制、安全检查、回归评测和人工兜底。\n\n## 10. 后续课程怎么学\n\n推荐顺序：\n\n1. 先学 Prompt：让模型听懂任务。\n2. 再学 LLM API：知道应用如何调用模型。\n3. 学 Tool Use：让模型能调用函数和工具。\n4. 学 RAG：让模型基于资料回答。\n5. 学 Agent：让模型多步骤完成任务。\n6. 学 MCP：让工具和上下文接入标准化。\n7. 学 Claude Code / Skill：把 Agent 用到开发工作流。\n8. 学 Eval / Security：验证效果和安全边界。\n",
        "excerpt": "可以把它们理解成一层一层包含的关系：",

        "path": "lessons/00-ai-foundation/02-templates.md",
        "content": "# AI 基础常用模板\n\n本阶段的模板用于帮助小白把抽象概念问清楚、画清楚、复述清楚。\n\n## 模板 1：概念解释\n\n```text\n你是 AI 入门老师。请用小白能懂的方式解释：<概念>。\n\n要求：\n1. 先用一句话说明它是什么。\n2. 用生活类比解释。\n3. 说明它在 AI 应用中的作用。\n4. 给一个简单例子。\n5. 列出 3 个常见误区。\n6. 如果涉及不确定或高级细节，请标记为“进阶再学”。\n```\n\n## 模板 2：概念对比\n\n```text\n请比较下面几个概念：<概念 A>、<概念 B>、<概念 C>。\n\n请用表格输出：\n- 解决什么问题\n- 输入是什么\n- 输出是什么\n- 适合什么场景\n- 不适合什么场景\n- 小白容易误解的点\n```\n\n## 模板 3：学习路线规划\n\n```text\n我是 AI 初学者，背景是：<你的技术背景>。\n我想达到的目标是：<目标>。\n每天可学习时间：<时间>。\n\n请帮我制定 4 周学习路线，要求：\n1. 每周目标明确。\n2. 每天有小任务。\n3. 每周有可运行或可展示产物。\n4. 标出哪些内容先了解即可，哪些必须掌握。\n```\n\n## 模板 4：把术语翻译成开发语言\n\n```text\n请把下面 AI 术语翻译成软件开发者容易理解的说法：<术语列表>。\n\n每个术语请输出：\n1. 一句话解释\n2. 类似传统开发中的什么概念\n3. 它不是传统开发中的什么\n4. 一个开发场景例子\n```\n\n## 模板 5：判断该用什么 AI 方案\n\n```text\n我有一个需求：<需求描述>。\n\n请判断更适合使用 Chatbot、Prompt、RAG、Tool Use、Agent、MCP 还是 Claude Code。\n\n请输出：\n1. 推荐方案\n2. 为什么\n3. 不推荐哪些方案\n4. 最小实现路径\n5. 风险和安全边界\n```\n",
        "excerpt": "本阶段的模板用于帮助小白把抽象概念问清楚、画清楚、复述清楚。",

        "path": "lessons/00-ai-foundation/03-exercises.md",
        "content": "# AI 基础练习\n\n## 练习 1：画出 AI 概念关系图\n\n请用文本画出下面概念的包含或协作关系：\n\n- AI\n- Machine Learning\n- Deep Learning\n- LLM\n- Prompt\n- RAG\n- Agent\n- MCP\n- Eval\n\n要求：\n\n1. 至少画出两层关系。\n2. 每个概念写一句话解释。\n3. 标出你还不确定的概念。\n\n## 练习 2：区分 Chatbot、RAG、Agent\n\n下面需求分别适合 Chatbot、RAG 还是 Agent？请说明原因。\n\n1. “解释 Python 中 list 和 tuple 的区别。”\n2. “根据公司内部报销制度回答员工问题，并给出处。”\n3. “检查一个 PR，运行测试，发现失败后尝试修复。”\n4. “把用户输入转换为固定 JSON。”\n5. “每天读取构建结果，失败时创建 issue。”\n\n## 练习 3：识别幻觉风险\n\n阅读下面回答，指出可能的幻觉风险：\n\n```text\n这个库一定支持 auto_magic_config 参数，你只要在配置里打开它就能解决所有问题。\n```\n\n请回答：\n\n1. 哪些词说明它可能不可靠？\n2. 你会如何验证？\n3. 如何改写 Prompt 让模型更谨慎？\n\n## 练习 4：设计一个好 Prompt\n\n任务：让 AI 帮你解释一段陌生代码。\n\n请写一个 Prompt，必须包含：\n\n- 角色\n- 任务\n- 背景\n- 输出格式\n- 不确定时的处理方式\n- 验收标准\n\n## 练习 5：AI 使用安全判断\n\n判断下面行为是否安全，并说明原因：\n\n1. 把 `.env` 文件贴给 AI，让它帮忙排查连接失败。\n2. 把脱敏后的错误日志贴给 AI。\n3. 让 AI 生成单元测试草稿。\n4. 让 Agent 自动执行 `git push --force`。\n5. 让 AI 根据公开 README 写快速开始文档。\n\n## 练习 6：学习路线自评\n\n请写下你当前最想做的 AI 项目，并回答：\n\n1. 它需要 Prompt 吗？\n2. 它需要真实 LLM API 吗？\n3. 它需要 RAG 吗？\n4. 它需要工具调用或 Agent 吗？\n5. 它需要评测和安全边界吗？\n",
        "excerpt": "请用文本画出下面概念的包含或协作关系：",

        "path": "lessons/00-ai-foundation/04-exercises-lab/README.md",
        "content": "# AI 基础练习实验工程\n\n这个 lab 不要求写复杂代码，目标是把 AI 相关概念整理成你自己的学习地图。\n\n## 目标\n\n完成一个 `ai-learning-map.md`，说明：\n\n- AI / ML / DL / LLM 的关系。\n- Chatbot / RAG / Agent / MCP 的区别。\n- Prompt、token、上下文、幻觉的含义。\n- 开发中使用 AI 的安全边界。\n- 你后续最想完成的 AI 项目。\n\n## 建议目录\n\n```text\nmy-ai-foundation-lab/\n  ai-learning-map.md\n  glossary.md\n  use-case-decisions.md\n```\n\n## 步骤\n\n### 1. 写概念地图\n\n在 `ai-learning-map.md` 中画出：\n\n```text\n用户问题\n  -> Prompt\n  -> LLM\n  -> 可选：RAG / Tool / Agent / MCP\n  -> 输出\n  -> Eval / Security 检查\n```\n\n### 2. 写术语表\n\n在 `glossary.md` 中至少解释 12 个术语：\n\n- AI\n- ML\n- DL\n- LLM\n- Prompt\n- Token\n- Context Window\n- Hallucination\n- Embedding\n- RAG\n- Tool Use\n- Agent\n- MCP\n- Eval\n\n### 3. 做方案判断\n\n在 `use-case-decisions.md` 中选择 5 个真实开发需求，判断该用：\n\n- Prompt\n- LLM API\n- RAG\n- Tool Use\n- Agent\n- MCP\n- Claude Code\n\n每个需求写明为什么。\n\n## 验收标准\n\n- 能用自己的话解释核心术语。\n- 能判断常见需求适合哪种 AI 方案。\n- 能说出至少 5 条安全边界。\n- 不包含真实 API Key、token、cookie 或生产数据。\n",
        "excerpt": "这个 lab 不要求写复杂代码，目标是把 AI 相关概念整理成你自己的学习地图。",

        "path": "lessons/00-ai-foundation/05-project.md",
        "content": "# AI 基础实战项目：AI 学习导航卡片\n\n## 项目背景\n\n很多小白刚接触 AI 时会被术语淹没：Prompt、Agent、RAG、MCP、Embedding、Eval 都听过，但不知道分别解决什么问题。\n\n本项目要求你做一份“AI 学习导航卡片”，帮助另一个初学者快速判断：我应该先学什么，我的需求适合用什么技术。\n\n## 项目目标\n\n产出一份 Markdown 文档或简单网页，包含：\n\n1. AI 术语地图。\n2. 常见需求到技术方案的选择表。\n3. 小白常见误区说明。\n4. 安全边界清单。\n5. 后续学习路线。\n\n## 用户故事\n\n作为 AI 初学者，我希望：\n\n- 能快速知道 AI、LLM、Agent、MCP 的关系。\n- 能判断我的需求该用 Chatbot、RAG 还是 Agent。\n- 能知道哪些内容不能直接交给 AI。\n- 能知道下一步该学哪一章。\n\n## 功能要求\n\n### 1. 术语地图\n\n至少包含：\n\n- AI / ML / DL / LLM\n- Prompt / Token / Context Window / Hallucination\n- Embedding / RAG\n- Tool Use / Agent / MCP\n- Eval / Security\n\n### 2. 方案选择表\n\n示例：\n\n| 需求 | 推荐方案 | 原因 | 风险 |\n| --- | --- | --- | --- |\n| 总结一段文章 | Prompt | 不需要外部数据 | 可能漏重点 |\n| 基于公司制度问答 | RAG | 需要引用内部资料 | 权限和脱敏 |\n| 自动修复测试失败 | Agent / Claude Code | 需要多步执行和验证 | 需要权限控制 |\n\n### 3. 误区说明\n\n至少说明 5 个误区：\n\n- AI 不是数据库。\n- Prompt 不是魔法。\n- Agent 不是越自动越好。\n- RAG 不只是塞文档。\n- Demo 成功不等于可上线。\n\n### 4. 安全边界\n\n至少包含：\n\n- 不提交真实 API Key。\n- 不粘贴用户隐私。\n- 高风险操作需要确认。\n- 输出要验证。\n- 生产操作要有回滚。\n\n## 验收标准\n\n- 初学者能在 10 分钟内读懂。\n- 每个术语都有一句话解释。\n- 每个推荐方案都有原因和风险。\n- 没有真实密钥或敏感信息。\n- 能链接到后续课程阶段。\n",
        "excerpt": "很多小白刚接触 AI 时会被术语淹没：Prompt、Agent、RAG、MCP、Embedding、Eval 都听过，但不知道分别解决什么问题。",

        "path": "lessons/00-ai-foundation/06-project-lab/README.md",
        "content": "# AI 学习导航卡片项目实验\n\n本 lab 帮你把 `05-project.md` 的项目真正落地。你可以只写 Markdown，也可以做成简单 HTML 页面。\n\n## 推荐产物\n\n```text\nai-learning-navigator/\n  README.md\n  glossary.md\n  decision-table.md\n  safety-checklist.md\n  roadmap.md\n```\n\n## 实现步骤\n\n### 1. 写 README\n\n说明这个导航卡片适合谁、解决什么问题、如何阅读。\n\n### 2. 写 glossary\n\n每个术语用下面格式：\n\n```markdown\n## Prompt\n\n一句话：Prompt 是给模型的任务说明书。\n\n解决什么：让模型知道要做什么、怎么输出。\n\n例子：让模型按 JSON 输出需求字段。\n\n容易误解：Prompt 不能保证事实正确，还需要验证。\n```\n\n### 3. 写 decision-table\n\n至少列出 10 个开发或学习需求，并判断适合的 AI 技术：\n\n- Prompt\n- LLM API\n- Tool Use\n- RAG\n- Agent\n- MCP\n- Claude Code\n- Eval / Security\n\n### 4. 写 safety-checklist\n\n分成三类：\n\n- 输入给 AI 前检查。\n- AI 输出后检查。\n- 提交或上线前检查。\n\n### 5. 写 roadmap\n\n把后续课程链接进去：\n\n1. [Prompt](../../01-prompt/README.md)\n2. [LLM API](../../02-llm-api/README.md)\n3. [Tool Use](../../03-tool-use/README.md)\n4. [RAG](../../04-rag/README.md)\n5. [Agent](../../05-agent/README.md)\n6. [MCP](../../06-mcp/README.md)\n7. [Claude Code](../../07-claude-code/README.md)\n8. [Eval / Security](../../08-eval-security/README.md)\n\n## 自测问题\n\n- 另一个小白能不能只看你的导航就知道下一步学什么？\n- 每个术语是否都有例子？\n- 方案选择是否说明了风险？\n- 是否没有真实 API Key、token、cookie、生产数据？\n\n## 可选扩展\n\n- 做一个单页 HTML。\n- 给每个术语配一个图。\n- 把 decision table 做成问答流程。\n- 增加“开发中如何使用 AI”的入口：[developer-ai-workflows](../../../labs/developer-ai-workflows.md)。\n",
        "excerpt": "本 lab 帮你把 `05-project.md` 的项目真正落地。你可以只写 Markdown，也可以做成简单 HTML 页面。",

        "title": "AI 基础阶段复盘",
        "path": "lessons/00-ai-foundation/07-review.md",
        "content": "# AI 基础阶段复盘\n\n## 你应该已经理解\n\n- AI、机器学习、深度学习、大模型、LLM 的层级关系。\n- Prompt、token、上下文窗口、temperature、幻觉的基本含义。\n- Chatbot、RAG、Tool Use、Agent、MCP、Claude Code 的区别。\n- 为什么 AI 应用需要评测、安全和权限边界。\n- 后续 01-08 阶段分别解决什么问题。\n\n## 自查问题\n\n1. AI 和 LLM 是同一个东西吗？为什么？\n2. 为什么说 LLM 不是数据库？\n3. Prompt 为什么要包含任务、上下文、约束和输出格式？\n4. 上下文窗口太小会带来什么问题？\n5. 什么是幻觉？如何降低幻觉？\n6. 什么需求适合 RAG？什么需求适合 Agent？\n7. MCP 解决什么问题？\n8. Claude Code 和普通 Chatbot 有什么不同？\n9. 开发中使用 AI 时，哪些信息不能直接粘贴？\n10. 为什么 demo 成功不代表可以上线？\n\n## 常见错误\n\n### 1. 把 AI 当成搜索引擎或数据库\n\nAI 可以生成答案，但关键事实要用资料、工具或测试验证。\n\n### 2. 只学 Prompt，不学工程边界\n\nPrompt 是入口，不是全部。真实应用还需要 API、工具、数据、评测和安全。\n\n### 3. 过早追求复杂 Agent\n\n初学阶段先把 Prompt、API、Tool Use、RAG 跑通，再做 Agent。\n\n### 4. 忽略成本和隐私\n\n真实模型调用会消耗额度，也可能涉及敏感数据。默认先用 mock 和脱敏样例。\n\n### 5. 不做复盘\n\n能复制命令不代表理解。每个阶段都要能用自己的话解释“为什么这样做”。\n\n## 进入下一阶段的标准\n\n如果你能回答下面问题，就可以进入 01 Prompt：\n\n- 我能用一句话解释 LLM。\n- 我知道 Prompt 是任务说明书。\n- 我知道模型可能幻觉。\n- 我知道 RAG、Agent、MCP 大概分别解决什么问题。\n- 我知道不能把真实密钥和隐私数据发给 AI。\n\n## 下一步\n\n进入 [01 Prompt Engineering](../01-prompt/README.md)，开始学习如何把任务说清楚。\n",
        "excerpt": "- AI、机器学习、深度学习、大模型、LLM 的层级关系。 - Prompt、token、上下文窗口、temperature、幻觉的基本含义。 - Chatbot、RAG、Tool Use、Agent、MCP、Claude Code 的区别。 - 为什么 AI 应用需要评测、安全和权限边界。 - 后续 01-08 阶段分别解决什么问题。",

        "content": "# 00 AI 基础导学\n\n## 学习目标\n\n用最直观的方式理解 AI、机器学习、深度学习、大模型、LLM、Agent、RAG、MCP 和 Claude Code 之间的关系，为后续 01-08 阶段打基础。\n\n这个阶段不要求会深度学习数学，也不要求真实 API Key。你只需要能看懂基本 Python 命令、愿意动手记录和复盘。\n\n## 学习内容\n\n- [基础讲解](01-basic.md)\n- [常用模板](02-templates.md)\n- [练习任务](03-exercises.md)\n- [练习实验工程](04-exercises-lab/README.md)\n- [实战项目](05-project.md)\n- [项目实验工程](06-project-lab/README.md)\n- [阶段复盘](07-review.md)\n\n## 核心概念\n\n- AI、机器学习、深度学习、大模型\n- LLM、Chatbot、Agent\n- Prompt、Token、上下文窗口\n- 幻觉、温度、结构化输出\n- Embedding、RAG、知识库问答\n- Tool Use、Function Calling、MCP\n- Claude Code、Skill、CLI Agent\n- Eval、安全、权限边界\n\n## 学习任务\n\n1. 能用自己的话区分 AI、ML、DL、LLM。\n2. 能解释 Chatbot、Agent、RAG、MCP 的区别。\n3. 能理解 token、上下文窗口和幻觉的直观含义。\n4. 能说出开发中使用 AI 的安全边界。\n5. 能画出“用户问题 -> Prompt -> LLM -> 工具/RAG/Agent -> 输出 -> 评测”的流程。\n\n## 建议耗时\n\n- 阅读基础讲解：30-45 分钟\n- 完成练习：45-60 分钟\n- 完成小项目：1-2 小时\n\n## 学完你应该能做到\n\n- 看到 AI 相关术语不再迷路。\n- 知道什么时候用 Prompt、什么时候用 RAG、什么时候需要 Agent。\n- 知道为什么不能把 AI 当数据库或权威事实来源。\n- 知道后续 01-08 阶段各自解决什么问题。\n\n## 下一步\n\n完成本阶段后，进入 [01 Prompt Engineering](../01-prompt/README.md)。\n",

        "path": "lessons/01-prompt/01-basic.md",
        "content": "# Prompt 基础\n\n## Prompt 是什么\n\nPrompt 可以理解为给 AI 的任务说明书。\n\n写得越清楚，AI 输出越稳定；写得越模糊，AI 越容易跑偏、编造或输出不可用的结果。\n\n## 好 Prompt 的基本结构\n\n推荐先使用这个结构：\n\n```text\n角色：你要让 AI 扮演什么角色。\n任务：你希望 AI 完成什么事情。\n背景：给 AI 哪些上下文信息。\n约束：输出长度、风格、限制条件。\n格式：用 Markdown、JSON、表格还是其他格式输出。\n示例：如果有固定风格，给一个参考例子。\n```\n\n简化记忆：\n\n```text\n角色 + 任务 + 背景 + 约束 + 输出格式\n```\n\n## 普通 Prompt 与优化 Prompt 对比\n\n### 普通写法\n\n```text\n帮我总结这篇文章。\n```\n\n问题：\n\n- 不知道总结多长\n- 不知道给谁看\n- 不知道要不要保留细节\n- 不知道输出什么格式\n- 不知道重点关注什么\n\n### 优化写法\n\n```text\n你是一名擅长阅读技术文章的 AI 助手。\n\n请帮我总结下面这篇文章。\n\n要求：\n1. 用中文回答\n2. 先用 3 句话概括核心内容\n3. 再列出 5 个关键要点\n4. 最后给出一个适合初学者的理解建议\n5. 不要编造文章中没有的信息\n\n文章内容：\n{这里粘贴文章}\n```\n\n## Prompt 的 5 个核心技巧\n\n### 1. 明确角色\n\n```text\n你是一名有 10 年经验的增长营销专家，请帮我写一段面向程序员的 AI 工具推广文案。\n```\n\n### 2. 明确任务\n\n```text\n请分析这个产品需求，指出：\n1. 核心目标\n2. 用户场景\n3. 可能遗漏的边界情况\n4. 技术实现风险\n```\n\n### 3. 明确输出格式\n\n```text\n请用 Markdown 表格输出，包含三列：问题、原因、解决方案。\n```\n\n### 4. 给约束\n\n```text\n要求：\n1. 不要编造不存在的信息\n2. 如果不确定，请说“不确定”\n3. 回答控制在 300 字以内\n4. 面向初学者解释\n```\n\n### 5. 给示例\n\n```text\n请按照下面风格生成 3 条标题：\n\n示例：\n输入：AI 写代码\n输出：AI 编程助手：从 Copilot 到 Agent 的演进\n\n现在请为下面主题生成标题：\n主题：MCP 入门\n```\n\n## 什么时候需要写更详细的 Prompt\n\n适合写详细 Prompt 的场景：\n\n- 要求输出稳定格式\n- 输出要给程序继续处理\n- 任务复杂，需要分步骤完成\n- 有明确角色、风格或边界要求\n- 需要避免模型编造\n\n简单随意提问适合探索；正式任务要写成任务说明书。\n\n## 一句话总结\n\nPrompt 的本质不是提问，而是给 AI 写清楚任务说明书。\n",

        "content": "# Prompt 模板示例\n\n## 文章总结模板\n\n```text\n你是一名擅长阅读和总结技术文章的 AI 助手。\n\n请总结下面这篇文章。\n\n要求：\n1. 用中文回答\n2. 不要编造文章中没有的信息\n3. 如果文章信息不足，请明确说明\n4. 输出格式必须如下：\n\n一句话总结：\n{用一句话概括文章核心内容}\n\n核心要点：\n- {要点 1}\n- {要点 2}\n- {要点 3}\n\n适合谁看：\n{说明适合的读者}\n\n我的建议：\n{给初学者的学习或行动建议}\n\n文章内容：\n{粘贴文章}\n```\n\n## 代码解释模板\n\n```text\n你是一名资深软件工程师，擅长用简单语言解释代码。\n\n请解释下面这段代码，目标读者是编程新手。\n\n要求：\n1. 先整体说明这段代码的作用\n2. 再解释关键逻辑\n3. 指出新手容易误解的地方\n4. 如果有更简单的写法，请给出简化版本\n5. 用中文回答\n\n代码：\n{粘贴代码}\n```\n\n## JSON 信息提取模板\n\n```text\n请从用户输入中提取结构化信息，并严格输出 JSON。\n\n要求：\n1. 不要输出 Markdown\n2. 不要输出解释\n3. 不要添加 JSON 以外的任何内容\n4. 如果字段不存在，值为 null\n5. keywords 必须是字符串数组\n6. JSON 字段必须包含：name、job、goal、keywords\n\n用户输入：\n{用户输入}\n\n输出格式：\n{\n  \"name\": null,\n  \"job\": null,\n  \"goal\": null,\n  \"keywords\": []\n}\n```\n\n## 需求分析模板\n\n```text\n你是一名经验丰富的产品和技术分析专家。\n\n请分析下面的需求。\n\n要求输出：\n1. 需求目标\n2. 用户场景\n3. 核心功能\n4. 边界情况\n5. 技术风险\n6. 需要进一步确认的问题\n\n需求内容：\n{粘贴需求}\n```\n",

        "content": "# Prompt 练习\n\n## 练习 1：文章总结 Prompt\n\n请写一个 Prompt，要求 AI 总结一篇文章，并按下面格式输出：\n\n```text\n一句话总结：\n核心要点：\n适合谁看：\n我的建议：\n```\n\n要求：\n\n- 用中文回答\n- 不要编造文章中没有的信息\n- 面向初学者\n\n## 练习 2：代码解释 Prompt\n\n请写一个 Prompt，要求 AI 给新手解释一段代码。\n\n必须包含：\n\n- 整体作用\n- 关键逻辑\n- 易错点\n- 简化版本\n\n## 练习 3：JSON 信息提取 Prompt\n\n请写一个 Prompt，从用户输入中提取下面字段：\n\n```json\n{\n  \"name\": \"\",\n  \"job\": \"\",\n  \"goal\": \"\",\n  \"keywords\": []\n}\n```\n\n要求：\n\n- 严格输出 JSON\n- 不要输出解释\n- 缺失字段用 null\n- keywords 必须是数组\n\n## 练习 4：对比实验\n\n针对同一个任务，分别写 3 个 Prompt：\n\n1. 简单 Prompt\n2. 带角色和任务的 Prompt\n3. 带角色、任务、约束和输出格式的 Prompt\n\n比较三次输出的差异。\n\n记录：\n\n```text\n任务：\nPrompt 1 效果：\nPrompt 2 效果：\nPrompt 3 效果：\n我的结论：\n```\n",

        "path": "lessons/01-prompt/04-exercises-lab/README.md",
        "content": "# Prompt 练习工程说明\n\n本目录用于完成 Prompt Engineering 阶段的练习实验。它更像一个“文本实验台”，重点不是写可运行代码，而是通过多轮编写、测试、对比和复盘，理解 Prompt 如何影响模型输出。\n\n## 练习目标\n\n完成本实验后，你应该能够：\n\n1. 把一个模糊任务改写成清晰 Prompt。\n2. 使用角色、任务、背景、约束、示例和输出格式控制结果。\n3. 对同一个任务设计多个 Prompt，并比较输出差异。\n4. 识别模型编造、格式不稳定、遗漏约束等常见问题。\n5. 形成一套可复用的 Prompt 测试记录方法。\n\n## 推荐目录\n\n建议在本目录下按下面结构整理你的练习成果：\n\n```text\n04-exercises-lab/\n  README.md\n  exercise-01-summary.md\n  exercise-02-code-explain.md\n  exercise-03-json-extraction.md\n  exercise-04-compare.md\n  exercise-05-prompt-chain.md\n  answers/\n    exercise-01-reference.md\n    exercise-02-reference.md\n    exercise-03-reference.md\n    exercise-04-reference.md\n```\n\n说明：\n\n- `exercise-*.md`：你自己的练习过程和实验记录。\n- `answers/`：参考答案目录，可以由老师提供，也可以在完成练习后自己整理。\n- 如果只是课堂练习，也可以只在一个 Markdown 文件中记录全部实验。\n\n## 运行 / 使用方式\n\n本阶段不要求编写程序。你可以使用任意大模型产品或本地模型完成实验，例如：\n\n1. 打开一个 AI 对话产品。\n2. 复制练习中的 Prompt。\n3. 输入测试文本或测试任务。\n4. 保存模型输出。\n5. 记录“Prompt 写法”和“输出效果”。\n6. 根据问题修改 Prompt，再重复测试。\n\n建议每个实验至少记录 3 次结果：\n\n```text\n实验编号：\n任务目标：\nPrompt 版本：\n测试输入：\n模型输出摘要：\n发现的问题：\n下一版改进：\n```\n\n## 练习 1：文章总结 Prompt\n\n### 任务\n\n设计一个 Prompt，让模型总结一篇文章，并输出：\n\n```text\n一句话总结：\n核心要点：\n适合谁看：\n行动建议：\n不确定信息：\n```\n\n### 实验要求\n\n- 明确说明“只能基于原文总结”。\n- 面向初学者，用中文回答。\n- 如果原文没有提到，不要补充事实。\n- 至少测试一篇技术文章和一篇非技术文章。\n\n### 记录重点\n\n观察模型是否会：\n\n- 增加原文没有的信息。\n- 把“行动建议”写得过于泛泛。\n- 漏掉“适合谁看”。\n- 输出格式不稳定。\n\n## 练习 2：代码解释 Prompt\n\n### 任务\n\n设计一个 Prompt，让模型给新手解释一段代码。\n\n### 输出格式建议\n\n```text\n代码整体作用：\n执行流程：\n关键变量：\n易错点：\n可以如何改进：\n给新手的一句话总结：\n```\n\n### 实验要求\n\n- 不要求模型重写全部代码。\n- 要求模型先解释目的，再解释细节。\n- 对不确定的依赖、上下文或业务含义，要说明“不确定”。\n\n## 练习 3：JSON 信息提取 Prompt\n\n### 任务\n\n从用户文本中提取结构化信息。\n\n目标 JSON：\n\n```json\n{\n  \"name\": null,\n  \"job\": null,\n  \"goal\": null,\n  \"keywords\": []\n}\n```\n\n### 实验要求\n\n- 严格输出 JSON。\n- 不输出 Markdown 代码块。\n- 缺失字段使用 `null`。\n- `keywords` 必须是字符串数组。\n- 至少测试一条信息完整输入、一条信息缺失输入、一条干扰信息较多输入。\n\n## 练习 4：Prompt 对比实验\n\n### 任务\n\n对同一个任务分别设计 3 个 Prompt：\n\n1. 简单 Prompt：只描述任务。\n2. 增强 Prompt：加入角色和背景。\n3. 稳定 Prompt：加入角色、任务、背景、约束、输出格式和示例。\n\n### 对比表\n\n```text\n任务：\n测试输入：\n\nPrompt 1：\n输出 1：\n问题：\n\nPrompt 2：\n输出 2：\n问题：\n\nPrompt 3：\n输出 3：\n问题：\n\n我的结论：\n```\n\n## 练习 5：Prompt Chaining\n\n### 任务\n\n把一个复杂任务拆成多个连续 Prompt，例如“从需求到测试用例”：\n\n1. 提取需求目标。\n2. 拆解功能点。\n3. 识别边界情况。\n4. 生成测试用例表格。\n5. 检查遗漏。\n\n### 实验要求\n\n- 每一步只做一类事情。\n- 下一步 Prompt 要引用上一步输出。\n- 记录“拆成多步”与“一次性完成”的差异。\n\n## 参考答案说明\n\n参考答案不是唯一正确答案。判断 Prompt 好坏，重点看它是否：\n\n1. 任务清晰。\n2. 上下文充分。\n3. 约束明确。\n4. 输出格式稳定。\n5. 对缺失信息不编造。\n6. 可以被别人复用。\n\n如果参考答案和你的答案不同，不代表你的答案一定错误。你需要通过测试输出证明它是否有效。\n\n## 完成标准\n\n完成本实验至少需要提交或保留以下内容：\n\n- 5 个练习的 Prompt 文本。\n- 每个练习至少 2 组测试输入和输出记录。\n- 每个练习至少 1 条改进说明。\n- 一段 200 字以内的复盘：你认为 Prompt 最重要的 3 个要素是什么。\n",

        "content": "# Prompt 实战项目：Prompt 模板库\n\n## 项目目标\n\n整理一套可复用的 Prompt 模板，覆盖日常学习、编程、写作和结构化信息提取。\n\n## 项目产物\n\n建议最终形成：\n\n```text\nprompt-library/\n  summary.md\n  translation.md\n  code-explain.md\n  requirement-analysis.md\n  json-extraction.md\n  sql-generation.md\n  test-case-generation.md\n```\n\n## 必备模板\n\n### 1. 文章总结\n\n能力要求：\n\n- 一句话总结\n- 关键要点\n- 适合人群\n- 行动建议\n- 不编造原文没有的信息\n\n### 2. 代码解释\n\n能力要求：\n\n- 说明代码整体作用\n- 解释关键逻辑\n- 指出易错点\n- 给出简化版本\n\n### 3. 结构化信息提取\n\n能力要求：\n\n- 严格输出 JSON\n- 字段缺失用 null\n- 不输出解释文本\n- 适合程序继续处理\n\n### 4. 需求分析\n\n能力要求：\n\n- 分析目标\n- 分析用户场景\n- 拆解核心功能\n- 识别边界情况\n- 识别技术风险\n\n## 迭代方式\n\n1. 先写最简单版本。\n2. 用 3-5 个不同输入测试。\n3. 记录模型输出问题。\n4. 给 Prompt 增加约束或示例。\n5. 再次测试。\n\n## 验收标准\n\n- 模板能被重复使用。\n- 输出格式稳定。\n- 对缺失信息不会编造。\n- 对复杂任务有清晰步骤。\n- 至少包含 5 个不同场景模板。\n\n## 扩展方向\n\n- 为每个模板增加好例子和坏例子。\n- 为 JSON 类模板增加 schema。\n- 将模板做成命令行工具。\n- 接入 LLM API，形成可运行的小应用。\n",

        "path": "lessons/01-prompt/06-project-lab/README.md",
        "content": "# Prompt 项目实现工程说明\n\n本项目实验要求你实现一个“Prompt 模板库”。它不一定需要写成程序，但必须像工程项目一样组织模板、示例、测试记录和验收标准。\n\n## 项目目标\n\n构建一套可复用、可测试、可迭代的 Prompt 模板，帮助初学者理解：\n\n1. Prompt 也需要工程化管理。\n2. 好的 Prompt 不是一次写成的，而是通过测试不断改进。\n3. 模板应该包含适用场景、输入要求、输出格式和边界说明。\n4. 对稳定输出的要求越高，Prompt 越需要结构化。\n\n## 推荐文件结构\n\n```text\n06-project-lab/\n  README.md\n  prompt-library/\n    summary.md\n    translation.md\n    code-explain.md\n    requirement-analysis.md\n    json-extraction.md\n    sql-generation.md\n    test-case-generation.md\n  test-cases/\n    summary-cases.md\n    code-explain-cases.md\n    json-extraction-cases.md\n  evaluation/\n    scorecard.md\n    iteration-log.md\n```\n\n目录说明：\n\n- `prompt-library/`：存放最终可复用 Prompt 模板。\n- `test-cases/`：存放测试输入和期望观察点。\n- `evaluation/scorecard.md`：记录评分标准。\n- `evaluation/iteration-log.md`：记录每次修改 Prompt 的原因和效果。\n\n如果你暂时不想创建这么多文件，也可以先用一个 Markdown 文件完成最小版本，但内容要包含模板、测试和复盘。\n\n## 模板文件建议格式\n\n每个 Prompt 模板建议使用统一结构：\n\n```text\n# 模板名称\n\n## 适用场景\n说明这个 Prompt 适合解决什么问题。\n\n## 不适用场景\n说明哪些情况不应该使用它。\n\n## 输入要求\n说明用户需要提供哪些信息。\n\n## Prompt 模板\n写出可复制使用的 Prompt。\n\n## 输出格式\n说明期望模型按什么格式回答。\n\n## 示例输入\n给出一段测试输入。\n\n## 示例输出\n保存一次较理想的模型输出。\n\n## 常见失败情况\n记录模型可能出错的地方。\n```\n\n## 必做模板\n\n### 1. 文章总结模板\n\n必须支持：\n\n- 一句话总结。\n- 3 到 5 条核心要点。\n- 适合人群。\n- 行动建议。\n- 原文没有的信息要标为“不确定”。\n\n### 2. 翻译模板\n\n必须支持：\n\n- 指定目标语言。\n- 保留术语或专有名词。\n- 说明语气，例如正式、自然、口语化。\n- 对歧义词给出备注。\n\n### 3. 代码解释模板\n\n必须支持：\n\n- 解释整体作用。\n- 解释关键逻辑。\n- 指出潜在 bug 或易错点。\n- 面向初学者说明。\n\n### 4. 需求分析模板\n\n必须支持：\n\n- 用户目标。\n- 使用场景。\n- 核心功能。\n- 非功能要求。\n- 边界情况。\n- 风险与疑问。\n\n### 5. JSON 信息提取模板\n\n必须支持：\n\n- 严格输出 JSON。\n- 字段缺失用 `null`。\n- 不输出解释文本。\n- 明确 JSON 字段含义。\n\n### 6. SQL 生成模板\n\n必须支持：\n\n- 输入表结构。\n- 输入查询目标。\n- 输出 SQL。\n- 说明可能的性能风险。\n- 不凭空编造不存在的表和字段。\n\n### 7. 测试用例生成模板\n\n必须支持：\n\n- 从需求生成测试用例。\n- 覆盖正常场景、异常场景和边界场景。\n- 输出表格。\n- 标注优先级。\n\n## 实现步骤\n\n### 第 1 步：确定模板清单\n\n先列出你要做的模板，不要一开始追求完美。建议先完成 5 个核心模板，再扩展更多模板。\n\n### 第 2 步：写最小可用版本\n\n每个模板先写出最简单版本，确保能完成任务。不要一开始写太长，否则很难判断哪些指令真正有效。\n\n### 第 3 步：准备测试用例\n\n每个模板至少准备 3 类输入：\n\n1. 正常输入：信息完整、表达清楚。\n2. 缺失输入：缺少关键信息。\n3. 干扰输入：包含无关信息或歧义信息。\n\n### 第 4 步：测试并记录问题\n\n每次测试都记录：\n\n```text\n模板名称：\n模板版本：\n测试输入：\n模型输出：\n是否符合格式：\n是否编造信息：\n主要问题：\n改进计划：\n```\n\n### 第 5 步：迭代模板\n\n常见改进方式：\n\n- 增加输出格式。\n- 增加“不知道就说不知道”。\n- 增加字段缺失处理规则。\n- 增加一个好示例。\n- 把复杂任务拆成多步。\n\n### 第 6 步：形成最终模板库\n\n把测试效果较好的版本整理到 `prompt-library/`，并保留测试记录，方便后续继续迭代。\n\n## 验收方式\n\n你可以按下面清单自查：\n\n- 至少完成 5 个 Prompt 模板。\n- 每个模板都有适用场景和输入要求。\n- 每个模板都有明确输出格式。\n- 每个模板至少测试 3 组输入。\n- JSON 类模板能够稳定输出合法 JSON。\n- 总结类模板不会明显编造原文没有的信息。\n- 代码解释类模板适合初学者阅读。\n- 模板修改有迭代记录。\n\n## 评分建议\n\n| 维度 | 说明 | 分值 |\n| --- | --- | --- |\n| 完整性 | 是否覆盖要求的模板类型 | 30 |\n| 稳定性 | 输出格式是否稳定 | 25 |\n| 可复用性 | 模板是否容易被别人复制使用 | 20 |\n| 边界控制 | 是否处理缺失信息和不确定信息 | 15 |\n| 复盘质量 | 是否记录问题和改进过程 | 10 |\n\n## 进阶挑战\n\n如果你已经完成基础项目，可以继续尝试：\n\n1. 为每个模板增加一个 Few-shot 示例。\n2. 为 JSON 模板增加字段校验说明。\n3. 把模板做成命令行菜单，但不要求接入真实 API。\n4. 对比不同模型在同一模板下的输出差异。\n",
        "excerpt": "本项目实验要求你实现一个“Prompt 模板库”。它不一定需要写成程序，但必须像工程项目一样组织模板、示例、测试记录和验收标准。",

        "title": "Prompt 阶段复盘",
        "path": "lessons/01-prompt/07-review.md",
        "content": "# Prompt 阶段复盘\n\n完成 Prompt Engineering 阶段后，请不要只看“模型有没有回答”，而要重点复盘：你的 Prompt 是否能稳定、可控、可复用地得到目标结果。\n\n## 本阶段你应该掌握什么\n\n你应该能够解释并使用以下概念：\n\n- System Prompt / Developer Prompt / User Prompt 的区别。\n- Zero-shot 和 Few-shot 的适用场景。\n- 角色、任务、背景、约束、示例、输出格式的作用。\n- 为什么结构化输出需要更明确的格式要求。\n- 为什么模型会编造，以及如何降低编造概率。\n- 为什么复杂任务适合拆成多步 Prompt Chaining。\n\n## 一个好 Prompt 的基本结构\n\n可以用下面结构自查：\n\n```text\n角色：你希望模型扮演谁？\n任务：你要模型完成什么？\n背景：模型需要知道哪些上下文？\n输入：用户会提供什么材料？\n约束：哪些事情不能做？哪些边界要遵守？\n格式：输出应该长什么样？\n示例：有没有可参考的输入和输出？\n```\n\n并不是每个 Prompt 都必须包含所有部分。简单任务可以简单写，复杂任务才需要更完整的结构。\n\n## 常见错误\n\n### 1. 任务描述过于模糊\n\n错误示例：\n\n```text\n帮我优化一下。\n```\n\n问题：模型不知道优化什么、面向谁、输出什么。\n\n改进方向：说明目标、对象、标准和输出格式。\n\n### 2. 只给任务，不给背景\n\n错误示例：\n\n```text\n写一个学习计划。\n```\n\n问题：学习者基础、学习时间、目标岗位都不清楚。\n\n改进方向：补充用户背景、约束条件和阶段目标。\n\n### 3. 想要结构化结果，却没有规定格式\n\n错误示例：\n\n```text\n提取姓名、职业和目标。\n```\n\n问题：模型可能输出自然语言、列表或 JSON，格式不稳定。\n\n改进方向：明确要求输出 JSON、字段名、缺失值处理方式。\n\n### 4. 没有限制模型不要编造\n\n错误示例：\n\n```text\n总结这篇文章，并补充作者观点。\n```\n\n问题：如果原文没有作者观点，模型可能自行推断。\n\n改进方向：要求“只能依据原文；原文没有的信息标为不确定”。\n\n### 5. 一次性要求太多\n\n错误示例：\n\n```text\n分析需求、设计架构、写代码、写测试、给上线方案。\n```\n\n问题：任务跨度太大，输出容易浅、乱、漏。\n\n改进方向：拆成多步，每一步只完成一个明确任务。\n\n### 6. 没有测试不同输入\n\n问题：一个 Prompt 在单个例子上表现好，不代表它稳定。\n\n改进方向：至少测试正常输入、缺失输入、干扰输入三类场景。\n\n## 检查清单\n\n完成本阶段后，请逐项检查：\n\n- 我能把模糊需求改写成清晰 Prompt。\n- 我的 Prompt 明确说明了任务目标。\n- 我的 Prompt 提供了必要上下文。\n- 我的 Prompt 有明确输出格式。\n- 我的 Prompt 对缺失信息有处理规则。\n- 我的 Prompt 对“不确定”有表达要求。\n- 我至少做过一次同任务多 Prompt 对比实验。\n- 我知道 Few-shot 示例什么时候有帮助。\n- 我知道复杂任务可以用 Prompt Chaining 拆解。\n- 我保留了 Prompt 版本和测试记录。\n\n## 复盘问题\n\n请用自己的话回答下面问题：\n\n1. 在你写过的 Prompt 中，哪一个输出最稳定？为什么？\n2. 哪一个 Prompt 最容易让模型编造？你如何改进？\n3. 角色设定对输出有什么影响？有没有过度设定的情况？\n4. 输出格式要求越详细越好吗？什么时候会适得其反？\n5. Few-shot 示例比单纯规则更有效的场景是什么？\n6. 如果要把 Prompt 交给别人复用，还需要补充哪些说明？\n\n## 下一步\n\n下一阶段将进入 LLM API 与 SDK。你会把本阶段学到的 Prompt 放进真实 API 请求中，进一步学习：\n\n- 如何构造 `messages`。\n- 如何设置模型参数。\n- 如何实现多轮对话。\n- 如何处理流式输出。\n- 如何记录日志、成本和错误。\n\n建议在进入下一阶段前，至少准备 2 到 3 个你认为质量较高的 Prompt 模板。后续可以把它们接入命令行聊天助手中。",

        "content": "# LLM API 基础\n\n## LLM API 是什么\n\nLLM API 是把大模型能力接入自己程序的方式。\n\n你不再只是打开网页和 AI 聊天，而是可以在自己的应用里调用模型，让模型完成生成、总结、分析、问答、工具调用等任务。\n\n## 一次 API 调用通常包含什么\n\n```text\n用户输入 → 构造 messages → 调用模型 API → 获取模型输出 → 展示或继续处理\n```\n\n## 核心参数\n\n### model\n\n指定使用哪个模型。\n\n不同模型在能力、速度、价格上不同。\n\n### messages\n\n表示对话内容，通常包含：\n\n- system：系统指令\n- user：用户输入\n- assistant：模型历史回复\n\n### temperature\n\n控制输出随机性。\n\n- 低 temperature：更稳定，适合代码、结构化输出\n- 高 temperature：更多样，适合创意写作\n\n### max_tokens\n\n限制最大输出长度。\n\n### stream\n\n是否使用流式输出。\n\n流式输出可以让用户更快看到内容，而不是等模型全部生成完。\n\n## 多轮对话\n\n多轮对话不是模型自动记住所有内容，而是程序每次请求时把必要历史重新传给模型。\n\n需要注意：\n\n- 历史太长会消耗更多 token\n- 上下文窗口有限\n- 长对话需要摘要或裁剪\n\n## Token 与成本\n\nToken 可以粗略理解为模型处理文本的最小单位。\n\n成本通常由下面几部分决定：\n\n- 输入 token\n- 输出 token\n- 模型单价\n- 是否使用缓存\n\n## Prompt Caching\n\nPrompt Caching 用于缓存重复的大段上下文，减少延迟和成本。\n\n适合场景：\n\n- 固定系统提示词\n- 固定工具说明\n- 长文档上下文\n- 多轮任务中的稳定前缀\n\n## Mock 到真实 API 的安全切换\n\n学习阶段推荐先使用 mock provider。mock 的价值不是“假装调用成功”，而是让你在不消耗费用、不暴露密钥的情况下，先把交互循环、messages 组装、streaming、日志和错误处理跑通。\n\n### Provider 抽象\n\n不要把 SDK 调用散落在业务代码里。建议只让业务层依赖统一接口：\n\n```text\ngenerate(messages, options) -> { text, usage, raw }\nstream(messages, options) -> 逐步返回 delta 文本，结束后返回 usage\n```\n\n这样后续从 mock 切到真实 API 时，只替换 provider 实现，不需要重写命令行交互、历史管理或日志模块。\n\n### Env 与配置设计\n\n推荐把“环境”“provider”“密钥变量名”分开：\n\n```text\nAPP_ENV=dev\nLLM_PROVIDER=mock\nLLM_API_KEY_ENV=ANTHROPIC_API_KEY\nLLM_MODEL=model-name\nLLM_TIMEOUT_MS=30000\nLLM_MAX_RETRIES=2\n```\n\n规则：\n\n- `dev` 默认使用 mock，除非学习者显式切换。\n- `test` 必须使用 mock 或录制的 fixture，避免 CI 调真实 API。\n- `prod` 必须检查 API Key、预算、日志脱敏和限流策略。\n- 配置文件只写环境变量名和占位符，不写真实密钥。\n\n### Streaming 处理\n\n真实 streaming 不是一次返回完整文本，而是多个片段陆续到达。实现时要注意：\n\n- 收到 delta 后立即打印，改善体感延迟。\n- 同时把 delta 追加到 buffer，请求结束后保存完整 assistant message。\n- 如果流中途失败，日志要记录 partial output，并提示用户“回答可能不完整”。\n- 不要在每个 delta 都写一次完整历史，避免频繁 IO。\n\n### 错误分类与恢复\n\n至少区分这些错误：\n\n| 错误类型 | 常见原因 | 建议处理 |\n| --- | --- | --- |\n| `missing_key` | 未设置环境变量 | 给出设置指引，不重试 |\n| `auth_error` | Key 无效或权限不足 | 停止调用，提示检查 Key |\n| `rate_limit` | 请求过快或额度不足 | 指数退避，达到上限后失败 |\n| `timeout` | 网络慢或模型响应慢 | 可重试，记录耗时 |\n| `server_error` | 服务商临时异常 | 可重试，必要时降级 |\n| `bad_request` | 参数、messages 或模型名错误 | 不重试，提示修正配置 |\n| `empty_output` | 返回为空或被截断 | 记录原始状态，提示重试 |\n\n真实 API 替换的最低验收：mock 路径仍可运行；真实路径不会打印或提交 API Key；失败时能给出可理解错误，而不是直接崩溃。\n\n## 常见错误\n\n- API Key 无效\n- 请求频率过高\n- 参数格式错误\n- 输出超出限制\n- 网络超时\n- 模型名称写错\n\n## 一句话总结\n\nLLM API 的重点不是只会调接口，而是能管理上下文、成本、延迟、输出格式和错误处理。\n",
        "excerpt": "LLM API 是把大模型能力接入自己程序的方式。",
        "estimatedMinutes": 4,

        "path": "lessons/02-llm-api/02-templates.md",
        "content": "# LLM API 常用模板\n\n## 基础调用伪代码\n\n```text\n1. 读取用户输入\n2. 构造 messages\n3. 调用模型 API\n4. 获取 assistant 回复\n5. 输出给用户\n```\n\n## Messages 模板\n\n```json\n[\n  {\n    \"role\": \"system\",\n    \"content\": \"你是一个简洁、准确的 AI 助手。\"\n  },\n  {\n    \"role\": \"user\",\n    \"content\": \"请解释什么是 Agent。\"\n  }\n]\n```\n\n## 多轮对话模板\n\n```json\n[\n  {\n    \"role\": \"system\",\n    \"content\": \"你是一个 AI 学习助手。\"\n  },\n  {\n    \"role\": \"user\",\n    \"content\": \"什么是 Prompt？\"\n  },\n  {\n    \"role\": \"assistant\",\n    \"content\": \"Prompt 是给 AI 的任务说明书。\"\n  },\n  {\n    \"role\": \"user\",\n    \"content\": \"那 System Prompt 是什么？\"\n  }\n]\n```\n\n## 调用日志模板\n\n每次调用建议记录：\n\n```json\n{\n  \"timestamp\": \"2026-06-30T10:00:00Z\",\n  \"model\": \"model-name\",\n  \"input_tokens\": 0,\n  \"output_tokens\": 0,\n  \"latency_ms\": 0,\n  \"success\": true,\n  \"error\": null\n}\n```\n\n## 错误处理模板\n\n```text\n如果 API 调用失败：\n1. 判断是否是参数错误\n2. 判断是否是 API Key 或权限问题\n3. 判断是否是频率限制\n4. 判断是否是网络问题\n5. 给用户返回可理解的错误信息\n```\n\n## 流式输出流程\n\n```text\n1. 发起 streaming 请求\n2. 接收模型增量输出\n3. 每收到一段就打印一段\n4. 直到结束事件\n5. 保存完整回答\n```\n",

        "path": "lessons/02-llm-api/03-exercises.md",
        "content": "# LLM API 练习\n\n## 练习 1：理解请求结构\n\n写出一次 LLM API 请求需要包含哪些信息。\n\n至少包含：\n\n- model\n- messages\n- temperature\n- max_tokens\n- stream\n\n## 练习 2：设计 messages\n\n为下面任务设计 messages：\n\n```text\n让 AI 扮演学习助手，用中文解释什么是 Agent。\n```\n\n要求：\n\n- 包含 system message\n- 包含 user message\n- system message 要说明角色和回答风格\n\n## 练习 3：多轮对话\n\n构造一个三轮对话历史：\n\n1. 用户问什么是 Prompt\n2. AI 回答\n3. 用户继续追问 System Prompt 是什么\n\n思考：为什么第三次请求时需要带上前面的历史？\n\n## 练习 4：流式输出\n\n用伪代码描述流式输出过程：\n\n```text\n发起请求 → 接收片段 → 打印片段 → 拼接完整结果 → 保存历史\n```\n\n## 练习 5：调用日志\n\n设计一个 JSON 日志格式，记录：\n\n- 调用时间\n- 模型名称\n- 输入 token\n- 输出 token\n- 耗时\n- 是否成功\n- 错误信息\n\n## 练习 6：成本意识\n\n回答下面问题：\n\n1. 为什么长上下文会增加成本？\n2. 为什么流式输出不一定减少总成本？\n3. Prompt Caching 适合什么场景？\n4. 多轮对话为什么需要摘要或裁剪？\n",
