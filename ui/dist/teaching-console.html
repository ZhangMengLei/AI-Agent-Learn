        "path": "data/docs/agent-basic.md",
        "content": "# Agent 基础\n\nAgent 可以理解为围绕目标持续行动的系统。它通常不只生成一次文本，而是会在目标、计划、工具、观察结果之间循环，直到任务完成或触发停止条件。\n\n## 一个最小 Agent 循环\n\n1. 接收目标：明确用户想完成什么。\n2. 制定计划：把目标拆成若干可执行步骤。\n3. 选择工具：判断是否需要搜索、读写文件、调用 API、运行测试等。\n4. 执行动作：调用工具或生成中间结果。\n5. 观察结果：读取工具返回、错误信息或环境变化。\n6. 调整策略：根据观察结果继续下一步或结束。\n\n## 工程化关注点\n\n- 边界：Agent 能做什么，不能做什么。\n- 权限：哪些操作需要用户确认，哪些操作只读即可执行。\n- 记忆：哪些上下文需要保留，哪些应该丢弃。\n- 日志：如何追踪每一次工具调用和决策。\n- 评测：如何判断 Agent 是否真的完成任务。\n- 安全：如何避免越权操作、泄露密钥、执行危险命令。\n\n## 练习建议\n\n设计一个“学习计划 Agent”：输入学习目标和可用时间，输出计划；如果缺少信息，先提问；如果信息足够，再生成分阶段任务和检查点。\n",

        "path": "data/docs/agent-vs-chatbot.md",
        "content": "# Agent 和 Chatbot\n\n## Chatbot 是什么\n\nChatbot 通常是围绕对话输入和回答输出构建的程序。它擅长回答问题、解释概念、总结文本，并在单轮或多轮对话中保持上下文。\n\nChatbot 的主要目标是把用户问题转成自然语言答案。它一般不会主动拆解长期目标，也不会持续调用多个工具完成复杂任务。\n\n## Agent 是什么\n\nAgent 是围绕目标、规划、工具调用和观察反馈构建的系统。它不仅生成文字，还可以根据目标选择工具、执行步骤、读取结果，并继续决定下一步。\n\nAgent 更像一个带有工作循环的执行者：理解目标，制定计划，调用工具，观察结果，修正计划，直到任务完成或需要人类确认。\n\n## 核心区别\n\nChatbot 偏向回答问题，Agent 偏向完成任务。Chatbot 的输出通常是一次回答；Agent 的输出可能来自多步行动和工具结果。\n\n当需求只是解释概念或闲聊时，Chatbot 足够。当需求包含搜索、写文件、运行命令、检查结果、迭代修复时，更适合使用 Agent。\n",
        "excerpt": "Chatbot 通常是围绕对话输入和回答输出构建的程序。它擅长回答问题、解释概念、总结文本，并在单轮或多轮对话中保持上下文。",

        "content": "# MCP 基础\n\nMCP（Model Context Protocol）是一种把模型应用和外部工具、数据源、上下文能力连接起来的协议思路。它的核心价值是让工具接入方式更加标准化，减少每个 Agent 系统重复造轮子。\n\n## MCP 解决什么问题\n\n在没有统一协议时，不同工具通常有不同的调用方式、认证方式和返回格式。Agent 想接入文件系统、数据库、搜索服务、内部平台时，需要写大量适配代码。\n\nMCP 通过服务端暴露资源和工具，客户端按协议发现、调用和读取结果，让模型应用可以用更统一的方式访问外部能力。\n\n## 常见组成\n\n- MCP Client：通常集成在模型应用、IDE、CLI Agent 中。\n- MCP Server：负责把某类能力暴露为资源、工具或提示模板。\n- Tools：可执行动作，例如查询文档、创建任务、读取文件。\n- Resources：可读取上下文，例如文档内容、配置、数据记录。\n- Prompts：可复用的提示模板。\n\n## 工程化关注点\n\n- 工具描述要清晰，参数 schema 要稳定。\n- 高风险工具需要权限控制和审计日志。\n- 返回结果应尽量结构化，便于模型继续推理。\n- 不要在工具描述、日志或样例中暴露真实密钥。\n\n## 练习建议\n\n选择一个很小的能力，例如“读取课程目录”或“查询样例知识库文档”，思考如何把它设计成 MCP 工具：工具名、参数、返回值和错误处理分别是什么。\n",
        "excerpt": "MCP（Model Context Protocol）是一种把模型应用和外部工具、数据源、上下文能力连接起来的协议思路。它的核心价值是让工具接入方式更加标准化，减少每个 Agent 系统重复造轮子。",

        "path": "data/docs/prompt-basic.md",
        "content": "# Prompt 基础\n\nPrompt 是人与大模型协作时的任务说明书。一个好的 Prompt 不只是“问一句话”，而是把目标、角色、输入、约束、输出格式和质量标准都说清楚。\n\n## 为什么要结构化 Prompt\n\n在课程练习中，建议把 Prompt 拆成以下部分：\n\n1. 角色：模型应该以什么身份思考，例如“你是经验丰富的 AI 教学讲师”。\n2. 任务：本次要完成什么，例如“把一段需求拆成可执行步骤”。\n3. 上下文：模型需要知道哪些背景，例如业务场景、用户画像、已有代码结构。\n4. 约束：不能做什么，必须遵守什么，例如“不要编造 API Key”“输出中文”。\n5. 输出格式：希望结果是列表、表格、JSON，还是可运行代码。\n6. 验收标准：如何判断回答可用，例如“包含风险、测试建议、下一步”。\n\n## 示例模板\n\n```text\n你是{角色}。\n\n背景：\n{上下文}\n\n任务：\n{要完成的目标}\n\n约束：\n- {约束 1}\n- {约束 2}\n\n输出格式：\n{格式要求}\n\n验收标准：\n- {标准 1}\n- {标准 2}\n```\n\n## 练习建议\n\n把同一个任务分别写成“随口提问”和“结构化 Prompt”，比较两次回答在准确性、完整性和可执行性上的差异。\n",
        "excerpt": "Prompt 是人与大模型协作时的任务说明书。一个好的 Prompt 不只是“问一句话”，而是把目标、角色、输入、约束、输出格式和质量标准都说清楚。",

        "title": "RAG 入门",
        "path": "data/docs/rag-basics.md",
        "content": "# RAG 入门\n\n## 基本流程\n\nRAG 是检索增强生成。它先从知识库中检索和问题相关的片段，再把这些片段作为上下文交给生成模块回答。\n\n一个典型 RAG 流程包括文档加载、文档切分、索引构建、用户提问、相关片段检索、基于上下文生成答案、返回答案和引用来源。\n\n## 为什么要切分文档\n\n长文档直接检索容易不精确，也会浪费上下文空间。Chunking 会把文档切成更小的片段，让检索结果更聚焦。\n\n常见切分方式包括按标题切分、按段落切分、固定长度切分，以及带重叠窗口的切分。\n\n## 引用的重要性\n\nRAG 答案应该带有来源引用。引用能帮助用户确认答案来自哪个文档和章节，也方便排查检索是否命中了正确内容。\n",
        "excerpt": "RAG 是检索增强生成。它先从知识库中检索和问题相关的片段，再把这些片段作为上下文交给生成模块回答。",

        "path": "ui/README.md",
        "content": "# 本地教学 GUI\n\n`ui/` 提供一个离线静态教学控制台，用来把课程路线、课程阅读、Prompt 实验、RAG 检索、Agent 执行轨迹和 Eval 结果放到同一个可视化界面中。\n\n目标是让学习者可以主要在 UI 上完成学习，而不是频繁回到文件目录。\n\n## 生成方式\n\n```bash\nmake ui\n```\n\n默认会生成：\n\n```text\nui/dist/teaching-console.html\n```\n\n直接用浏览器打开这个 HTML 文件即可。它不需要 Node.js、不需要后端服务、不调用真实模型，也不会访问网络。\n\n如果你已经维护自己的学习进度 JSON，可以传入：\n\n```bash\nmake ui PROGRESS=data/notes/learning-progress.example.json\n```\n\n## 页面包含什么\n\n- 学习路线：展示 00-08 阶段完成度、下一项和推荐行动。\n- 课程阅读：在浏览器里直接阅读根 README、Labs、全部课程阶段、checkpoints、solutions、implementations 说明和 `data/docs` 样例知识库。\n- 内部链接：课程 Markdown 里的相对链接会尽量在 UI 内打开对应文档，适合连续阅读。\n- 对应答案：练习、练习 Lab、项目、项目 Lab 文档会在正文上方显示“对应答案”，点击即可打开 `solutions/...` 中的答案讲解。\n- 路由打开：阅读器支持 `#/reader/<文档路径>`，例如 `#/reader/solutions%2F01-prompt%2F03-exercises.md` 可以直接打开某个答案。\n- Prompt Lab：选择模板、输入任务，比较结构化 Prompt 和随口 Prompt 的评分。\n- RAG 检索：对本地 `data/docs/*.md` 切分后的 chunk 做浏览器端检索，展示命中词和来源。\n- Agent Trace：展示研究 Agent 的计划、工具调用和 observation。\n- Eval 面板：展示 golden dataset 的通过率、平均分、高风险样例和明细。\n\n## 在 UI 里直接学习\n\n1. 打开“学习路线”，点击某个阶段卡片里的“在 UI 中学习”。\n2. 在“课程阅读”里选择资料集合和文档，也可以用搜索框查找关键词。\n3. 点击正文里的课程链接，UI 会打开对应内嵌文档。\n4. 做练习或项目时，使用“对应答案”按钮打开答案讲解；答案页也会提供返回章节的入口。\n5. 阅读右侧正文，完成后点击“标记已读”。\n6. 在“学习笔记”里记录卡点、复述和下一步实验。\n7. 点击“导出进度”，得到 `ai-agent-learn-progress.json`，可以作为个人进度备份。\n\n阅读状态和笔记默认保存在浏览器 `localStorage` 中，不会写回仓库。如果换浏览器或清理浏览器数据，需要重新导入或重新记录。\n\n## 设计边界\n\n- 这是教学 GUI，不是产品后台。\n- 不保存真实 API Key、cookie、token 或生产数据。\n- 已读状态和笔记只保存在当前浏览器本地。\n- UI 会内嵌学习 Markdown；如果新增或修改课程内容，需要重新运行 `make ui`。\n- 所有模型回答都是 mock 或规则生成，适合解释工程结构。\n\n## 适合课堂怎么用\n\n1. 先打开“学习路线”，让学习者知道当前阶段和下一步。\n2. 进入“课程阅读”，读完一个文档后立刻做已读标记和笔记。\n3. 用 “Prompt Lab” 演示为什么结构化任务说明更稳定。\n4. 用 “RAG 检索” 展示检索不是魔法，而是 chunk、命中词、引用来源。\n5. 用 “Agent Trace” 解释计划、工具调用、观察结果的循环。\n6. 用 “Eval 面板” 强调 AI 应用上线前需要固定测试集和安全样例。\n",
        "excerpt": "`ui/` 提供一个离线静态教学控制台，用来把课程路线、课程阅读、Prompt 实验、RAG 检索、Agent 执行轨迹和 Eval 结果放到同一个可视化界面中。",

    function renderMarkdown(markdown, currentDoc) {
      const lines = markdown.replaceAll("\r\n", "\n").split("\n");
      const htmlParts = [];
      let inCode = false;
      let listOpen = false;
      let orderedListOpen = false;
      let tableRows = [];
      let paragraph = [];

      const flushParagraph = () => {
        if (!paragraph.length) return;
        htmlParts.push(`<p>${inlineMarkdown(paragraph.join(" "), currentDoc)}</p>`);
        paragraph = [];
      };
      const closeList = () => {
        if (!listOpen) return;
        htmlParts.push("</ul>");
        listOpen = false;
      };
      const closeOrderedList = () => {
        if (!orderedListOpen) return;
        htmlParts.push("</ol>");
        orderedListOpen = false;
      };
      const closeLists = () => {
        closeList();
        closeOrderedList();
      };
      const flushTable = () => {
        if (!tableRows.length) return;
        const rows = tableRows
          .map((line) => line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map((cell) => cell.trim()))
          .filter((cells) => !cells.every((cell) => /^:?-{3,}:?$/.test(cell)));
        if (rows.length) {
          const [header, ...bodyRows] = rows;
          htmlParts.push("<table><thead><tr>" + header.map((cell) => `<th>${inlineMarkdown(cell, currentDoc)}</th>`).join("") + "</tr></thead><tbody>");
          bodyRows.forEach((row) => {
            htmlParts.push("<tr>" + row.map((cell) => `<td>${inlineMarkdown(cell, currentDoc)}</td>`).join("") + "</tr>");
          });
          htmlParts.push("</tbody></table>");
        }
        tableRows = [];
      };

      for (const line of lines) {
        if (line.startsWith("```")) {
          flushParagraph();
          closeLists();
          flushTable();
          if (inCode) {
            htmlParts.push("</code></pre>");
            inCode = false;
          } else {
            htmlParts.push("<pre><code>");
            inCode = true;
          }
          continue;
        }
        if (inCode) {
          htmlParts.push(escapeHtml(line) + "\n");
          continue;
        }
        if (!line.trim()) {
          flushParagraph();
          closeLists();
          flushTable();
          continue;
        }
        if (line.trim().startsWith("|") && line.includes("|")) {
          flushParagraph();
          closeLists();
          tableRows.push(line);
          continue;
        }
        flushTable();
        const heading = line.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          flushParagraph();
          closeLists();
          const level = Math.min(heading[1].length, 3);
          htmlParts.push(`<h${level}>${inlineMarkdown(heading[2], currentDoc)}</h${level}>`);
          continue;
        }
        const bullet = line.match(/^[-*]\s+(.+)$/);
        if (bullet) {
          flushParagraph();
          closeOrderedList();
          if (!listOpen) {
            htmlParts.push("<ul>");
            listOpen = true;
          }
          htmlParts.push(`<li>${inlineMarkdown(bullet[1], currentDoc)}</li>`);
          continue;
        }
        const numbered = line.match(/^\d+\.\s+(.+)$/);
        if (numbered) {
          flushParagraph();
          closeList();
          if (!orderedListOpen) {
            htmlParts.push("<ol>");
            orderedListOpen = true;
          }
          htmlParts.push(`<li>${inlineMarkdown(numbered[1], currentDoc)}</li>`);
          continue;
        }
        paragraph.push(line.trim());
      }
      flushParagraph();
      closeLists();
      flushTable();
      if (inCode) htmlParts.push("</code></pre>");
      return htmlParts.join("");
    }

    function inlineMarkdown(text, currentDoc) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_match, label, href) => buildMarkdownLink(label, href, currentDoc));
    }

    function buildMarkdownLink(label, href, currentDoc) {
      const target = resolveDocumentLink(href, currentDoc);
      if (target) {
        return `<a href="${escapeHtml(routeForDocument(target.id))}" data-doc-link="${escapeHtml(target.id)}" title="${escapeHtml(target.path)}">${label}</a>`;
      }
      return `<a href="${escapeHtml(href)}">${label}</a>`;
    }

    function resolveDocumentLink(href, currentDoc) {
      if (!href || href.startsWith("#") || href.startsWith("http://") || href.startsWith("https://") || href.startsWith("mailto:")) return null;
      const withoutAnchor = href.split("#")[0];
      if (!withoutAnchor) return null;
      const baseParts = currentDoc.path.split("/").slice(0, -1);
      const rawParts = (withoutAnchor.startsWith("/") ? withoutAnchor.slice(1) : [...baseParts, withoutAnchor].join("/")).split("/");
      const normalized = [];
      rawParts.forEach((part) => {
        if (!part || part === ".") return;
        if (part === "..") normalized.pop();
        else normalized.push(part);
      });
      const candidate = normalized.join("/");
      const candidates = [
        candidate,
        candidate.endsWith("/") ? `${candidate}README.md` : `${candidate}/README.md`,
        candidate.endsWith(".md") ? candidate : `${candidate}.md`,
      ];
      return data.reader.documents.find((doc) => candidates.includes(doc.id)) || null;
    }

    function tokenize(text) {
      const lowered = text.toLowerCase();
      const terms = [];
      for (const match of lowered.matchAll(/[a-z0-9]+/g)) {
        if (match[0].length > 1) terms.push(match[0]);
      }
      for (const match of text.matchAll(/[\u4e00-\u9fff]+/g)) {
        const span = match[0];
        if (span.length <= 6) terms.push(span);
        for (const size of [2, 3]) {
          for (let index = 0; index <= span.length - size; index += 1) {
            terms.push(span.slice(index, index + size));
          }
        }
      }
      return [...new Set(terms.filter((term) => !["什么", "是什么", "怎么", "如何", "以及", "一个"].includes(term)))];
    }

    function updateRag() {
      const query = $("#ragQuery").value;
      const terms = tokenize(query);
      const results = data.rag.chunks
        .map((chunk) => {
          const haystack = `${chunk.text} ${chunk.title} ${chunk.section} ${chunk.source}`.toLowerCase();
          const matched = terms.filter((term) => haystack.includes(term.toLowerCase()));
          const score = matched.length ? matched.length * 2 + (matched.some((term) => chunk.section.includes(term)) ? 1 : 0) : 0;
          return { chunk, matched, score };
        })
        .filter((result) => result.score > 0)
        .sort((a, b) => b.score - a.score || a.chunk.id.localeCompare(b.chunk.id))
        .slice(0, 4);
      $("#ragResults").innerHTML = results.length ? results.map((result, index) => `
        <article class="chunk-card">
          <div class="chunk-meta">
            <span class="tag">#${index + 1}</span>
            <span class="tag">${escapeHtml(result.chunk.id)}</span>
            <span class="tag">score ${result.score}</span>
            <span class="tag">${escapeHtml(result.chunk.source)} > ${escapeHtml(result.chunk.section)}</span>
          </div>
          <p>${escapeHtml(result.chunk.text)}</p>
          <p>命中词：${escapeHtml(result.matched.join(", ") || "-")}</p>
        </article>
      `).join("") : `<p>没有检索到相关 chunk。可以换一个问题，或补充 data/docs。</p>`;
    }

    function renderAgent() {
      const toolLog = data.agent.toolLog;
      document.getElementById("agent").innerHTML = `
        <div class="grid-2">
          <div class="panel">
            <div class="section-title"><h3>研究计划</h3><span class="tag">${escapeHtml(data.agent.topic)}</span></div>
            <ul class="action-list">${data.agent.plan.map((step) => `<li>${escapeHtml(step)}</li>`).join("")}</ul>
          </div>
          <div class="panel">
            <div class="section-title"><h3>执行轨迹</h3><span class="tag">${toolLog.length} tool calls</span></div>
            <div class="trace-list">${toolLog.map((call) => `
              <article class="trace-row">
                <div class="trace-index">Step ${call.iteration}</div>
                <div>
                  <h3>${escapeHtml(call.toolName)}(${escapeHtml(call.toolInput)})</h3>
                  <p>${escapeHtml(call.observation)}</p>
                </div>
              </article>
            `).join("")}</div>
          </div>
        </div>
      `;
    }

    function renderEval() {
      const summary = data.eval.summary;
      const results = data.eval.results;
      document.getElementById("eval").innerHTML = `
        <div class="summary-grid">
          <div class="metric"><span class="tag">Cases</span><strong>${summary.total}</strong><p>测试用例</p></div>
          <div class="metric"><span class="tag">Score</span><strong>${summary.averageScore}</strong><p>平均分</p></div>
          <div class="metric"><span class="tag">Accuracy</span><strong>${Math.round(summary.accuracy * 100)}%</strong><p>通过率</p></div>
          <div class="metric"><span class="tag">Risk</span><strong>${results.filter((item) => item.riskLevel === "high").length}</strong><p>高风险样例</p></div>
        </div>
        <div class="panel">
          <div class="section-title"><h3>评测明细</h3><span class="tag">${summary.totalTokens} estimated tokens</span></div>
          <div class="eval-list">${results.map((result) => `
            <article class="eval-row">
              <div><span class="tag">${escapeHtml(result.caseId)}</span></div>
              <div>${escapeHtml(result.category)}<br><span class="tag">${escapeHtml(result.riskLevel)}</span></div>
              <div class="${result.passed ? "pass" : "fail"}">${result.passed ? "通过" : "失败"}<br>${result.score}/5</div>
              <div><h3>${escapeHtml(result.question)}</h3><p>${escapeHtml(result.answer)}</p></div>
            </article>
          `).join("")}</div>
        </div>
      `;
    }

    renderDashboard();
    renderReader();
    renderPrompt();
    renderRag();
    renderAgent();
    renderEval();
    applyRoute();
  </script>
</body>
</html>
