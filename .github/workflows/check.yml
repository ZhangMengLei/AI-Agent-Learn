name: check

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run quality checks
        run: make check

      - name: Run demo smoke tests
        run: |
          make demo-prompt
          make demo-llm
          make demo-tool
          make demo-rag QUERY="Agent 和 Chatbot 区别是什么"
          make demo-mcp
          make demo-claude-code
