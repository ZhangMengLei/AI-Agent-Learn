name: check

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Check accidental secret files
        run: |
          if find . \( -path './.git' -o -path './.claude' \) -prune -o \( -name .env -o -name '.env.*' \) ! -name '.env.example' -print | grep -q .; then
            echo "Do not commit real .env files. Keep only .env.example."
            exit 1
          fi

      - name: Check obvious secret literals
        run: |
          if grep -RInE '(sk-[A-Za-z0-9_-]{16,}|api[_-]?key[[:space:]]*=[[:space:]]*["'"''][^"'"'']+["'"''])' . --exclude-dir=.git --exclude-dir=.claude; then
            echo "Potential secret literal found."
            exit 1
          fi
